<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fishing Simulator - Web Playable</title>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top, #11294a 0%, #07111f 70%); font-family: monospace; overflow: hidden; }
    #wrap { width: min(96vw, 1510px); aspect-ratio: 1510 / 850; position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 25px 80px rgba(0, 0, 0, 0.45); border: 4px solid rgba(255, 255, 255, 0.15); background: #87ceeb; }
    canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
    #help { position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%); color: white; font-size: clamp(12px, 1.1vw, 18px); text-shadow: 0 2px 8px rgba(0,0,0,0.55); background: rgba(0, 0, 0, 0.22); padding: 8px 14px; border-radius: 999px; pointer-events: none; }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="game" width="1510" height="850"></canvas><div id="help">Press SPACE or click the water to launch • Click Shop to open upgrades</div></div>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const WIDTH = 1510, HEIGHT = 850;
    let coinCount = 0, shopOpen = false, harpoonLaunched = false, lastTime = 0, waveOffset = 0;
    const fishColors = {1:{body:"#ff9f43",fin:"#ff6b35",value:5},2:{body:"#48dbfb",fin:"#0abde3",value:10},3:{body:"#a55eea",fin:"#8854d0",value:20},4:{body:"#ff4757",fin:"#c44569",value:50},5:{body:"#feca57",fin:"#ff9f43",value:200},6:{body:"#7bed9f",fin:"#2ed573",value:1000}};
    class Button{constructor(x,y,w,h,label,action){this.x=x;this.y=y;this.w=w;this.h=h;this.label=label;this.action=action}contains(mx,my){return mx>=this.x&&mx<=this.x+this.w&&my>=this.y&&my<=this.y+this.h}draw(fill="#1289A7",stroke="rgba(255,255,255,0.6)"){roundRect(this.x,this.y,this.w,this.h,18,fill,stroke,4);ctx.fillStyle="white";ctx.font="bold 30px monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(this.label,this.x+this.w/2,this.y+this.h/2)}}
    class Fish{constructor(x,y,type,speed,direction,value){this.x=x;this.y=y;this.type=type;this.speed=speed;this.direction=direction;this.value=value;this.upwardSpeed=0;this.caught=false;this.bob=Math.random()*Math.PI*2;if(type<=3){this.w=150;this.h=75}else if(type===4){this.w=220;this.h=120}else if(type===5){this.w=350;this.h=200}else{this.w=250;this.h=200}}move(dt){this.bob+=dt*.004;this.x+=this.direction*this.speed*dt*.06;this.y+=this.upwardSpeed*dt*.06;if(this.x>WIDTH+this.w)this.x=-this.w;if(this.x+this.w<-this.w)this.x=WIDTH+this.w}get rect(){return{x:this.x,y:this.y,w:this.w,h:this.h}}draw(){const c=fishColors[this.type],bobY=Math.sin(this.bob)*3;ctx.save();ctx.translate(this.x+this.w/2,this.y+this.h/2+bobY);ctx.scale(this.direction,1);ctx.shadowColor="rgba(0,0,0,.25)";ctx.shadowBlur=8;ctx.shadowOffsetY=5;ctx.fillStyle=c.fin;ctx.beginPath();ctx.moveTo(-this.w*.48,0);ctx.lineTo(-this.w*.72,-this.h*.3);ctx.lineTo(-this.w*.72,this.h*.3);ctx.closePath();ctx.fill();const grd=ctx.createLinearGradient(-this.w/2,-this.h/2,this.w/2,this.h/2);grd.addColorStop(0,"white");grd.addColorStop(.18,c.body);grd.addColorStop(1,c.fin);ctx.fillStyle=grd;ctx.beginPath();ctx.ellipse(0,0,this.w*.45,this.h*.42,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=c.fin;ctx.beginPath();ctx.moveTo(-this.w*.05,-this.h*.05);ctx.lineTo(-this.w*.2,-this.h*.55);ctx.lineTo(this.w*.18,-this.h*.12);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(-this.w*.02,this.h*.1);ctx.lineTo(-this.w*.18,this.h*.5);ctx.lineTo(this.w*.14,this.h*.16);ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.fillStyle="white";ctx.beginPath();ctx.arc(this.w*.28,-this.h*.1,Math.max(5,this.h*.055),0,Math.PI*2);ctx.fill();ctx.fillStyle="black";ctx.beginPath();ctx.arc(this.w*.3,-this.h*.1,Math.max(2.5,this.h*.027),0,Math.PI*2);ctx.fill();ctx.restore()}}
    class Harpoon{constructor(x,y){this.startX=x;this.startY=y;this.x=x;this.y=y;this.w=10;this.h=100;this.speed=10;this.backSpeed=-5;this.status="still";this.fishSpeared=null}launch(dt){if(this.status==="forward")this.y+=this.speed*dt*.06;if(this.status==="back")this.y+=this.backSpeed*dt*.06;if(this.y+this.h+this.speed>=HEIGHT)this.status="back";else if(this.y+this.backSpeed<=this.startY&&this.status==="back"){this.status="still";harpoonLaunched=false;this.y=this.startY;if(this.fishSpeared){coinCount+=this.fishSpeared.value;fishList=fishList.filter(f=>f!==this.fishSpeared);spawnFish(300,randomInt(250,700),true);this.fishSpeared=null}}if(!this.fishSpeared&&this.status==="forward"){for(const fish of fishList){if(this.hitFish(fish)){this.status="back";fish.speed=0;fish.upwardSpeed=this.backSpeed;fish.caught=true;this.fishSpeared=fish;break}}}if(this.fishSpeared){this.fishSpeared.x=this.x-this.fishSpeared.w/2;this.fishSpeared.y+=this.backSpeed*dt*.06}}hitFish(fish){const hx=this.x-this.w/2,hy=this.y,centerX=this.x,centerY=this.y+this.h/2,r=fish.rect;return hx<r.x+r.w&&hx+this.w>r.x&&hy<r.y+r.h&&hy+this.h>r.y&&centerX>=r.x+r.w/3&&centerX<=r.x+r.w*2/3&&centerY>=r.y+r.h/4&&centerY<=r.y+r.h/2}draw(){ctx.strokeStyle="black";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(this.startX,this.startY);ctx.lineTo(this.x,this.y);ctx.stroke();roundRect(this.x-5,this.y,10,100,4,"#2f3542","#111",1);ctx.fillStyle="#ced6e0";ctx.beginPath();ctx.moveTo(this.x-13,this.y+98);ctx.lineTo(this.x,this.y+125);ctx.lineTo(this.x+13,this.y+98);ctx.closePath();ctx.fill()}}
    let fishList=[];const harpoon=new Harpoon(750,150);const shopButton=new Button(15,65,135,70,"Shop",()=>shopOpen=true);const closeButton=new Button(1225,120,58,58,"X",()=>shopOpen=false);const upgradeButton=new Button(650,310,250,75,"Upgrade",()=>{if(coinCount>=50){coinCount-=50;harpoon.speed+=1.3;harpoon.backSpeed-=.7}});
    function randomInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}function chooseDirection(){return Math.random()<.5?-1:1}function spawnFish(x=null,y=null,includeRare=false){const r=randomInt(1,100),dir=chooseDirection();let type,speed,value,row;if(r<=50){type=1;speed=3;value=5;row=250}else if(r<=75){type=2;speed=3.5;value=10;row=350}else if(r<=85||(!includeRare&&r<=93)){type=3;speed=4;value=20;row=450}else if(r<=93||!includeRare){type=4;speed=4.5;value=50;row=550}else if(r<=98){type=5;speed=5;value=200;row=650}else{type=6;speed=3;value=1000;row=700}fishList.push(new Fish(x??randomInt(0,WIDTH),y??row,type,speed,dir,value))}function generateFish(){fishList=[];for(let i=1;i<20;i++)spawnFish(i*randomInt(90,180),null,false)}
    function roundRect(x,y,w,h,r,fill,stroke,lineWidth=2){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lineWidth;ctx.stroke()}}
    function drawWaterLayer(y,color,amp,speed){ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(0,HEIGHT);ctx.lineTo(0,y);for(let x=0;x<=WIDTH+40;x+=40){ctx.lineTo(x,y+Math.sin((x+waveOffset*speed)*.012)*amp)}ctx.lineTo(WIDTH,HEIGHT);ctx.closePath();ctx.fill();ctx.strokeStyle="rgba(255,255,255,.45)";ctx.lineWidth=3;ctx.beginPath();for(let x=0;x<=WIDTH+40;x+=40){const yy=y+Math.sin((x+waveOffset*speed)*.012)*amp;if(x===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy)}ctx.stroke()}
    function drawBackground(dt){const sky=ctx.createLinearGradient(0,0,0,HEIGHT);sky.addColorStop(0,"#84d9ff");sky.addColorStop(.32,"#87ceeb");sky.addColorStop(1,"#1e90ff");ctx.fillStyle=sky;ctx.fillRect(0,0,WIDTH,HEIGHT);ctx.fillStyle="rgba(255,236,139,.9)";ctx.beginPath();ctx.arc(1320,80,45,0,Math.PI*2);ctx.fill();waveOffset+=dt*.03;drawWaterLayer(100,"rgba(0,165,255,.50)",20,.8);drawWaterLayer(300,"rgba(0,130,210,.48)",25,1);drawWaterLayer(500,"rgba(0,100,190,.50)",30,1.2);drawWaterLayer(700,"rgba(0,80,160,.55)",35,1.4)}
    function drawBoat(){ctx.save();ctx.translate(WIDTH/2,105);ctx.shadowColor="rgba(0,0,0,.28)";ctx.shadowBlur=12;ctx.shadowOffsetY=8;ctx.fillStyle="#8b4513";ctx.beginPath();ctx.moveTo(-170,35);ctx.lineTo(170,35);ctx.lineTo(115,105);ctx.lineTo(-115,105);ctx.closePath();ctx.fill();ctx.fillStyle="#5c2f0e";ctx.fillRect(-110,55,220,18);roundRect(-62,-25,124,65,12,"#f7f1e3","#8b4513",5);roundRect(-42,-10,35,28,6,"#54a0ff","#2e86de",3);roundRect(10,-10,35,28,6,"#54a0ff","#2e86de",3);ctx.fillStyle="#3d2b1f";ctx.fillRect(-6,-85,12,70);ctx.fillStyle="#ffdd59";ctx.beginPath();ctx.moveTo(8,-82);ctx.lineTo(76,-48);ctx.lineTo(8,-18);ctx.closePath();ctx.fill();ctx.restore()}
    function drawHUD(){ctx.fillStyle="#feca57";ctx.beginPath();ctx.arc(35,38,22,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#ff9f43";ctx.lineWidth=5;ctx.stroke();ctx.fillStyle="#8a5a00";ctx.font="bold 24px monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("$",35,39);ctx.fillStyle="white";ctx.font="bold 35px monospace";ctx.textAlign="left";ctx.fillText(String(coinCount),65,41);shopButton.draw("#0fbcf9","rgba(255,255,255,.75)")}
    function drawShop(){if(!shopOpen)return;ctx.fillStyle="rgba(0,0,0,.35)";ctx.fillRect(0,0,WIDTH,HEIGHT);roundRect(200,100,1110,650,30,"#1e90ff","rgba(255,255,255,.7)",6);roundRect(230,135,1050,590,24,"rgba(255,255,255,.12)","rgba(255,255,255,.18)",2);ctx.fillStyle="white";ctx.font="bold 54px monospace";ctx.textAlign="center";ctx.fillText("Shop",WIDTH/2,180);ctx.font="26px monospace";ctx.fillText("Upgrade your harpoon speed",WIDTH/2,250);upgradeButton.draw(coinCount>=50?"#2ed573":"#747d8c","rgba(255,255,255,.7)");ctx.fillStyle="white";ctx.font="24px monospace";ctx.fillText("Cost: 50 coins",WIDTH/2,425);ctx.fillText(`Harpoon Speed: ${harpoon.speed.toFixed(1)}`,WIDTH/2,465);ctx.fillText("Catch fish to earn coins. Rarer fish give more.",WIDTH/2,565);closeButton.draw("#ff4757","rgba(255,255,255,.75)")}
    function launchHarpoon(){if(harpoon.status==="still"){harpoonLaunched=true;harpoon.status="forward";harpoon.fishSpeared=null}}function getMousePos(event){const rect=canvas.getBoundingClientRect();return{x:(event.clientX-rect.left)*(canvas.width/rect.width),y:(event.clientY-rect.top)*(canvas.height/rect.height)}}function handleClick(event){const{x,y}=getMousePos(event);if(shopOpen){if(closeButton.contains(x,y))closeButton.action();else if(upgradeButton.contains(x,y))upgradeButton.action();return}if(shopButton.contains(x,y)){shopButton.action();return}launchHarpoon()}function update(dt){for(const fish of fishList)fish.move(dt);if(harpoonLaunched||harpoon.status!=="still")harpoon.launch(dt)}function draw(){drawBackground(16);drawBoat();for(const fish of fishList)fish.draw();harpoon.draw();drawHUD();drawShop()}function gameLoop(timestamp){const dt=Math.min(33,timestamp-lastTime||16);lastTime=timestamp;update(dt);draw();requestAnimationFrame(gameLoop)}
    window.addEventListener("keydown",event=>{if(event.code==="Space"){event.preventDefault();if(!shopOpen)launchHarpoon()}if(event.code==="Escape")shopOpen=false});canvas.addEventListener("click",handleClick);generateFish();requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
