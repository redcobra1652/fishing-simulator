<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fish the Fish</title>
  <style>
    * { box-sizing: border-box; user-select: none; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    body { 
      min-height: 100vh;
      display: flex; 
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #123456 0%, #020814 70%);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    #wrap {
      width: min(96vw, 1510px);
      aspect-ratio: 1510 / 850;
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0,0,0,.55);
      border: 4px solid rgba(255,255,255,.18);
      background: #87ceeb;
    }
    canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
    #help {
      position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%);
      color: white; font-size: clamp(12px, 1.05vw, 17px); text-shadow: 0 2px 8px rgba(0,0,0,.75);
      background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.22);
      padding: 9px 16px; border-radius: 999px; pointer-events: none; backdrop-filter: blur(4px); white-space: nowrap;
      transition: opacity 0.4s;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="1510" height="850"></canvas>
    <div id="help">Move harpoon with mouse • Click/SPACE to drop • Hit treasure chests for potions</div>
  </div>

<script>
// ── roundRect polyfill for older browsers ──
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r){
    const r0 = typeof r === 'number' ? r : (r[0]||0);
    const r1 = typeof r === 'number' ? r : (r[1] !== undefined ? r[1] : r0);
    const r2 = typeof r === 'number' ? r : (r[2] !== undefined ? r[2] : r0);
    const r3 = typeof r === 'number' ? r : (r[3] !== undefined ? r[3] : r1);
    const rv = [r0, r1, r2, r3];
    this.moveTo(x + rv[0], y);
    this.lineTo(x + w - rv[1], y);
    this.arcTo(x + w, y, x + w, y + rv[1], rv[1]);
    this.lineTo(x + w, y + h - rv[2]);
    this.arcTo(x + w, y + h, x + w - rv[2], y + h, rv[2]);
    this.lineTo(x + rv[3], y + h);
    this.arcTo(x, y + h, x, y + h - rv[3], rv[3]);
    this.lineTo(x, y + rv[0]);
    this.arcTo(x, y, x + rv[0], y, rv[0]);
    this.closePath();
    return this;
  };
}
// =====================================================
// SOUND ENGINE (Web Audio API — no external files)
// =====================================================
const SFX = (() => {
  let ctx_a = null;
  function getCtx(){
    if(!ctx_a) ctx_a = new (window.AudioContext || window.webkitAudioContext)();
    return ctx_a;
  }

  const settings = {
    masterVolume: 0.7,
    mute: false,
    muteUI: false,
    muteFishing: false,
    muteQuests: false,
    muteMusic: false
  };

  // active reel (interval-based clicks)
  let reelInterval = null;
  let reelTickCount = 0;

  function play(fn, category='fishing'){
    if(settings.mute) return;
    if(category==='ui' && settings.muteUI) return;
    if(category==='fishing' && settings.muteFishing) return;
    if(category==='quest' && settings.muteQuests) return;
    try {
      const ac = getCtx();
      if(ac.state === 'suspended'){
        ac.resume().then(() => { try{ fn(ac, settings.masterVolume); }catch(e){} });
      } else {
        fn(ac, settings.masterVolume);
      }
    } catch(e){}
  }

  // ── REEL: line unspool — rapid mechanical clicks that accelerate ──
  function _reelTick(ac, vol, speed){
    try {
      const t = ac.currentTime;
      // Short sharp noise burst = one ratchet click
      const dur = 0.018;
      const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * dur), ac.sampleRate);
      const data = buf.getChannelData(0);
      for(let i = 0; i < data.length; i++){
        const env = Math.exp(-i / (ac.sampleRate * 0.006));
        data[i] = (Math.random() * 2 - 1) * env;
      }
      const src = ac.createBufferSource();
      src.buffer = buf;
      // High-pass to make it clicky, not bassy
      const hp = ac.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 1800;
      const g = ac.createGain();
      g.gain.setValueAtTime(vol * 0.18, t);
      src.connect(hp); hp.connect(g); g.connect(ac.destination);
      src.start(t);
    } catch(e){}
  }

  function startReel(){
    if(settings.mute || settings.muteFishing) return;
    stopReel();
    reelTickCount = 0;
    try {
      const ac = getCtx();
      const doReel = () => {
        // Start slow, speed up over ~0.5s — like a spool catching speed
        let delay = 120; // ms between clicks
        const minDelay = 38;
        function scheduleTick(){
          if(reelInterval === null) return;
          _reelTick(ac, settings.masterVolume);
          reelTickCount++;
          delay = Math.max(minDelay, delay * 0.88);
          reelInterval = setTimeout(scheduleTick, delay);
        }
        reelInterval = setTimeout(scheduleTick, 0);
      };
      if(ac.state === 'suspended'){ ac.resume().then(doReel); } else { doReel(); }
    } catch(e){}
  }

  function stopReel(){
    if(reelInterval !== null){ clearTimeout(reelInterval); reelInterval = null; }
  }

  // ── FISH / CHEST CAUGHT: wet splash thwack + line snap ──
  function fishCaught(rare=1){
    play((ac, vol) => {
      const t = ac.currentTime;

      // 1. Thump — low body impact (fish hits boat/deck)
      const thumpBuf = ac.createBuffer(1, Math.ceil(ac.sampleRate * 0.09), ac.sampleRate);
      const td = thumpBuf.getChannelData(0);
      for(let i = 0; i < td.length; i++){
        const env = Math.exp(-i / (ac.sampleRate * 0.028));
        td[i] = (Math.random() * 2 - 1) * env;
      }
      const thumpSrc = ac.createBufferSource();
      thumpSrc.buffer = thumpBuf;
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 180;
      const tg = ac.createGain();
      tg.gain.setValueAtTime(vol * 1.1, t);
      thumpSrc.connect(lp); lp.connect(tg); tg.connect(ac.destination);
      thumpSrc.start(t);

      // 2. Splash — broadband noise swell
      const splashLen = Math.ceil(ac.sampleRate * 0.28);
      const splashBuf = ac.createBuffer(1, splashLen, ac.sampleRate);
      const sd = splashBuf.getChannelData(0);
      for(let i = 0; i < splashLen; i++){
        const attack = Math.min(1, i / (ac.sampleRate * 0.018));
        const decay  = Math.exp(-i / (ac.sampleRate * 0.09));
        sd[i] = (Math.random() * 2 - 1) * attack * decay;
      }
      const splashSrc = ac.createBufferSource();
      splashSrc.buffer = splashBuf;
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 380; bp.Q.value = 0.5;
      const sg = ac.createGain();
      sg.gain.setValueAtTime(vol * 0.55, t + 0.008);
      splashSrc.connect(bp); bp.connect(sg); sg.connect(ac.destination);
      splashSrc.start(t + 0.008);

      // 3. Deep resonant thud ping — scales with rarity (lower, satisfying)
      const baseFreq = 120 + rare * 18;
      const osc = ac.createOscillator();
      const og = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(baseFreq, t + 0.04);
      osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.6, t + 0.35);
      og.gain.setValueAtTime(vol * 0.45, t + 0.04);
      og.gain.linearRampToValueAtTime(0, t + 0.50);
      osc.connect(og); og.connect(ac.destination);
      osc.start(t + 0.04); osc.stop(t + 0.55);
    }, 'fishing');
  }

  // ── QUEST COMPLETE ──
  function questDone(){
    play((ac, vol) => {
      const t = ac.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];
      notes.forEach((freq, i) => {
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, t + i * 0.09);
        g.gain.setValueAtTime(0, t + i * 0.09);
        g.gain.linearRampToValueAtTime(vol * 0.22, t + i * 0.09 + 0.04);
        g.gain.linearRampToValueAtTime(0, t + i * 0.09 + 0.32);
        osc.connect(g); g.connect(ac.destination);
        osc.start(t + i * 0.09); osc.stop(t + i * 0.09 + 0.35);
      });
    }, 'quest');
  }

  // ── SELL / COINS ──
  function coins(){
    play((ac, vol) => {
      const t = ac.currentTime;
      const freqs = [880, 1108, 1320];
      freqs.forEach((f, i) => {
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        g.gain.setValueAtTime(vol * 0.18, t + i * 0.06);
        g.gain.linearRampToValueAtTime(0, t + i * 0.06 + 0.18);
        osc.connect(g); g.connect(ac.destination);
        osc.start(t + i * 0.06); osc.stop(t + i * 0.06 + 0.2);
      });
    }, 'ui');
  }

  // ── PANEL OPEN: crisp high click ──
  function panelOpen(){
    play((ac, vol) => {
      const t = ac.currentTime;
      // Sharp attack transient
      const clickBuf = ac.createBuffer(1, Math.ceil(ac.sampleRate * 0.008), ac.sampleRate);
      const cd = clickBuf.getChannelData(0);
      for(let i = 0; i < cd.length; i++){
        cd[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.002));
      }
      const csrc = ac.createBufferSource();
      csrc.buffer = clickBuf;
      const hp2 = ac.createBiquadFilter(); hp2.type = 'highpass'; hp2.frequency.value = 3000;
      const cg = ac.createGain(); cg.gain.setValueAtTime(vol * 0.55, t);
      csrc.connect(hp2); hp2.connect(cg); cg.connect(ac.destination);
      csrc.start(t);
      // Bright chirp tail
      const osc = ac.createOscillator();
      const og = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1100, t + 0.004);
      osc.frequency.exponentialRampToValueAtTime(1600, t + 0.07);
      og.gain.setValueAtTime(vol * 0.14, t + 0.004);
      og.gain.linearRampToValueAtTime(0, t + 0.10);
      osc.connect(og); og.connect(ac.destination);
      osc.start(t + 0.004); osc.stop(t + 0.11);
    }, 'ui');
  }

  // ── PANEL CLOSE: lower dull thud ──
  function panelClose(){
    play((ac, vol) => {
      const t = ac.currentTime;
      // Dull low thump
      const thumpBuf = ac.createBuffer(1, Math.ceil(ac.sampleRate * 0.06), ac.sampleRate);
      const td = thumpBuf.getChannelData(0);
      for(let i = 0; i < td.length; i++){
        td[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.018));
      }
      const tsrc = ac.createBufferSource();
      tsrc.buffer = thumpBuf;
      const lp2 = ac.createBiquadFilter(); lp2.type = 'lowpass'; lp2.frequency.value = 320;
      const tg = ac.createGain(); tg.gain.setValueAtTime(vol * 0.50, t);
      tsrc.connect(lp2); lp2.connect(tg); tg.connect(ac.destination);
      tsrc.start(t);
      // Low descending tone
      const osc = ac.createOscillator();
      const og = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, t + 0.005);
      osc.frequency.exponentialRampToValueAtTime(280, t + 0.09);
      og.gain.setValueAtTime(vol * 0.13, t + 0.005);
      og.gain.linearRampToValueAtTime(0, t + 0.12);
      osc.connect(og); og.connect(ac.destination);
      osc.start(t + 0.005); osc.stop(t + 0.13);
    }, 'ui');
  }

  // ── BUTTON CLICK: plain neutral click (for in-panel buttons) ──
  function buttonClick(){
    play((ac, vol) => {
      const t = ac.currentTime;
      const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * 0.012), ac.sampleRate);
      const d = buf.getChannelData(0);
      for(let i = 0; i < d.length; i++){
        d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.003));
      }
      const src = ac.createBufferSource();
      src.buffer = buf;
      const hp3 = ac.createBiquadFilter(); hp3.type = 'highpass'; hp3.frequency.value = 2200;
      const g = ac.createGain(); g.gain.setValueAtTime(vol * 0.30, t);
      src.connect(hp3); hp3.connect(g); g.connect(ac.destination);
      src.start(t);
    }, 'ui');
  }

  // ── ERROR / CANT AFFORD ──
  function error(){
    play((ac, vol) => {
      const t = ac.currentTime;
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.linearRampToValueAtTime(140, t + 0.12);
      g.gain.setValueAtTime(vol * 0.14, t);
      g.gain.linearRampToValueAtTime(0, t + 0.15);
      osc.connect(g); g.connect(ac.destination);
      osc.start(t); osc.stop(t + 0.16);
    }, 'ui');
  }

  // ── CHEST HIT: woody thunk + coin shimmer ──
  function chestHit(){
    play((ac, vol) => {
      const t = ac.currentTime;

      // 1. Hollow wooden thunk
      const thunkBuf = ac.createBuffer(1, Math.ceil(ac.sampleRate * 0.14), ac.sampleRate);
      const td = thunkBuf.getChannelData(0);
      for(let i = 0; i < td.length; i++){
        const env = Math.exp(-i / (ac.sampleRate * 0.045));
        td[i] = (Math.random() * 2 - 1) * env;
      }
      const thunkSrc = ac.createBufferSource();
      thunkSrc.buffer = thunkBuf;
      const lp = ac.createBiquadFilter(); lp.type = 'bandpass'; lp.frequency.value = 200; lp.Q.value = 1.4;
      const tg = ac.createGain(); tg.gain.setValueAtTime(vol * 1.2, t);
      thunkSrc.connect(lp); lp.connect(tg); tg.connect(ac.destination);
      thunkSrc.start(t);

      // 2. Metal latch clank — kept but lowered frequency
      const clankBuf = ac.createBuffer(1, Math.ceil(ac.sampleRate * 0.09), ac.sampleRate);
      const cd = clankBuf.getChannelData(0);
      for(let i = 0; i < cd.length; i++){
        cd[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.022));
      }
      const clankSrc = ac.createBufferSource();
      clankSrc.buffer = clankBuf;
      const hp = ac.createBiquadFilter(); hp.type = 'bandpass'; hp.frequency.value = 600; hp.Q.value = 1.5;
      const cg = ac.createGain(); cg.gain.setValueAtTime(vol * 0.55, t + 0.03);
      clankSrc.connect(hp); hp.connect(cg); cg.connect(ac.destination);
      clankSrc.start(t + 0.03);

      // 3. Deep resonant chest boom — low descending tones (satisfying thud)
      [0, 0.07, 0.14].forEach((delay, i) => {
        const osc = ac.createOscillator();
        const og = ac.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(110 - i * 18, t + delay);
        osc.frequency.exponentialRampToValueAtTime(55 - i * 8, t + delay + 0.3);
        og.gain.setValueAtTime(vol * 0.38, t + delay);
        og.gain.linearRampToValueAtTime(0, t + delay + 0.38);
        osc.connect(og); og.connect(ac.destination);
        osc.start(t + delay); osc.stop(t + delay + 0.42);
      });
    }, 'fishing');
  }

  // ══════════════════════════════════════════════════════════════════════════
  // BACKGROUND MUSIC — Layered evolving arrangement, 4-loop cycle (~5:07)
  //
  // Structure: 4 × 32-bar loops at 100 BPM = 1024 half-beats = 307.2 s
  //
  //   Loop 0  (hb    0– 255,   0–76.8s)  — melody alone, very sparse
  //   Loop 1  (hb  256– 511,  77–154s)   — bass + chords fade in
  //   Loop 2  (hb  512– 767, 154–230s)   — woodblock + flute + strings enter
  //   Loop 3  (hb  768–1023, 230–307s)   — full arrangement; final 4 bars wind down:
  //     bars 28–30 (hb 992–1015): layers peel off one by one
  //     bar  31    (hb 1016):     final marimba cadence  G5→D5→G4
  //                               then big resonant G-major chord blooms & fades (~6s)
  //                               all other layers silent
  //   hb 1024 → cycle resets cleanly to loop 0
  //
  // ══════════════════════════════════════════════════════════════════════════
  let _musicStarted = false;
  let _musicGain    = null;
  let _musicTimer   = null;
  let _cycleStartHB = 0; // absolute _schedHB value at which current cycle began

  // Build frequency table from MIDI note numbers (A4=440 Hz, MIDI 69)
  function _mf(midi){ return 440 * Math.pow(2, (midi - 69) / 12); }
  const _N = {
    C2:_mf(36), G2:_mf(43), B2:_mf(47),
    C3:_mf(48), D3:_mf(50), E3:_mf(52), F3:_mf(53), G3:_mf(55), A3:_mf(57), B3:_mf(59),
    C4:_mf(60), D4:_mf(62), E4:_mf(64), F4:_mf(65), G4:_mf(67), A4:_mf(69), B4:_mf(71),
    C5:_mf(72), D5:_mf(74), E5:_mf(76), F5:_mf(77), G5:_mf(79), A5:_mf(81), B5:_mf(83),
    C6:_mf(84), D6:_mf(86), E6:_mf(88),
  };

  // ── MARIMBA note: sine + 4th harmonic, fast wood-like decay ──────────────
  function _marimba(ac, dest, freq, startT, vol, dur){
    try{
      const o1 = ac.createOscillator(); const g1 = ac.createGain();
      o1.type = 'sine'; o1.frequency.value = freq;
      g1.gain.setValueAtTime(vol, startT);
      g1.gain.setTargetAtTime(0, startT + 0.003, dur * 0.13);
      o1.connect(g1); g1.connect(dest);
      o1.start(startT); o1.stop(startT + dur + 0.3);
      const o2 = ac.createOscillator(); const g2 = ac.createGain();
      o2.type = 'sine'; o2.frequency.value = freq * 4;
      g2.gain.setValueAtTime(vol * 0.15, startT);
      g2.gain.setTargetAtTime(0, startT + 0.001, dur * 0.04);
      o2.connect(g2); g2.connect(dest);
      o2.start(startT); o2.stop(startT + dur * 0.2 + 0.05);
    }catch(e){}
  }

  // ── BANJO PLUCK bass: sawtooth -> low-pass, medium decay ─────────────────
  function _banjo(ac, dest, freq, startT, vol){
    try{
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sawtooth'; o.frequency.value = freq;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = freq * 3.5;
      g.gain.setValueAtTime(vol * 0.5, startT);
      g.gain.setTargetAtTime(0, startT + 0.008, 0.22);
      o.connect(lp); lp.connect(g); g.connect(dest);
      o.start(startT); o.stop(startT + 0.8);
    }catch(e){}
  }

  // ── ACCORDION chord pad: triangle detuned pair, slow attack ──────────────
  function _chord(ac, dest, freqs, startT, vol, dur){
    try{
      freqs.forEach((f, i) => {
        const o = ac.createOscillator(); const g = ac.createGain();
        o.type = 'triangle';
        o.frequency.value = f * (1 + (i % 2 === 0 ? 0.002 : -0.002));
        g.gain.setValueAtTime(0, startT);
        g.gain.linearRampToValueAtTime(vol * 0.055, startT + 0.06);
        g.gain.setTargetAtTime(0, startT + dur * 0.6, dur * 0.25);
        o.connect(g); g.connect(dest);
        o.start(startT); o.stop(startT + dur + 0.15);
      });
    }catch(e){}
  }

  // ── WOODBLOCK tick: filtered noise transient ──────────────────────────────
  function _wood(ac, dest, startT, vol, accent){
    try{
      const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * 0.025), ac.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*0.004));
      const src = ac.createBufferSource(); src.buffer = buf;
      const bp = ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=accent?900:1600; bp.Q.value=3;
      const g = ac.createGain(); g.gain.setValueAtTime(vol*(accent?0.12:0.07), startT);
      src.connect(bp); bp.connect(g); g.connect(dest);
      src.start(startT);
    }catch(e){}
  }

  // ── FLUTE / COUNTER-MELODY: pure sine, high register, breathy vibrato ────
  function _flute(ac, dest, freq, startT, vol, dur){
    try{
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      const lfo = ac.createOscillator(); const lfoG = ac.createGain();
      lfo.frequency.value = 5.5; lfoG.gain.value = freq * 0.012;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      lfo.start(startT); lfo.stop(startT + dur + 0.2);
      const nLen = Math.ceil(ac.sampleRate * (dur + 0.1));
      const nBuf = ac.createBuffer(1, nLen, ac.sampleRate);
      const nd = nBuf.getChannelData(0);
      for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1)*0.035;
      const nSrc = ac.createBufferSource(); nSrc.buffer = nBuf;
      const hp = ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=freq*1.4;
      const ng = ac.createGain(); ng.gain.setValueAtTime(vol*0.18, startT);
      nSrc.connect(hp); hp.connect(ng); ng.connect(dest);
      nSrc.start(startT);
      g.gain.setValueAtTime(0, startT);
      g.gain.linearRampToValueAtTime(vol, startT + 0.05);
      g.gain.setTargetAtTime(0, startT + dur * 0.75, dur * 0.18);
      o.connect(g); g.connect(dest);
      o.start(startT); o.stop(startT + dur + 0.25);
    }catch(e){}
  }

  // ── STRING PAD: warm saw + LP + slow attack/release ───────────────────────
  function _strings(ac, dest, freqs, startT, vol, dur){
    try{
      freqs.forEach((f, i) => {
        const o = ac.createOscillator(); const g = ac.createGain();
        o.type = 'sawtooth';
        o.frequency.value = f * (1 + (i === 0 ? 0.003 : i === 1 ? -0.003 : 0.006));
        const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = f * 2.5;
        g.gain.setValueAtTime(0, startT);
        g.gain.linearRampToValueAtTime(vol * 0.040, startT + 0.25);
        g.gain.setTargetAtTime(0, startT + dur * 0.72, dur * 0.22);
        o.connect(lp); lp.connect(g); g.connect(dest);
        o.start(startT); o.stop(startT + dur + 0.5);
      });
    }catch(e){}
  }

  // ── SUB-BASS PULSE: deep sine thump on beat 1 ─────────────────────────────
  function _subBass(ac, dest, freq, startT, vol){
    try{
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sine'; o.frequency.value = freq * 0.5;
      g.gain.setValueAtTime(vol * 0.65, startT);
      g.gain.exponentialRampToValueAtTime(0.0001, startT + 0.55);
      o.connect(g); g.connect(dest);
      o.start(startT); o.stop(startT + 0.6);
    }catch(e){}
  }

  // ── SHIMMER: high tinkly sine ping for swell peak ─────────────────────────
  function _shimmer(ac, dest, freq, startT, vol){
    try{
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(vol * 0.09, startT);
      g.gain.exponentialRampToValueAtTime(0.0001, startT + 0.55);
      o.connect(g); g.connect(dest);
      o.start(startT); o.stop(startT + 0.6);
    }catch(e){}
  }

  // ── FINAL CHORD: big resonant G-major bloom that fades over ~6 seconds ────
  // Called once at the downbeat of bar 31 in loop 3. All voices ring freely.
  function _finalChord(ac, dest, startT, vol){
    try{
      // Voices: G2, G3, B3, D4, G4, B4, D5, G5 — full G major stack
      const voices = [
        { f: _N.G2,  t:'sine',     v:0.55, att:0.12, decay:5.5 },
        { f: _N.G3,  t:'triangle', v:0.45, att:0.08, decay:5.0 },
        { f: _N.B3,  t:'triangle', v:0.38, att:0.10, decay:4.8 },
        { f: _N.D4,  t:'triangle', v:0.35, att:0.09, decay:4.5 },
        { f: _N.G4,  t:'sine',     v:0.30, att:0.07, decay:4.2 },
        { f: _N.B4,  t:'sine',     v:0.22, att:0.06, decay:3.8 },
        { f: _N.D5,  t:'sine',     v:0.16, att:0.05, decay:3.2 },
        { f: _N.G5,  t:'sine',     v:0.10, att:0.04, decay:2.6 },
      ];
      voices.forEach(v => {
        const o = ac.createOscillator(); const g = ac.createGain();
        o.type = v.t;
        o.frequency.value = v.f;
        // Slight detuning for warmth
        o.detune.value = (Math.random() - 0.5) * 6;
        g.gain.setValueAtTime(0, startT);
        g.gain.linearRampToValueAtTime(vol * v.v, startT + v.att);
        // Long exponential tail — resonance
        g.gain.exponentialRampToValueAtTime(0.0001, startT + v.decay);
        o.connect(g); g.connect(dest);
        o.start(startT); o.stop(startT + v.decay + 0.1);
      });
      // High shimmer sparkle at attack to make it feel like a struck chord
      [_N.G5, _N.D5, _N.B4, _N.G4].forEach((f, i) => {
        const o = ac.createOscillator(); const g2 = ac.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g2.gain.setValueAtTime(vol * 0.09, startT + i * 0.03);
        g2.gain.exponentialRampToValueAtTime(0.0001, startT + i * 0.03 + 1.2);
        o.connect(g2); g2.connect(dest);
        o.start(startT + i * 0.03); o.stop(startT + i * 0.03 + 1.3);
      });
    }catch(e){}
  }

  // ── MUSIC DATA ─────────────────────────────────────────────────────────────
  const BPM  = 100;
  const BEAT = 60 / BPM;        // 0.6 s
  const HB   = BEAT / 2;        // 0.3 s
  const BAR  = BEAT * 4;        // 2.4 s
  const TOTAL_BARS = 32;
  const TOTAL_HB   = TOTAL_BARS * 8;  // 256 half-beats per loop
  const CYCLE_HB   = TOTAL_HB * 4;   // 1024 half-beats = 4 loops = 307.2 s

  // Within a cycle, which half-beat is each structural boundary?
  // loop N starts at N * TOTAL_HB
  // bar B of loop N  = N*TOTAL_HB + B*8
  const OUTRO_START_HB = 3 * TOTAL_HB + 28 * 8; // hb 992 — bar 28 of loop 3
  const FINAL_BAR_HB   = 3 * TOTAL_HB + 31 * 8; // hb 1016 — bar 31 of loop 3

  const _CHORD_PROG = [
    [[_N.G3,_N.B3,_N.D4]], [[_N.D3,_N.A3,_N.D4]], [[_N.E3,_N.G3,_N.B3]], [[_N.C3,_N.G3,_N.E4]],
    [[_N.G3,_N.B3,_N.D4]], [[_N.D3,_N.A3,_N.D4]], [[_N.C3,_N.G3,_N.E4]], [[_N.G3,_N.B3,_N.D4]],
    [[_N.G3,_N.B3,_N.D4]], [[_N.E3,_N.G3,_N.B3]], [[_N.C3,_N.G3,_N.E4]], [[_N.D3,_N.A3,_N.D4]],
    [[_N.G3,_N.B3,_N.D4]], [[_N.D3,_N.A3,_N.D4]], [[_N.E3,_N.G3,_N.B3]], [[_N.C3,_N.G3,_N.E4]],
    [[_N.C3,_N.G3,_N.E4]], [[_N.G3,_N.B3,_N.D4]], [[_N.D3,_N.A3,_N.D4]], [[_N.E3,_N.G3,_N.B3]],
    [[_N.G3,_N.B3,_N.D4]], [[_N.D3,_N.A3,_N.D4]], [[_N.E3,_N.G3,_N.B3]], [[_N.C3,_N.G3,_N.E4]],
    [[_N.G3,_N.B3,_N.D4]], [[_N.E3,_N.G3,_N.B3]], [[_N.C3,_N.G3,_N.E4]], [[_N.D3,_N.A3,_N.D4]],
    [[_N.G3,_N.B3,_N.D4]], [[_N.D3,_N.A3,_N.D4]], [[_N.C3,_N.G3,_N.E4]], [[_N.G3,_N.B3,_N.D4]],
  ];

  const _STRING_PROG = [
    [_N.G3,_N.D4,_N.G4], [_N.D3,_N.A3,_N.D4], [_N.E3,_N.B3,_N.E4], [_N.C3,_N.G3,_N.C4],
    [_N.G3,_N.D4,_N.G4], [_N.D3,_N.A3,_N.D4], [_N.C3,_N.G3,_N.C4], [_N.G3,_N.D4,_N.G4],
    [_N.G3,_N.D4,_N.G4], [_N.E3,_N.B3,_N.E4], [_N.C3,_N.G3,_N.C4], [_N.D3,_N.A3,_N.D4],
    [_N.G3,_N.D4,_N.G4], [_N.D3,_N.A3,_N.D4], [_N.E3,_N.B3,_N.E4], [_N.C3,_N.G3,_N.C4],
    [_N.C3,_N.G3,_N.C4], [_N.G3,_N.D4,_N.G4], [_N.D3,_N.A3,_N.D4], [_N.E3,_N.B3,_N.E4],
    [_N.G3,_N.D4,_N.G4], [_N.D3,_N.A3,_N.D4], [_N.E3,_N.B3,_N.E4], [_N.C3,_N.G3,_N.C4],
    [_N.G3,_N.D4,_N.G4], [_N.E3,_N.B3,_N.E4], [_N.C3,_N.G3,_N.C4], [_N.D3,_N.A3,_N.D4],
    [_N.G3,_N.D4,_N.G4], [_N.D3,_N.A3,_N.D4], [_N.C3,_N.G3,_N.C4], [_N.G3,_N.D4,_N.G4],
  ];

  const _BASS_ROOT = [
    _N.G3,_N.D3,_N.E3,_N.C3,
    _N.G3,_N.D3,_N.C3,_N.G3,
    _N.G3,_N.E3,_N.C3,_N.D3,
    _N.G3,_N.D3,_N.E3,_N.C3,
    _N.C3,_N.G3,_N.D3,_N.E3,
    _N.G3,_N.D3,_N.E3,_N.C3,
    _N.G3,_N.E3,_N.C3,_N.D3,
    _N.G3,_N.D3,_N.C3,_N.G3,
  ];

  const _MEL = [
    [1,_N.D5],[3,_N.G5],[5,_N.A5],[6,_N.G5],[9,_N.E5],[11,_N.D5],
    [13,_N.B4],[15,_N.G4],
    [17,_N.A4],[19,_N.B4],[21,_N.D5],[23,_N.G5],
    [25,_N.A5],[27,_N.G5],[29,_N.E5],[31,_N.D5],
    [33,_N.G5],[35,_N.E5],[37,_N.D5],[38,_N.E5],
    [41,_N.G5],[43,_N.A5],[45,_N.G5],[47,_N.E5],
    [49,_N.D5],[51,_N.B4],[53,_N.D5],[55,_N.G5],
    [57,_N.A5],[59,_N.G5],[61,_N.E5],[63,_N.D5],
    [65,_N.B5],[67,_N.A5],[69,_N.G5],[71,_N.E5],
    [73,_N.D5],[75,_N.B4],[77,_N.D5],[79,_N.G5],
    [81,_N.A5],[83,_N.G5],[85,_N.E5],[87,_N.D5],
    [89,_N.B4],[91,_N.G4],[93,_N.A4],[95,_N.B4],
    [97,_N.D5],[99,_N.G5],[101,_N.A5],[103,_N.G5],
    [105,_N.E5],[107,_N.D5],[109,_N.B4],[111,_N.G4],
    [113,_N.B4],[115,_N.D5],[117,_N.G5],[119,_N.A5],
    [121,_N.G5],[123,_N.E5],[125,_N.D5],[127,_N.G5],
    [129,_N.A5],[131,_N.B5],[133,_N.A5],[135,_N.G5],
    [137,_N.E5],[139,_N.D5],[141,_N.G5],[143,_N.A5],
    [145,_N.B5],[147,_N.A5],[149,_N.G5],[151,_N.E5],
    [153,_N.D5],[155,_N.B4],[157,_N.D5],[159,_N.G5],
    [161,_N.G5],[162,_N.A5],[163,_N.G5],[165,_N.E5],[167,_N.D5],
    [169,_N.G5],[171,_N.A5],[173,_N.B5],[175,_N.A5],
    [177,_N.G5],[179,_N.E5],[181,_N.D5],[183,_N.B4],
    [185,_N.D5],[187,_N.G5],[189,_N.A5],[191,_N.G5],
    [193,_N.B5],[195,_N.A5],[197,_N.G5],[199,_N.E5],
    [201,_N.D5],[203,_N.G5],[205,_N.A5],[207,_N.G5],
    [209,_N.E5],[211,_N.D5],[213,_N.B4],[215,_N.D5],
    [217,_N.G5],[219,_N.E5],[221,_N.D5],[223,_N.B4],
    [225,_N.G4],[227,_N.B4],[229,_N.D5],[231,_N.G5],
    [233,_N.A5],[235,_N.G5],[237,_N.E5],[239,_N.D5],
    [241,_N.B4],[243,_N.D5],[245,_N.G5],[247,_N.A5],
    [249,_N.G5],[251,_N.E5],[253,_N.D5],[255,_N.G5],
  ];
  const _melMap = {};
  for(const [hb, f] of _MEL){ (_melMap[hb] || (_melMap[hb]=[])).push(f); }

  // Counter-melody (flute) — sparser arpeggios answering the main melody
  const _CTR_MEL = [
    [4,_N.B5],[8,_N.D6],[12,_N.C6],[16,_N.B5],
    [20,_N.A5],[24,_N.G5],[28,_N.A5],[32,_N.B5],
    [36,_N.D6],[40,_N.E6],[44,_N.D6],[48,_N.B5],
    [52,_N.A5],[56,_N.G5],[60,_N.A5],[64,_N.D6],
    [68,_N.E6],[72,_N.D6],[76,_N.B5],[80,_N.G5],
    [84,_N.A5],[88,_N.B5],[92,_N.D6],[96,_N.E6],
    [100,_N.D6],[104,_N.B5],[108,_N.A5],[112,_N.G5],
    [116,_N.A5],[120,_N.B5],[124,_N.D6],[128,_N.G5],
    [132,_N.A5],[136,_N.B5],[140,_N.D6],[144,_N.E6],
    [148,_N.D6],[152,_N.B5],[156,_N.A5],[160,_N.G5],
    [164,_N.B5],[168,_N.D6],[172,_N.E6],[176,_N.D6],
    [180,_N.B5],[184,_N.A5],[188,_N.G5],[192,_N.A5],
    [196,_N.B5],[200,_N.D6],[204,_N.E6],[208,_N.D6],
    [212,_N.B5],[216,_N.G5],[220,_N.A5],[224,_N.B5],
    [228,_N.D6],[232,_N.E6],[236,_N.D6],[240,_N.B5],
    [244,_N.A5],[248,_N.G5],[252,_N.B5],[256,_N.D6],
  ];
  const _ctrMap = {};
  for(const [hb, f] of _CTR_MEL){ (_ctrMap[hb % TOTAL_HB] || (_ctrMap[hb % TOTAL_HB]=[])).push(f); }

  // ── rolling scheduler ─────────────────────────────────────────────────────
  let _schedHB   = 0;
  let _schedTime = 0;
  const LOOKAHEAD = BEAT * 3;
  const INTERVAL  = BEAT * 1.5;

  // Per-cycle half-beat position (0 to CYCLE_HB-1)
  function _cycleHB(absHB){ return absHB - _cycleStartHB; }

  function _scheduleHB(ac, dest, absHB, t){
    const chb      = _cycleHB(absHB);           // position within cycle (0–1023)
    const loopIdx  = Math.floor(chb / TOTAL_HB); // which loop (0–3)
    const hbInLoop = chb % TOTAL_HB;             // position within the 32-bar loop
    const bar      = Math.floor(hbInLoop / 8);   // bar within loop (0–31)
    const hbInBar  = hbInLoop % 8;
    const baseVol  = settings.masterVolume * 0.13;

    // ── Is this the final bar of the cycle? (bar 31 of loop 3) ──
    const isFinalBar = (chb >= FINAL_BAR_HB);

    // ── Is this the outro wind-down? (bars 28–31 of loop 3) ──
    const isOutro = (chb >= OUTRO_START_HB);

    // Outro fade: how far into the 4-bar outro are we? (0→1 over bars 28–31)
    const outroFade = isOutro
      ? Math.max(0, Math.min(1, (chb - OUTRO_START_HB) / (FINAL_BAR_HB - OUTRO_START_HB + 8)))
      : 0;

    // ── Layer presence per loop ─────────────────────────────────────────────
    // ramp(x, s, e): x goes 0→1 as chb goes from s*TOTAL_HB to e*TOTAL_HB
    const loopT = chb / TOTAL_HB; // 0–4 continuous
    const ramp = (v, s, e) => Math.max(0, Math.min(1, (v - s) / Math.max(0.01, e - s)));

    // During outro, layers fade out progressively (outroFade 0→1 = full→silent)
    const outroDrop = isOutro ? (1 - outroFade) : 1;

    const lMelody  = ramp(loopT, 0.0, 0.25);                        // loop 0 fade-in
    const lBass    = ramp(loopT, 0.5, 1.0)  * outroDrop;            // drops at bar 28
    const lChord   = ramp(loopT, 1.0, 1.5)  * (isOutro ? Math.max(0, 1 - outroFade * 2) : 1); // drops early
    const lWood    = ramp(loopT, 1.5, 2.0)  * (isOutro ? Math.max(0, 1 - outroFade * 2.5) : 1);
    const lCounter = ramp(loopT, 2.0, 2.5)  * (isOutro ? Math.max(0, 1 - outroFade * 3) : 1);
    const lStrings = ramp(loopT, 2.5, 3.0)  * outroDrop;
    const lSub     = ramp(loopT, 3.0, 3.5)  * (isOutro ? Math.max(0, 1 - outroFade * 4) : 1);
    // Swell shimmer peaks at loop 3.5–3.9, gone before final bar
    const lSwell   = ramp(loopT, 3.4, 3.7) * (1 - ramp(loopT, 3.7, 3.88));

    // ── FINAL BAR: suppress everything except the closing cadence ──
    if(isFinalBar){
      // Only fire the final closing cadence notes and the big chord — no rhythm, no bass
      // Closing cadence: a short marimba run descending to home G, played across bar 31
      //   hbInBar 0: D5 (penultimate)
      //   hbInBar 2: B4
      //   hbInBar 4: G5 (final arrival — the "last note")
      // Then the big chord fires right after hbInBar 4
      const cadVol = baseVol * 1.15;
      if(hbInBar === 0){ _marimba(ac, dest, _N.D5,  t, cadVol, 0.5); }
      if(hbInBar === 2){ _marimba(ac, dest, _N.B4,  t, cadVol, 0.5); }
      if(hbInBar === 4){
        _marimba(ac, dest, _N.G5, t,         cadVol * 1.2, 0.6);
        _marimba(ac, dest, _N.G4, t + HB,    cadVol * 0.8, 0.5); // echo an octave down
        _marimba(ac, dest, _N.G3, t + HB*2,  cadVol * 0.6, 0.5); // settle to root
        // Big resonant final chord fires a half-beat after the top note
        _finalChord(ac, dest, t + HB, baseVol * 1.3);
      }
      // hbInBar 5–7: silence — let the chord ring
      return;
    }

    // ── Layer 0: Marimba melody ──
    if(lMelody > 0){
      const melVol = baseVol * lMelody * (1 + lSwell * 0.55);
      const mfreqs = _melMap[hbInLoop];
      if(mfreqs){ for(const f of mfreqs) _marimba(ac, dest, f, t, melVol, 0.38); }
    }

    // ── Layer 1: Banjo bass pluck ──
    if(lBass > 0){
      const bVol = baseVol * lBass * 1.1 * (1 + lSwell * 0.3);
      if(hbInBar === 0 || hbInBar === 4){
        const root = _BASS_ROOT[bar % _BASS_ROOT.length];
        _banjo(ac, dest, root, t, bVol);
        if(hbInBar === 4) _banjo(ac, dest, root * 1.5, t + HB * 0.5, bVol * 0.5);
      }
      if(hbInBar === 2 || hbInBar === 6){
        const root = _BASS_ROOT[bar % _BASS_ROOT.length];
        _banjo(ac, dest, root, t, bVol * 0.5);
      }
    }

    // ── Layer 2: Accordion chord pad ──
    if(lChord > 0 && hbInBar === 0){
      const cVol = baseVol * lChord * (1 + lSwell * 0.4);
      const chordFreqs = _CHORD_PROG[bar % _CHORD_PROG.length][0];
      _chord(ac, dest, chordFreqs, t, cVol, BAR * 0.85);
    }

    // ── Layer 3: Woodblock percussion ──
    if(lWood > 0){
      const wVol = baseVol * lWood * (1 + lSwell * 0.3);
      if(hbInBar === 0 || hbInBar === 4) _wood(ac, dest, t, wVol, true);
      else if(hbInBar === 2 || hbInBar === 6) _wood(ac, dest, t, wVol, false);
    }

    // ── Layer 4: Flute counter-melody ──
    if(lCounter > 0){
      const fVol = baseVol * lCounter * 0.9 * (1 + lSwell * 0.4);
      const cfreqs = _ctrMap[hbInLoop];
      if(cfreqs){ for(const f of cfreqs) _flute(ac, dest, f, t, fVol, HB * 1.6); }
    }

    // ── Layer 5: String pad ──
    if(lStrings > 0 && hbInBar === 0){
      const sVol = baseVol * lStrings * (1 + lSwell * 0.5);
      _strings(ac, dest, _STRING_PROG[bar % _STRING_PROG.length], t, sVol, BAR * 0.9);
    }

    // ── Layer 6: Sub-bass pulse ──
    if(lSub > 0 && hbInBar === 0){
      const subVol = baseVol * lSub * 1.4 * (1 + lSwell * 0.3);
      _subBass(ac, dest, _BASS_ROOT[bar % _BASS_ROOT.length], t, subVol);
    }

    // ── Swell shimmer ──
    if(lSwell > 0.05 && (hbInBar === 0 || hbInBar === 4)){
      const shimVol = baseVol * lSwell * 0.7;
      const shimFreqs = [_N.B5, _N.D6, _N.G5, _N.A5, _N.E6];
      const sf = shimFreqs[(absHB + bar) % shimFreqs.length];
      _shimmer(ac, dest, sf, t, shimVol);
      _shimmer(ac, dest, sf * 2, t + HB * 0.33, shimVol * 0.5);
    }
  }

  function _musicTick(){
    if(!_musicStarted || !_musicGain) return;
    try{
      const ac = getCtx();
      if(ac.state === 'suspended') return;
      const horizon = ac.currentTime + LOOKAHEAD;

      while(true){
        const hbTime = _schedTime + _schedHB * HB;
        if(hbTime > horizon) break;

        // Check if we've completed a full cycle — if so, reset cycle counter
        const chb = _schedHB - _cycleStartHB;
        if(chb >= CYCLE_HB){
          _cycleStartHB = _schedHB;
        }

        _scheduleHB(ac, _musicGain, _schedHB, hbTime);
        _schedHB++;
      }
    }catch(e){}
    _musicTimer = setTimeout(_musicTick, INTERVAL * 1000 * 0.5);
  }

  function startMusic(){
    if(_musicStarted) return;
    _musicStarted = true;
    try{
      const ac = getCtx();
      const doStart = () => {
        _musicGain = ac.createGain();
        const shouldMute = settings.mute || settings.muteMusic;
        _musicGain.gain.setValueAtTime(shouldMute ? 0 : 1.0, ac.currentTime);
        _musicGain.connect(ac.destination);
        _schedHB      = 0;
        _cycleStartHB = 0;
        _schedTime    = ac.currentTime + 0.08;
        if(!shouldMute) _musicTick();
      };
      if(ac.state === 'suspended'){ ac.resume().then(doStart); } else { doStart(); }
    }catch(e){}
  }

  function stopMusic(){
    _musicStarted = false;
    if(_musicTimer !== null){ clearTimeout(_musicTimer); _musicTimer = null; }
    if(_musicGain){ try{ _musicGain.disconnect(); }catch(e){} _musicGain = null; }
  }

  function syncMusicVolume(){
    const shouldMute = settings.mute || settings.muteMusic;
    if(_musicGain){
      try{
        const ac = getCtx();
        const now = ac.currentTime;
        if(shouldMute){
          _musicGain.gain.setTargetAtTime(0, now, 0.04);
        } else {
          _musicGain.gain.setTargetAtTime(1.0, now, 0.04);
        }
      }catch(e){}
    }
    if(shouldMute && _musicTimer !== null){
      clearTimeout(_musicTimer); _musicTimer = null;
    } else if(!shouldMute && _musicStarted && _musicTimer === null){
      try{
        const ac = getCtx();
        _schedTime = ac.currentTime - _schedHB * HB + 0.08;
        _musicTick();
      }catch(e){ _musicTick(); }
    }
  }

  return { settings, startReel, stopReel, fishCaught, questDone, coins, panelOpen, panelClose, buttonClick, error, chestHit, startMusic, stopMusic, syncMusicVolume, getCtx,
    get masterVolume(){ return settings.masterVolume; },
    set masterVolume(v){ settings.masterVolume = v; }
  };
})();

// Rod tier requirement per map (min rod rank needed)
// Ranks: wood=0, steel=1, gold=2, mythic=3, elemental=4
const ROD_RANK = { wood:0, steel:1, gold:2, mythic:3, elemental:4 };
const MAP_ROD_REQ = {
  bay:0, reef:0,
  deep:0, lava:0, ice:1,
  mangrove:1, crystal:1, storm:1, jungle:2,
  toxic:2, desert:2, moon:3, void:3, heaven:3,
  galaxy:4,
  forge:4
};
function rodRankOk(mapId){ return ROD_RANK[game.rod] >= (MAP_ROD_REQ[mapId]||0); }
function rodNeededFor(mapId){
  const need = MAP_ROD_REQ[mapId]||0;
  return Object.keys(ROD_RANK).find(k=>ROD_RANK[k]===need)||'wood';
}

// Boat tier requirement per map
// Ranks: dinghy=0, sloop=1, galleon=2, leviathan=3
const BOAT_RANK = { dinghy:0, sloop:1, galleon:2, leviathan:3 };
const MAP_BOAT_REQ = {
  bay:0, reef:0, deep:0, lava:1, ice:1,
  mangrove:1, crystal:1, storm:1, jungle:1,
  toxic:2, desert:2, moon:2,
  void:3, heaven:3, galaxy:3,
  forge:3
};
function boatRankOk(mapId){ return BOAT_RANK[game.boat||'dinghy'] >= (MAP_BOAT_REQ[mapId]||0); }
function boatNeededFor(mapId){
  const need = MAP_BOAT_REQ[mapId]||0;
  return boats.find(b=>BOAT_RANK[b.id]===need)||boats[0];
}
// Returns the highest map id the current boat can legally sail on
function bestMapForBoat(){
  const rank = BOAT_RANK[game.boat||'dinghy']||0;
  // iterate maps in reverse to find the highest eligible one that is also unlocked
  let best = maps[0];
  for(const m of maps){
    if((MAP_BOAT_REQ[m.id]||0) <= rank && game.unlockedMaps[m.id]) best = m;
  }
  return best;
}

function chooseVariant(typeId){
  let goldenChance = 1 + game.upgrades.luck * .5 + (game.potions.luck>0 ? 5 : 0) + (game.mutationBaitActive ? 18 : 0);
  let rainbowChance = .125 + game.upgrades.luck * .125 + (game.potions.luck>0 ? 2 : 0) + (game.mutationBaitActive ? 8 : 0);
  if(typeId >= 5){ goldenChance += 2; rainbowChance += 1; }
  const r = rand(0,100);
  if(r < rainbowChance) return { id:'rainbow', label:'Rainbow', mult:5, border:'#ff4dff' };
  if(r < rainbowChance + goldenChance) return { id:'golden', label:'Golden', mult:2.5, border:'#ffd700' };
  return null;
}

function roundRect(x,y,w,h,r,fill,stroke,lw=2){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();} if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}

function fishGradient(f, w, h, variant){
  const isRainbow = f.rainbow || (variant && variant.id === 'rainbow');
  const isGolden = f.golden || (variant && variant.id === 'golden');
  if(isRainbow){
    const g = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
    g.addColorStop(0, '#ff4757');
    g.addColorStop(0.2, '#ffa502');
    g.addColorStop(0.4, '#2ed573');
    g.addColorStop(0.6, '#1e90ff');
    g.addColorStop(0.8, '#a55eea');
    g.addColorStop(1, '#ff6b81');
    return g;
  }
  if(isGolden){
    const g = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
    g.addColorStop(0, '#fff7a1');
    g.addColorStop(0.3, '#ffd32a');
    g.addColorStop(0.7, '#f9ca24');
    g.addColorStop(1, '#e1a800');
    return g;
  }
  const g = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
  g.addColorStop(0, 'white');
  g.addColorStop(0.2, f.body);
  g.addColorStop(1, f.fin);
  return g;
}

    ctx.lineTo(-w*0.95, 0);
    ctx.lineTo(-w*0.85, h*0.24);
    ctx.lineTo(-w*0.8, h*0.02);
    ctx.lineTo(-w*0.72, h*0.25);
    ctx.closePath();

  // =========================
  // NEW MONSTER TAILS
  // =========================

  }else if(tail === 'serpent'){
    ctx.moveTo(-w*0.45, 0);

    ctx.quadraticCurveTo(
      -w*0.72, -h*0.06,
      -w*1.02, -h*0.28
    );

    ctx.quadraticCurveTo(
      -w*0.82, 0,
      -w*1.02, h*0.28
    );

    ctx.quadraticCurveTo(
      -w*0.72, h*0.06,
      -w*0.45, 0
    );

    ctx.closePath();

  }else if(tail === 'dragon'){
    ctx.moveTo(-w*0.48, 0);

    ctx.lineTo(-w*0.72, -h*0.14);
    ctx.lineTo(-w*0.86, -h*0.34);
    ctx.lineTo(-w*1.02, 0);

    ctx.lineTo(-w*0.86, h*0.34);
    ctx.lineTo(-w*0.72, h*0.14);

    ctx.closePath();

  }else if(tail === 'tentacle'){
    // Kraken tentacles
    for(let i = -2; i <= 2; i++){
      const oy = i * h*0.08;

      ctx.moveTo(-w*0.42, oy);

      ctx.quadraticCurveTo(
        -w*0.7,
        oy + h*0.06,
        -w*(0.9 + Math.random()*0.12),
        oy + h*(0.12*i)
      );
    }

    ctx.lineWidth = 5;
    ctx.strokeStyle = color;
    ctx.stroke();
    return;

  }else if(tail === 'hydra'){
    // Multiple tails/necks
    ctx.moveTo(-w*0.45, 0);

    ctx.quadraticCurveTo(
      -w*0.72, -h*0.32,
      -w*0.96, -h*0.42
    );

    ctx.moveTo(-w*0.45, 0);

    ctx.quadraticCurveTo(
      -w*0.84, 0,
      -w*1.02, 0
    );

    ctx.moveTo(-w*0.45, 0);

    ctx.quadraticCurveTo(
      -w*0.72, h*0.32,
      -w*0.96, h*0.42
    );

    ctx.lineWidth = 7;
    ctx.strokeStyle = color;
    ctx.stroke();
    return;

  }else if(tail === 'leviathan'){
    ctx.moveTo(-w*0.48, 0);

    ctx.lineTo(-w*0.82, -h*0.28);
    ctx.lineTo(-w*1.05, -h*0.08);

    ctx.lineTo(-w*0.92, 0);

    ctx.lineTo(-w*1.05, h*0.08);
    ctx.lineTo(-w*0.82, h*0.28);

    ctx.closePath();

  }else if(tail === 'chimera'){
    // Chimera tail: serpent-tail with a secondary barb/spike branching off
    // Main serpent whip
    ctx.moveTo(-w*0.44, 0);
    ctx.quadraticCurveTo(-w*0.68, h*0.08, -w*0.9, h*0.18);
    ctx.lineWidth = 6; ctx.strokeStyle = color; ctx.stroke();
    ctx.beginPath();
    // Venomous barb branching upward from mid-tail
    ctx.moveTo(-w*0.66, 0.04*h);
    ctx.lineTo(-w*0.92, -h*0.28);
    ctx.lineWidth = 5; ctx.strokeStyle = color; ctx.stroke();
    ctx.beginPath();
    // Arrowhead tip on barb
    ctx.moveTo(-w*0.92, -h*0.28);
    ctx.lineTo(-w*0.84, -h*0.18);
    ctx.lineTo(-w*1.0, -h*0.22);
    ctx.closePath();

  }else if(tail === 'phoenix'){
    // Phoenix tail: wide flame-fan spread like a peacock/tail feather burst
    // Five flame streaks fanning out
    const flameAngles = [-0.55, -0.27, 0, 0.27, 0.55];
    for(let fi = 0; fi < flameAngles.length; fi++){
      const fa = flameAngles[fi];
      const fl = 0.7 + Math.abs(fi - 2) * 0.06; // outer feathers slightly shorter
      ctx.moveTo(-w*0.46, 0);
      ctx.quadraticCurveTo(
        -w*0.68 + Math.sin(fa)*w*0.08, Math.sin(fa)*h*0.3,
        -w*fl + Math.sin(fa)*w*0.18, Math.sin(fa)*h*0.48
      );
    }
    ctx.lineWidth = 4; ctx.strokeStyle = color; ctx.stroke();
    return;

  }else if(tail === 'wyrm'){
    ctx.moveTo(-w*0.45, 0);

    ctx.lineTo(-w*0.68, -h*0.1);
    ctx.lineTo(-w*0.88, -h*0.24);
    ctx.lineTo(-w*1.02, 0);

    ctx.lineTo(-w*0.88, h*0.24);
    ctx.lineTo(-w*0.68, h*0.1);

    ctx.closePath();

  }else{
    ctx.moveTo(-w*0.47, 0);
    ctx.lineTo(-w*0.72, -h*0.32);
    ctx.lineTo(-w*0.72, h*0.32);
    ctx.closePath();
  }

  ctx.fill();
}

function drawFishPattern(pattern, w, h){
  if(pattern === 'none') return;

  if(pattern === 'stripe'){
    ctx.fillStyle = 'rgba(255,255,255,.20)';
    for(let i=-2;i<=2;i++) ctx.fillRect(-w*0.1 + i*18, -h*0.32, 8, h*0.64);
  }
  else if(pattern === 'spot' || pattern === 'dot'){
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    for(let i=0;i<6;i++){
      ctx.beginPath();
      ctx.arc(-w*0.12 + (i%3)*22, -h*0.12 + Math.floor(i/3)*24, 5, 0, Math.PI*2);
      ctx.fill();
    }
  }
  else if(pattern === 'finstripe'){
    ctx.strokeStyle = 'rgba(255,255,255,.28)';
    ctx.lineWidth = 3;
    for(let i=-1;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.12 + i*18, -h*0.26);
      ctx.lineTo(-w*0.02 + i*18, h*0.26);
      ctx.stroke();
    }
  }
  else if(pattern === 'line'){
    ctx.strokeStyle = 'rgba(255,255,255,.25)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-w*0.25, 0);
    ctx.lineTo(w*0.28, 0);
    ctx.stroke();
  }
  else if(pattern === 'shadow'){
    ctx.fillStyle = 'rgba(0,0,0,.18)';
    ctx.fillRect(-w*0.1, -h*0.28, w*0.35, h*0.56);
  }
  else if(pattern === 'lava' || pattern === 'crack'){
    ctx.strokeStyle = 'rgba(255,220,120,.45)';
    ctx.lineWidth = 3;
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.15 + i*22, -h*0.22);
      ctx.lineTo(-w*0.05 + i*22, -h*0.02);
      ctx.lineTo(-w*0.12 + i*22, h*0.2);
      ctx.stroke();
    }
  }
  else if(pattern === 'ice'){
    ctx.strokeStyle = 'rgba(255,255,255,.42)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-w*0.2, -h*0.12); ctx.lineTo(w*0.1, h*0.08);
    ctx.moveTo(-w*0.08, -h*0.24); ctx.lineTo(w*0.18, 0);
    ctx.moveTo(-w*0.12, h*0.2); ctx.lineTo(w*0.12, -h*0.02);
    ctx.stroke();
  }
  else if(pattern === 'leaf'){
    ctx.strokeStyle = 'rgba(255,255,255,.24)';
    ctx.lineWidth = 3;
    for(let i=-1;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.18 + i*18, 0);
      ctx.lineTo(-w*0.06 + i*18, -h*0.18);
      ctx.stroke();
    }
  }
  else if(pattern === 'mud'){
    ctx.fillStyle = 'rgba(90,60,30,.22)';
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.arc(-w*0.12 + i*16, (i%2===0?-1:1)*10, 7, 0, Math.PI*2);
      ctx.fill();
    }
  }
  else if(pattern === 'crystal'){
    ctx.strokeStyle = 'rgba(255,255,255,.45)';
    ctx.lineWidth = 2;
    for(let i=0;i<4;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.12 + i*18, -h*0.18);
      ctx.lineTo(-w*0.04 + i*18, 0);
      ctx.lineTo(-w*0.12 + i*18, h*0.18);
      ctx.stroke();
    }
  }
  else if(pattern === 'bolt'){
    ctx.strokeStyle = 'rgba(255,255,180,.55)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-w*0.14, -h*0.18);
    ctx.lineTo(-w*0.02, -h*0.02);
    ctx.lineTo(-w*0.1, h*0.02);
    ctx.lineTo(w*0.06, h*0.2);
    ctx.stroke();
  }
  else if(pattern === 'tiger'){
    ctx.strokeStyle = 'rgba(90,40,10,.45)';
    ctx.lineWidth = 4;
    for(let i=-1;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.16 + i*18, -h*0.24);
      ctx.lineTo(-w*0.02 + i*18, h*0.18);
      ctx.stroke();
    }
  }
  else if(pattern === 'toxic'){
    ctx.fillStyle = 'rgba(255,255,140,.35)';
    for(let i=0;i<6;i++){
      ctx.beginPath();
      ctx.arc(-w*0.12 + (i%3)*20, -h*0.1 + Math.floor(i/3)*24, 6, 0, Math.PI*2);
      ctx.fill();
    }
  }
  else if(pattern === 'sand'){
    ctx.fillStyle = 'rgba(255,255,255,.18)';
    for(let i=0;i<12;i++){
      ctx.fillRect(-w*0.2 + i*10, -h*0.12 + (i%2)*10, 4, 4);
    }
  }
  else if(pattern === 'wave'){
    ctx.strokeStyle = 'rgba(255,255,255,.30)';
    ctx.lineWidth = 2;
    for(let i=0;i<2;i++){
      ctx.beginPath();
      for(let x=-w*0.18;x<=w*0.18;x+=10){
        const y = Math.sin((x + i*20) * 0.15) * 5 + (i===0?-8:8);
        if(x===-w*0.18) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
  }
  else if(pattern === 'moon'){
    ctx.fillStyle = 'rgba(255,255,255,.22)';
    ctx.beginPath();
    ctx.arc(0, 0, h*0.12, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,.18)';
    ctx.beginPath();
    ctx.arc(h*0.05, -h*0.02, h*0.1, 0, Math.PI*2);
    ctx.fill();
  }
  else if(pattern === 'star'){
    ctx.fillStyle = 'rgba(255,255,255,.7)';
    for(let i=0;i<5;i++){
      const sx = -w*0.12 + i*18;
      const sy = i%2===0 ? -h*0.08 : h*0.08;
      ctx.fillRect(sx-1, sy-5, 2, 10);
      ctx.fillRect(sx-5, sy-1, 10, 2);
    }
  }
  else if(pattern === 'void'){
    ctx.fillStyle = 'rgba(140,100,255,.22)';
    ctx.beginPath();
    ctx.arc(0, 0, h*0.18, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,.28)';
    ctx.beginPath();
    ctx.arc(0, 0, h*0.08, 0, Math.PI*2);
    ctx.fill();
  }
  else if(pattern === 'cloud'){
    ctx.fillStyle = 'rgba(255,255,255,.30)';
    ctx.beginPath();
    ctx.arc(-10, 2, 9, 0, Math.PI*2);
    ctx.arc(0, -4, 10, 0, Math.PI*2);
    ctx.arc(12, 2, 8, 0, Math.PI*2);
    ctx.fill();
  }
  else if(pattern === 'galaxy'){
    ctx.fillStyle = 'rgba(255,255,255,.65)';
    for(let i=0;i<8;i++){
      ctx.beginPath();
      ctx.arc(-w*0.16 + i*12, Math.sin(i)*10, 2.5, 0, Math.PI*2);
      ctx.fill();
    }
  }
  else if(pattern === 'glowdot'){
    ctx.fillStyle = 'rgba(255,255,180,.65)';
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.arc(-w*0.12 + i*16, 0, 4, 0, Math.PI*2);
      ctx.fill();
    }
  }
  else if(pattern === 'gold'){
    ctx.strokeStyle = 'rgba(255,255,255,.35)';
    ctx.lineWidth = 3;
    for(let i=-1;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.14 + i*18, -h*0.2);
      ctx.lineTo(-w*0.04 + i*18, h*0.2);
      ctx.stroke();
    }
  }
  else if(pattern === 'rainbow'){
    // Shimmer bands across the body
    const colors = ['rgba(255,71,87,.3)','rgba(255,165,2,.3)','rgba(46,213,115,.3)','rgba(30,144,255,.3)','rgba(165,94,234,.3)'];
    for(let i=0;i<colors.length;i++){
      ctx.fillStyle = colors[i];
      ctx.fillRect(-w*0.18 + i*w*0.09, -h*0.32, w*0.07, h*0.64);
    }
    ctx.strokeStyle = 'rgba(255,255,255,.25)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-w*0.18, 0); ctx.lineTo(w*0.28, 0);
    ctx.stroke();
  }
}
class Fish{
  constructor() {
    const map = currentMap();
    const rareBoost = map.rare + game.upgrades.luck * .25 + (game.potions.luck > 0 ? 24 : 0) + (game.mapBaitActive ? 35 : 0);
    const fishPool = fishTypesByMap[map.id] || fishTypesByMap.bay;

    // 1. Calculate pool total with a dampened, subtle boost
    let totalChance = 0;
    for (const f of fishPool) {
      let ch = f.chance;
      if (f.id >= 4) {
        // Asymptotically dampens the rareBoost so it can NEVER exceed a modest cap.
        // Formula: base_chance * (1 + (max_extra_multiplier * boost / (boost + scaling_factor)))
        // This ensures even a rareBoost of 500 only gives a controlled, gentle lift.
        const maxExtraMult = f.id === 4 ? 0.25 : 0.40; // Max +25% for Golden, +40% for Rainbow
        const dampeningFactor = 50; // Higher = slower, subtler scaling
        const subtleMultiplier = 1 + (maxExtraMult * rareBoost / (rareBoost + dampeningFactor));
        
        ch = ch * subtleMultiplier;
      }
      totalChance += ch;
    }

    // 2. Roll a random number between 0 and the dynamic total chance
    let roll = rand(0, totalChance);
    let acc = 0;
    let chosen = fishPool[0];

    // 3. Run the selection match accurately
    for (const f of fishPool) {
      let ch = f.chance;
      if (f.id >= 4) {
        const maxExtraMult = f.id === 4 ? 0.25 : 0.40;
        const dampeningFactor = 50;
        const subtleMultiplier = 1 + (maxExtraMult * rareBoost / (rareBoost + dampeningFactor));
        
        ch = ch * subtleMultiplier;
      }
      acc += ch;
      if (roll <= acc) { 
        chosen = f; 
        break; 
      }
    }

    // 4. Clean fallback allocation 
    this.type = { ...chosen};
    this.variant = chooseVariant(chosen.id);
    this.dir = Math.random() < .5 ? -1 : 1;
    this.w = 140 * chosen.size; 
    this.h = 70 * chosen.size;
    this.x = this.dir === 1 ? -this.w - rand(0, 500) : W + rand(0, 500);
    this.y = rand(245, 735);
    this.baseSpeed = rand(2.2, 4.8) + (chosen.id * .18) + (map.fishBonus * .05);
    this.speed = this.baseSpeed;
    this.bob = rand(0, Math.PI * 2);
    // Tail wag — side-to-side oscillation (horizontal plane)
    this.wagPhase = rand(0, Math.PI * 2);
    this.wagSpeed = rand(3.5, 6.5) + chosen.id * 0.4; // faster for rare fish
    this.wagAmp   = rand(0.075, 0.15);                  // wag sweep angle in radians
    // Dash behaviour
    this.dashCooldown = rand(2000, 6000); // ms until first dash
    this.dashing = false;
    this.dashDuration = 0;
    this.dashMult = rand(2.4, 3.8) + chosen.id * 0.3; // rarer = more violent dash
    this.caught = false;
  }
  move(dt){
    if(this.caught) return;
    this.bob += dt * .005;
    this.wagPhase += dt * .001 * this.wagSpeed;

    // Dash logic
    if(!this.dashing){
      this.dashCooldown -= dt;
      if(this.dashCooldown <= 0){
        this.dashing = true;
        this.dashDuration = rand(300, 600);  // ms
        this.speed = this.baseSpeed * this.dashMult;
        // Sharpen wag during dash
        this._savedWagAmp = this.wagAmp;
        this.wagAmp = Math.min(0.45, this.wagAmp * 2.5);
        this.wagSpeed *= 1.8;
      }
    } else {
      this.dashDuration -= dt;
      if(this.dashDuration <= 0){
        this.dashing = false;
        this.speed = this.baseSpeed;
        this.wagAmp = this._savedWagAmp;
        this.wagSpeed /= 1.8;
        this.dashCooldown = rand(3000, 8000);
      }
    }

    this.x += this.dir * this.speed * dt * .06;
    if(this.x > W + this.w + 60 || this.x < -this.w - 60) Object.assign(this, new Fish());
  }
draw(){
  const f = this.type, bob = Math.sin(this.bob) * 4;
  const v = this.variant;
  const isGolden = f.golden || (v && v.id === 'golden');
  const isRainbow = f.rainbow || (v && v.id === 'rainbow');

  // Lateral tail wag: oscillates left-right (around the fish's vertical axis at the tail root)
  const wagAngle = Math.sin(this.wagPhase) * (this.wagAmp || 0.2);

  ctx.save();
  ctx.translate(this.x + this.w/2, this.y + this.h/2 + bob);
  ctx.scale(this.dir, 1);

  // Dash visual: ghost trail behind fish
  if(this.dashing){
    for(let g = 1; g <= 3; g++){
      ctx.save();
      ctx.globalAlpha = 0.12 * (4 - g);
      ctx.translate(-g * 14, 0);
      ctx.fillStyle = f.body || '#fff';
      traceFishBody(f.shape || 'round', this.w * 0.9, this.h * 0.9);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  if(f.glow || isRainbow){
    ctx.shadowColor = isRainbow ? 'rgba(255,255,255,.85)' : f.fin;
    ctx.shadowBlur = this.dashing ? 28 : 18;
    ctx.shadowOffsetY = 0;
  }else if(isGolden){
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = this.dashing ? 24 : 16;
    ctx.shadowOffsetY = 0;
  }else{
    ctx.shadowColor = f.id >= 4 ? 'rgba(255,255,255,.35)' : 'rgba(0,0,0,.25)';
    ctx.shadowBlur = f.id >= 4 ? 12 : 7;
    ctx.shadowOffsetY = 4;
  }

  // Draw tail with lateral wag applied — pivot around rear of body
  ctx.save();
  // Tail root is roughly at (-w*0.44, 0) in local space
  const tailRootX = -this.w * 0.44;
  ctx.translate(tailRootX, 0);
  ctx.rotate(wagAngle);
  ctx.translate(-tailRootX, 0);
  drawTailShape(f.tail || 'triangle', this.w, this.h, isGolden ? '#e1a800' : (isRainbow ? '#ff6b81' : f.fin));
  ctx.restore();

  ctx.fillStyle = fishGradient(f, this.w, this.h, v);
  traceFishBody(f.shape || 'round', this.w, this.h);
  ctx.fill();

  ctx.save();
  traceFishBody(f.shape || 'round', this.w, this.h);
  ctx.clip();
  if(isGolden) drawFishPattern('gold', this.w, this.h);
  else if(isRainbow) drawFishPattern('rainbow', this.w, this.h);
  else drawFishPattern(f.pattern || 'none', this.w, this.h);
  ctx.restore();

  ctx.shadowBlur = 0;

  ctx.fillStyle = isGolden ? '#e1a800' : (isRainbow ? '#ff6b81' : f.fin);
  ctx.beginPath();
  ctx.moveTo(-this.w*0.02, -this.h*0.02);
  ctx.lineTo(-this.w*0.18, -this.h*0.46);
  ctx.lineTo(this.w*0.14, -this.h*0.12);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(-this.w*0.02, this.h*0.1);
  ctx.lineTo(-this.w*0.16, this.h*0.42);
  ctx.lineTo(this.w*0.12, this.h*0.16);
  ctx.closePath();
  ctx.fill();

  if(f.shape === 'shark' || f.shape === 'spiky' || f.shape === 'viper'){
    ctx.beginPath();
    ctx.moveTo(-this.w*0.08, -this.h*0.12);
    ctx.lineTo(0, -this.h*0.54);
    ctx.lineTo(this.w*0.08, -this.h*0.14);
    ctx.closePath();
    ctx.fill();
  }

  if(isGolden || isRainbow){
    ctx.strokeStyle = isGolden ? '#ffd32a' : '#ffffff';
    ctx.lineWidth = 5;
    traceFishBody(f.shape || 'round', this.w, this.h);
    ctx.stroke();
  }

  if(isRainbow){
    ctx.strokeStyle = 'rgba(255,255,255,.45)';
    ctx.lineWidth = 3;
    drawTailShape(f.tail || 'triangle', this.w, this.h, 'rgba(0,0,0,0)');
  }

  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(this.w*0.28, -this.h*0.1, Math.max(5, this.h*0.055), 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = 'black';
  ctx.beginPath();
  ctx.arc(this.w*0.3, -this.h*0.1, Math.max(2.5, this.h*0.027), 0, Math.PI*2);
  ctx.fill();

  // --- Draw Name Tag ---
  if(f.id >= 4){
    ctx.save();
    ctx.scale(this.dir, 1); 
    const displayName = v ? v.label + ' ' + f.name : f.name;
    const nameColor = isRainbow ? '#ff9ff3' : (isGolden ? '#ffd32a' : '#fff');
    text(displayName, 0, -this.h * 0.75, 16, 'center', nameColor);
    ctx.restore();
  }

  ctx.restore();
}
rect(){
  return {
    x: this.x,
    y: this.y,
    w: this.w,
    h: this.h
  };
}
}


class TreasureChest{
  constructor(){ this.reset(true); }
  reset(first=false){
    this.w=92; this.h=66;
    this.x = first ? rand(160,W-220) : (Math.random()<.5 ? -140 : W+140);
    this.y = rand(330,735);
    this.dir = this.x < W/2 ? 1 : -1;
    this.speed = rand(.7,1.35);
    this.bob = rand(0,Math.PI*2);
    this.caught=false;
  }
  move(dt){
    if(this.caught) return;
    this.bob += dt*.004;
    this.x += this.dir*this.speed*dt*.06;
    if(this.x > W+160 || this.x < -180) this.reset(false);
  }
  draw(){
    const bob=Math.sin(this.bob)*5;
    ctx.save(); ctx.translate(this.x+this.w/2,this.y+this.h/2+bob);
    ctx.shadowColor='rgba(255,215,0,.75)'; ctx.shadowBlur=18; ctx.shadowOffsetY=6;
    roundRect(-this.w/2,-this.h/2,this.w,this.h,12,'#8b4513','#3b1d08',4);
    ctx.fillStyle='#5c2f0e'; ctx.fillRect(-this.w/2+5,-8,this.w-10,14);
    ctx.fillStyle='#ffd700'; ctx.fillRect(-8,-this.h/2,16,this.h);
    ctx.fillRect(-this.w/2,0,this.w,8);
    roundRect(-14,-2,28,24,5,'#ffdd59','#5c4300',3);
    ctx.shadowBlur=0;
    text('?',0,-this.h*.72,22,'center','#fff16a');
    ctx.restore();
  }
  rect(){ return {x:this.x,y:this.y,w:this.w,h:this.h}; }
}

const harpoon = { x:750, y:142, status:'still', tipX:750, tipY:160, fish:null, chest:null };
function harpoonSpeed(){ return (10 + game.upgrades.speed)*currentRod().power*(game.potions.speed>0?1.65:1); }
function ropeRange(){ return 400 + game.upgrades.rope*100/3; }
function launch(){
  if(game.panel || game.transition.active) return;
  if(harpoon.status!=='still') return;
  // Block firing during tutorial except during fishing steps
  if(game.tutorial.active && game.tutorial.step === 0) return;
  // Allow firing during: steps 1-2 (learning), steps 8-22 (fishing phases — no menu required)
  const fishingSteps = [1,2,8,10,12,14,16,17,18,19,20,21,22];
  if(game.tutorial.active && !fishingSteps.includes(game.tutorial.step)) return;
  harpoon.status='out';
  harpoon.tipX=harpoon.x;
  harpoon.tipY = 170;
  SFX.startReel();
}
function updateHarpoon(dt){
  if (!harpoon) return;

  const sy=160;
  if(harpoon.status==='still'){
    // Mouse-controlled horizontal aiming. It still drops straight down when fired.
    const boatRange = currentBoat().rangeMultiplier;
    const margin = Math.round(120 + (1 - boatRange) * (W/2 - 120));
    harpoon.x = clamp(game.mouseX, margin, W - margin);
    harpoon.tipX = harpoon.x; harpoon.tipY = sy;
    return;
  }
  const step=harpoonSpeed()*dt* 0.06;
  if(harpoon.status==='out') harpoon.tipY += step;
  else harpoon.tipY -= step*1.15;

  if(harpoon.status==='out' && !harpoon.fish){
    if(harpoon.tipY-sy > ropeRange() || harpoon.tipY > H-35) harpoon.status='back';
    for(const chest of game.chests){
      const r=chest.rect();
      const hit = harpoon.tipX>r.x+4 && harpoon.tipX<r.x+r.w-4 && harpoon.tipY>r.y+4 && harpoon.tipY<r.y+r.h-4;
      if(hit){
        harpoon.chest=chest; chest.caught=true; harpoon.status='back'; game.shake=8;
        burst(harpoon.tipX,harpoon.tipY,'#ffd700',24);
        SFX.chestHit();
        break;
      }
    }
    if(!harpoon.chest) for(const fish of game.fish){
      const r=fish.rect();
      const centerY=r.y+r.h/2;
      const cleanHit = harpoon.tipX>r.x+8 && harpoon.tipX<r.x+r.w-8 && harpoon.tipY>r.y+6 && harpoon.tipY<r.y+r.h-6;
      if(cleanHit){
        // Check if current rod is strong enough for this map's fish
        if(!rodRankOk(game.map)){
          // Bounce the harpoon back — scales too strong
          harpoon.status='back';
          game.shake=5;
          burst(harpoon.tipX,harpoon.tipY,'#aaaaaa',14);
          const needed = rodNeededFor(game.map);
          const rodName = rods.find(r=>r.id===needed)?.name || needed;
          msg(`Scales too strong! Need: ${rodName}`,W/2,200,'#ff7675');
          break;
        }
        harpoon.fish=fish; fish.caught=true; harpoon.status='back'; game.shake=8;
        harpoon.tipY=centerY; burst(harpoon.tipX,harpoon.tipY, fish.variant ? fish.variant.border : fish.type.body, 18);
        SFX.stopReel(); SFX.fishCaught(fish.type.id);
        break;
      }
    }
  }
  if(harpoon.fish){ harpoon.fish.x=harpoon.tipX-harpoon.fish.w/2; harpoon.fish.y=harpoon.tipY-harpoon.fish.h/2; }
  if(harpoon.chest){ harpoon.chest.x=harpoon.tipX-harpoon.chest.w/2; harpoon.chest.y=harpoon.tipY-harpoon.chest.h/2; }
  if(harpoon.status==='back' && harpoon.tipY<=sy){
    if(harpoon.fish) catchFish(harpoon.fish);
    if(harpoon.chest) catchChest(harpoon.chest);
    SFX.stopReel();
    harpoon.status='still'; harpoon.fish=null; harpoon.chest=null; harpoon.chest=null; harpoon.tipY=sy;
  }
}
function catchFish(fish){
  const map=currentMap(); const variantMult=fish.variant?fish.variant.mult:1; const potionMult=game.potions.coin>0?2:1; const base=fish.type.value*map.mult*variantMult*potionMult * (1 + (game.upgrades.magnet * 0.14)); game.combo = Math.min(2, game.combo+.125); game.comboTimer=2600;
  const earned=Math.round(base*game.combo); game.coins += earned; game.score += earned; game.caught++; game.bestCatch=`${fish.variant?fish.variant.label+' ':''}${fish.type.name}`;
  // Record collection entry with variant tracking (normalize old boolean saves)
  if(!game.collection[fish.type.name] || game.collection[fish.type.name] === true) game.collection[fish.type.name] = { caught: true };
  else game.collection[fish.type.name].caught = true;
  if(fish.variant){ const entry = game.collection[fish.type.name]; if(!entry.variants) entry.variants = {}; entry.variants[fish.variant.id] = true; }
  if(fish.type.id>=4) game.gems += (fish.type.id-3)/2;
  msg(`+${fmt(earned)} coins`, fish.x+fish.w/2, fish.y, '#fff16a');
  if(fish.type.id>=5) msg(`+${fish.type.id-4} gem`, fish.x+fish.w/2, fish.y-30, '#9effff');
  SFX.coins();
  game.fish.splice(game.fish.indexOf(fish),1); game.fish.push(new Fish());
  checkQuests(fish); save();
}

function catchChest(chest){
  const rewards=[
    {name:'Lucky Potion', key:'luck', time:30000, color:'#a29bfe', text:'+Luck for 30s'},
    {name:'Speed Potion', key:'speed', time:25000, color:'#54a0ff', text:'+Harpoon speed for 25s'},
    {name:'Coin Potion', key:'coin', time:35000, color:'#ffdd59', text:'2x coins for 35s'}
  ];
  const r=rewards[irand(0,rewards.length-1)];
  game.potions[r.key]=r.time;
  msg(`${r.name}! ${r.text}`, chest.x+chest.w/2, chest.y-10, r.color);
  burst(chest.x+chest.w/2,chest.y+chest.h/2,r.color,34);
  game.chests.splice(game.chests.indexOf(chest),1);
  setTimeout(()=>{ if(game.chests.length<2) game.chests.push(new TreasureChest()); }, irand(5000,11000));
}

function checkQuests(fish){
  for(const q of game.quests){
    if(q.done) continue;
    let ok=false;
    if(q.type==='caught'&&game.caught>=q.goal) ok=true;
    if(q.type==='catches'&&game.caught>=q.goal) ok=true;
    if(q.type==='lotofcatches'&&game.caught>=q.goal) ok=true;
    if(q.type==='combo'&&game.combo>=q.goal) ok=true;
    if(q.type==='legend'&&fish.type.id>=5) ok=true;
    if(q.type==='elemental_unlock'){
      if(fish.type.name==='Frost Wyrm') q.caughtWyrm=true;
      if(fish.type.name==='Infernal Hydra') q.caughtHydra=true;
      if(fish.type.name==='Thunder Phantom') q.caughtPhantom=true;
      if(q.caughtWyrm && q.caughtHydra) ok=true;
    }
    if(ok){
      q.done=true;
      if(q.type==='elemental_unlock'){
        game.elementalUnlocked=true;
        msg('QUEST DONE! Elemental Rod is now available!', W/2, 120, '#ff9ff3');
      } else {
        game.coins+=q.reward;
        msg(`QUEST DONE +${fmt(q.reward)}`, W/2, 120, '#7bed9f');
      }
      SFX.questDone();
    }
  }
  save();
}

function burst(x,y,color,n=10){ for(let i=0;i<n;i++) game.particles.push({x,y,vx:rand(-4,4),vy:rand(-4,4),life:rand(25,55),color}); }
function msg(txt,x,y,color){ game.messages.push({text:txt,x,y,color,life:80}); }
function updateEffects(dt){
  if(game.comboTimer>0){ game.comboTimer-=dt; if(game.comboTimer<=0) game.combo=1; }
  for(const k of Object.keys(game.potions)){ if(game.potions[k]>0) game.potions[k]=Math.max(0, game.potions[k]-dt); }
  game.shake*=.9;
  for(const p of game.particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=.08; p.life--; }
  game.particles=game.particles.filter(p=>p.life>0);
  for(const m of game.messages){ m.y-=.7; m.life--; }
  game.messages=game.messages.filter(m=>m.life>0);
}

function dimOutsideRoundRect(x,y,w,h,r=18){
  ctx.fillStyle='rgba(0,0,15,.52)';

  // top
  ctx.fillRect(0,0,W,y);

  // left
  ctx.fillRect(0,y,x,h);

  // right
  ctx.fillRect(x+w,y,W-(x+w),h);

  // bottom
  ctx.fillRect(0,y+h,W,H-(y+h));

  // highlight border
  ctx.save();
  ctx.strokeStyle='rgba(255,241,106,.95)';
  ctx.lineWidth=4;
  ctx.shadowColor='rgba(255,241,106,.8)';
  ctx.shadowBlur=20;
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);
  ctx.stroke();
  ctx.restore();
}
