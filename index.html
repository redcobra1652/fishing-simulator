function updateTutorial(){
  if(!game.tutorial.active) return;

  const t = game.tutorial;
  const s = t.step;

  // STEP 0: move mouse
  if(s === 0){
    if(Math.abs(game.mouseX - W/2) > 120) t.step++;
  }
  // STEP 1: fire harpoon
  else if(s === 1){
    if(harpoon.status !== 'still') t.step++;
  }
  // STEP 2: catch a fish
  else if(s === 2){
    if(game.caught >= 1) t.step++;
  }
  // STEP 3: open shop (via menu → shop)
  else if(s === 3){
    if(game.panel === 'shop') t.step++;
  }
  // STEP 4: buy any shop upgrade (tracked by upgrade total increasing)
  else if(s === 4){
    const totalUpgrades = Object.values(game.upgrades).reduce((a,b)=>a+b,0);
    if(t._upgradeSnapshot === undefined) t._upgradeSnapshot = totalUpgrades;
    if(totalUpgrades > t._upgradeSnapshot) t.step++;
  }
  // STEP 5: open quests tab
  else if(s === 5){
    if(game.panel === null || game.panel === 'menu') {
      if(!t._waitingForMenu5) t._waitingForMenu5 = true;
    }
    if(game.panel === 'quests') t.step++;
  }
  // STEP 6: from quests, open settings (sound panel)
  else if(s === 6){
    if(game.panel === 'sound') t.step++;
  }
  // STEP 7: close menu entirely
  else if(s === 7){
    if(game.panel === null) t.step++;
  }
  // STEP 8: wait until player has 150 coins (check map too — stay on bay)
  else if(s === 8){
    if(game.coins >= 150) t.step++;
  }
  // STEP 9: open maps panel and travel to Coral Reef
  else if(s === 9){
    if(game.map === 'reef') t.step++;
    // Also progress if they open maps (guide them)
  }
  // STEP 10: earn 400 coins on coral reef (or any map)
  else if(s === 10){
    if(game.coins >= 400) t.step++;
  }
  // STEP 11: must sail to deep sea
  else if(s === 11){
    if(game.map === 'deep') t.step++;
  }
  // STEP 12: earn 1000 coins
  else if(s === 12){
    if(game.coins >= 1000) t.step++;
  }
  // STEP 13: must buy Reinforced Sloop (new step)
  else if(s === 13){
    if(game.unlockedBoats && game.unlockedBoats['sloop']) t.step++;
  }
  // STEP 14: fish to rebuild coins after sloop purchase
  else if(s === 14){
    if(game.coins >= 1000) t.step++;
  }
  // STEP 15: must sail to volcano coast
  else if(s === 15){
    if(game.map === 'lava') t.step++;
  }
  // STEP 16: earn enough for volcano coast bait (300 coins)
  else if(s === 16){
    const volcBaitCost = 300;
    if(game.coins >= volcBaitCost) t.step++;
  }
  // STEP 17: must open bait panel and buy the map bait
  else if(s === 17){
    if(t._baitSnapshot === undefined) t._baitSnapshot = false;
    if(game.mapBaitActive && !t._baitSnapshot){
      t._baitSnapshot = true;
      t.step++;
    }
  }
  // STEP 18: earn coins, show catches hint
  else if(s === 18){
    if(!t._showedCatchesHint) t._showedCatchesHint = false;
    if(game.coins >= 700 && !t._showedCatchesHint){
      t._showedCatchesHint = true;
      t.step++;
    }
  }
  // STEP 19: open catches collection
  else if(s === 19){
    if(game.panel === 'collection') t.step++;
  }
  // STEP 20: close collection, keep earning to 1200
  else if(s === 20){
    if(game.panel === null || game.panel === 'menu') t.step++;
  }
  // STEP 21: earn 1200 and buy steel harpoon in gear
  else if(s === 21){
    if(game.coins >= 1200) {
      if(!t._waitingForRod21) t._waitingForRod21 = true;
    }
    if(game.rod === 'steel' || (game.unlockedRods && game.unlockedRods['steel'])) t.step++;
  }
  // STEP 22: earn 2200 coins (ice map cost)
  else if(s === 22){
    if(game.coins >= 2200) t.step++;
  }
  // STEP 23: sail to frozen abyss
  else if(s === 23){
    if(game.map === 'ice') t.step++;
  }
  // STEP 24: final — stays until player clicks button
}

function spawnFish(){ game.fish=[]; const count=15+currentMap().fishBonus; for(let i=0;i<count;i++){ const f=new Fish(); f.x=rand(0,W); game.fish.push(f); } spawnChests(); }
function spawnChests(){ game.chests=[]; const count=currentMap().id==='bay'?1:2; for(let i=0;i<count;i++) game.chests.push(new TreasureChest()); }

// Offscreen canvas cache for expensive static backgrounds (galaxy, void)
let _bgCache = null, _bgCacheMap = null;
function getBgCache(mapId) {
  if (_bgCacheMap === mapId && _bgCache) return _bgCache;
  _bgCache = document.createElement('canvas');
  _bgCache.width = W; _bgCache.height = H;
  _bgCacheMap = mapId;
  return _bgCache;
}

function drawBackground(dt){
  const map=currentMap(); game.wave += dt*.058;
  // Accumulate rotation angles to avoid floating-point drift on large T values
  game.bhAngle  = (game.bhAngle  + dt * 0.00055) % (Math.PI * 2);
  game.galAngle = (game.galAngle + dt * 0.00018) % (Math.PI * 2);
  const T=Date.now()/1000;
  const sky=ctx.createLinearGradient(0,0,0,H); sky.addColorStop(0,map.sky1); sky.addColorStop(.45,map.sky2); sky.addColorStop(1,map.depth); ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // SUN / MOON / special orb
  if(map.id==='lava'){
    // Blood-red sun
    const sg=ctx.createRadialGradient(1320,80,0,1320,80,62);
    sg.addColorStop(0,'rgba(255,120,20,1)'); sg.addColorStop(0.5,'rgba(255,50,0,.9)'); sg.addColorStop(1,'rgba(200,0,0,0)');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(1320,80,62,0,Math.PI*2); ctx.fill();
  } else if(map.id==='moon'||map.id==='storm'||map.id==='void'||map.id==='galaxy'){
    // No generic orb for these — handled per-map below
  } else {
    // Normal golden sun
    const sg=ctx.createRadialGradient(1320,80,0,1320,80,55);
    sg.addColorStop(0,'rgba(255,252,180,1)'); sg.addColorStop(0.6,'rgba(255,230,80,.85)'); sg.addColorStop(1,'rgba(255,200,0,0)');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(1320,80,55,0,Math.PI*2); ctx.fill();
  }

  // ── BAY ──────────────────────────────────────────────────────────────────
  if(map.id==='bay'){
    // Far misty hills — three overlapping ridges
    ctx.fillStyle='rgba(100,170,120,.18)';
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,155); ctx.bezierCurveTo(250,105,550,130,760,150); ctx.bezierCurveTo(980,170,1250,120,1510,140); ctx.lineTo(1510,H); ctx.fill();
    ctx.fillStyle='rgba(70,140,95,.30)';
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,168); ctx.bezierCurveTo(200,130,420,118,640,150); ctx.bezierCurveTo(860,180,1100,130,1510,155); ctx.lineTo(1510,H); ctx.fill();
    // Left headland
    ctx.fillStyle='rgba(55,118,75,.55)';
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,178); ctx.bezierCurveTo(80,148,200,140,320,165); ctx.bezierCurveTo(390,178,430,185,460,188); ctx.lineTo(460,H); ctx.fill();
    // Right headland
    ctx.fillStyle='rgba(48,105,68,.48)';
    ctx.beginPath(); ctx.moveTo(W,H); ctx.lineTo(W,175); ctx.bezierCurveTo(1420,148,1300,158,1180,175); ctx.bezierCurveTo(1080,188,1020,185,980,180); ctx.lineTo(980,H); ctx.fill();

    // Lighthouse — cleaned up, proper silhouette
    const lx=210, lbase=192, ltop=100;
    // Tower body — tapers slightly
    ctx.fillStyle='rgba(245,240,228,.92)';
    ctx.beginPath(); ctx.moveTo(lx-9,lbase); ctx.lineTo(lx-7,ltop+28); ctx.lineTo(lx+7,ltop+28); ctx.lineTo(lx+9,lbase); ctx.fill();
    // Red stripe bands
    ctx.fillStyle='rgba(200,50,50,.75)';
    ctx.fillRect(lx-8,lbase-30,16,10); ctx.fillRect(lx-7,lbase-60,14,10);
    // Lantern room box
    ctx.fillStyle='rgba(60,70,80,.9)';
    ctx.fillRect(lx-10,ltop+14,20,16);
    // Conical cap
    ctx.fillStyle='rgba(60,70,80,.95)';
    ctx.beginPath(); ctx.moveTo(lx-11,ltop+14); ctx.lineTo(lx,ltop); ctx.lineTo(lx+11,ltop+14); ctx.fill();
    // Animated light glow
    const glowAlpha=0.45+Math.sin(T*2)*0.3;
    const lg=ctx.createRadialGradient(lx,ltop+8,0,lx,ltop+8,28);
    lg.addColorStop(0,`rgba(255,240,120,${glowAlpha})`); lg.addColorStop(1,'rgba(255,240,120,0)');
    ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(lx,ltop+8,28,0,Math.PI*2); ctx.fill();
    // Light beam sweeping
    const beamAng=T*0.7;
    ctx.save(); ctx.globalAlpha=0.12; ctx.fillStyle='rgba(255,240,100,1)';
    ctx.beginPath(); ctx.moveTo(lx,ltop+8);
    ctx.lineTo(lx+Math.cos(beamAng)*220,ltop+8+Math.sin(beamAng)*220);
    ctx.lineTo(lx+Math.cos(beamAng+0.18)*220,ltop+8+Math.sin(beamAng+0.18)*220);
    ctx.fill(); ctx.restore();
  }

  // ── REEF ─────────────────────────────────────────────────────────────────
  if(map.id==='reef'){
    // Seabed ridge — raised higher so corals stay above top wave
    ctx.fillStyle='rgba(0,120,120,.55)';
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,175); ctx.quadraticCurveTo(380,150,760,172); ctx.quadraticCurveTo(1140,192,1510,168); ctx.lineTo(1510,H); ctx.fill();
    ctx.fillStyle='rgba(0,150,140,.38)';
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,162); ctx.quadraticCurveTo(350,145,700,160); ctx.quadraticCurveTo(1050,175,1510,155); ctx.lineTo(1510,H); ctx.fill();
    // Fan corals — raised to y=165
    const fans=[{x:80,c:'#e84393',r:32},{x:220,c:'#ff7675',r:26},{x:390,c:'#fd79a8',r:34},{x:560,c:'#e84393',r:28},{x:730,c:'#00cec9',r:30},{x:900,c:'#fd79a8',r:32},{x:1070,c:'#ff7675',r:26},{x:1240,c:'#e84393',r:28},{x:1410,c:'#fd79a8',r:30}];
    for(const f of fans){
      const base=172;
      ctx.strokeStyle=f.c; ctx.lineWidth=5;
      ctx.beginPath(); ctx.moveTo(f.x,base); ctx.lineTo(f.x,base-f.r*1.6); ctx.stroke();
      ctx.fillStyle=f.c+'cc';
      ctx.beginPath(); ctx.arc(f.x,base-f.r*1.6,f.r,Math.PI,0); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.28)'; ctx.lineWidth=1.5;
      for(let a=0;a<5;a++){ const ang=Math.PI+a*(Math.PI/4); ctx.beginPath(); ctx.moveTo(f.x,base-f.r*1.6); ctx.lineTo(f.x+Math.cos(ang)*f.r,base-f.r*1.6+Math.sin(ang)*f.r); ctx.stroke(); }
    }
    // Bubble wisps
    ctx.fillStyle='rgba(255,255,255,.32)';
    for(let i=0;i<18;i++){ ctx.beginPath(); ctx.arc(50+i*84,(145+i*11)%50+120,2+i%3,0,Math.PI*2); ctx.fill(); }
  }

  // ── DEEP ─────────────────────────────────────────────────────────────────
  if(map.id==='deep'){
    ctx.fillStyle='rgba(5,12,40,.95)'; ctx.fillRect(0,195,W,H-195);
    const pillars=[{x:60,w:55,h:65},{x:190,w:40,h:48},{x:320,w:70,h:80},{x:480,w:48,h:58},{x:650,w:62,h:72},{x:810,w:44,h:52},{x:970,w:68,h:78},{x:1130,w:50,h:62},{x:1290,w:58,h:68},{x:1420,w:45,h:55},{x:1490,w:35,h:42}];
    for(const p of pillars){
      ctx.fillStyle='rgba(12,22,60,.92)';
      ctx.beginPath(); ctx.moveTo(p.x-p.w/2,H); ctx.lineTo(p.x-p.w/2,215-p.h+10); ctx.lineTo(p.x-p.w*0.3,215-p.h-6); ctx.lineTo(p.x-p.w*0.1,215-p.h+4); ctx.lineTo(p.x,215-p.h-2); ctx.lineTo(p.x+p.w*0.15,215-p.h+8); ctx.lineTo(p.x+p.w*0.35,215-p.h-4); ctx.lineTo(p.x+p.w/2,215-p.h+10); ctx.lineTo(p.x+p.w/2,H); ctx.fill();
    }
    for(const p of pillars){
      const gx=ctx.createRadialGradient(p.x,215-p.h,0,p.x,215-p.h,22);
      gx.addColorStop(0,'rgba(80,160,255,.5)'); gx.addColorStop(1,'rgba(80,160,255,0)');
      ctx.fillStyle=gx; ctx.beginPath(); ctx.arc(p.x,215-p.h,22,0,Math.PI*2); ctx.fill();
    }
  }

  // ── LAVA ─────────────────────────────────────────────────────────────────
  if(map.id==='lava'){
    // Left volcano
    ctx.fillStyle='rgba(55,25,15,.95)';
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,230); ctx.lineTo(180,62); ctx.lineTo(360,230); ctx.lineTo(360,H); ctx.fill();
    // Right volcano
    ctx.fillStyle='rgba(45,20,10,.88)';
    ctx.beginPath(); ctx.moveTo(1100,H); ctx.lineTo(1100,242); ctx.lineTo(1260,112); ctx.lineTo(1420,242); ctx.lineTo(1420,H); ctx.fill();
    // Lava streams
    const lg1=ctx.createLinearGradient(0,62,0,215); lg1.addColorStop(0,'rgba(255,110,0,.9)'); lg1.addColorStop(1,'rgba(200,40,0,.1)');
    ctx.fillStyle=lg1; ctx.fillRect(168,62,26,158);
    const lg2=ctx.createLinearGradient(0,112,0,248); lg2.addColorStop(0,'rgba(255,100,0,.8)'); lg2.addColorStop(1,'rgba(200,40,0,.08)');
    ctx.fillStyle=lg2; ctx.fillRect(1250,112,20,138);
    // Crater glow
    const cg1=ctx.createRadialGradient(181,62,0,181,62,30); cg1.addColorStop(0,'rgba(255,200,0,.9)'); cg1.addColorStop(0.4,'rgba(255,80,0,.6)'); cg1.addColorStop(1,'rgba(200,0,0,0)');
    ctx.fillStyle=cg1; ctx.beginPath(); ctx.arc(181,62,30,0,Math.PI*2); ctx.fill();
    const cg2=ctx.createRadialGradient(1261,112,0,1261,112,24); cg2.addColorStop(0,'rgba(255,200,0,.85)'); cg2.addColorStop(0.4,'rgba(255,80,0,.5)'); cg2.addColorStop(1,'rgba(200,0,0,0)');
    ctx.fillStyle=cg2; ctx.beginPath(); ctx.arc(1261,112,24,0,Math.PI*2); ctx.fill();
    // Animated smoke puffs — two vents
    const smokePuffs=[
      {vx:181,vy:62},{vx:1261,vy:112}
    ];
    for(const v of smokePuffs){
      for(let s=0;s<4;s++){
        const phase=(T*0.4+s*0.7)%2.8;
        const sy=v.vy - phase*38;
        const sr=10+phase*14;
        const alpha=Math.max(0,(0.55-phase*0.18));
        const drift=Math.sin(T*0.8+s)*14*phase;
        const sg=ctx.createRadialGradient(v.vx+drift,sy,0,v.vx+drift,sy,sr);
        sg.addColorStop(0,`rgba(80,65,60,${alpha})`); sg.addColorStop(1,'rgba(60,50,45,0)');
        ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(v.vx+drift,sy,sr,0,Math.PI*2); ctx.fill();
      }
    }
  }

  // ── ICE ──────────────────────────────────────────────────────────────────
  if(map.id==='ice'){
    // Left glacier — multi-face with crevasse shadows
    ctx.fillStyle='rgba(220,242,255,.90)';
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,162); ctx.lineTo(55,140); ctx.lineTo(130,155); ctx.lineTo(220,132); ctx.lineTo(340,148); ctx.lineTo(430,162); ctx.lineTo(460,H); ctx.fill();
    ctx.fillStyle='rgba(140,195,235,.45)'; // shadow face
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,165); ctx.lineTo(55,144); ctx.lineTo(130,158); ctx.lineTo(220,136); ctx.lineTo(340,152); ctx.lineTo(430,165); ctx.lineTo(460,H); ctx.fill();
    // Crevasse lines on left glacier
    ctx.strokeStyle='rgba(100,160,210,.55)'; ctx.lineWidth=2;
    [[80,155,95,185],[175,140,185,172],[300,148,308,178]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });
    // Right glacier
    ctx.fillStyle='rgba(205,232,255,.85)';
    ctx.beginPath(); ctx.moveTo(W,H); ctx.lineTo(W,165); ctx.lineTo(1455,140); ctx.lineTo(1340,158); ctx.lineTo(1210,142); ctx.lineTo(1100,164); ctx.lineTo(1065,H); ctx.fill();
    ctx.fillStyle='rgba(140,195,235,.38)';
    ctx.beginPath(); ctx.moveTo(W,H); ctx.lineTo(W,168); ctx.lineTo(1455,144); ctx.lineTo(1340,162); ctx.lineTo(1210,146); ctx.lineTo(1100,167); ctx.lineTo(1065,H); ctx.fill();

    // Floating icebergs — more realistic multi-faceted
    const bergs=[
      {x:520,peaks:[[-52,0],[-38,-22],[-18,-36],[0,-44],[14,-30],[30,-16],[48,0]]},
      {x:740,peaks:[[-42,0],[-28,-18],[-8,-30],[8,-36],[22,-22],[38,0]]},
      {x:960,peaks:[[-48,0],[-32,-20],[-12,-34],[6,-40],[20,-28],[42,-10],[54,0]]},
    ];
    for(const b of bergs){
      const by=200;
      // Main white face
      ctx.fillStyle='rgba(232,248,255,.95)';
      ctx.beginPath(); ctx.moveTo(b.x+b.peaks[0][0],by);
      b.peaks.forEach(([dx,dy])=>ctx.lineTo(b.x+dx,by+dy));
      ctx.lineTo(b.x+b.peaks[b.peaks.length-1][0],by); ctx.fill();
      // Blue-shadow face (right side darker)
      ctx.fillStyle='rgba(150,205,240,.55)';
      ctx.beginPath();
      const half=Math.floor(b.peaks.length/2);
      ctx.moveTo(b.x+b.peaks[half][0],by+b.peaks[half][1]);
      for(let k=half+1;k<b.peaks.length;k++) ctx.lineTo(b.x+b.peaks[k][0],by+b.peaks[k][1]);
      ctx.lineTo(b.x+b.peaks[b.peaks.length-1][0],by); ctx.fill();
      // Waterline reflection shimmer
      const rg=ctx.createLinearGradient(b.x-55,by,b.x-55,by+18);
      rg.addColorStop(0,'rgba(200,235,255,.35)'); rg.addColorStop(1,'rgba(200,235,255,0)');
      ctx.fillStyle=rg; ctx.fillRect(b.x+b.peaks[0][0],by,b.peaks[b.peaks.length-1][0]-b.peaks[0][0],18);
    }
    // Snowflake/frost sparkles at glacier edges
    ctx.fillStyle='rgba(255,255,255,.8)';
    [[45,148],[138,162],[235,138],[355,152],[1110,168],[1215,148],[1342,162],[1458,145]].forEach(([sx,sy])=>{
      ctx.beginPath(); ctx.arc(sx,sy,2.5,0,Math.PI*2); ctx.fill();
    });
  }

  // ── MANGROVE ─────────────────────────────────────────────────────────────
  if(map.id==='mangrove'){
    const trees=[{x:80},{x:350},{x:700},{x:1050},{x:1380}];
    for(const t of trees){
      ctx.strokeStyle='rgba(30,80,40,.85)'; ctx.lineWidth=12;
      ctx.beginPath(); ctx.moveTo(t.x,230); ctx.lineTo(t.x,130); ctx.stroke();
      ctx.lineWidth=6;
      for(let r=-2;r<=2;r++){
        ctx.beginPath(); ctx.moveTo(t.x,195); ctx.quadraticCurveTo(t.x+r*45,230,t.x+r*60,H); ctx.stroke();
      }
      ctx.fillStyle='rgba(30,120,60,.72)'; ctx.beginPath(); ctx.arc(t.x,120,42,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(50,150,70,.5)'; ctx.beginPath(); ctx.arc(t.x-28,135,28,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(t.x+28,130,26,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='rgba(20,60,30,.45)'; ctx.fillRect(0,205,W,H-205);
  }

  // ── CRYSTAL ──────────────────────────────────────────────────────────────
  if(map.id==='crystal'){
    const shelfGrad=ctx.createLinearGradient(0,190,0,H); shelfGrad.addColorStop(0,'rgba(80,230,240,.32)'); shelfGrad.addColorStop(1,'rgba(20,180,200,.55)');
    ctx.fillStyle=shelfGrad;
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,210); ctx.quadraticCurveTo(500,190,755,207); ctx.quadraticCurveTo(1100,222,1510,200); ctx.lineTo(1510,H); ctx.fill();
    const groups=[{cx:130},{cx:360},{cx:620},{cx:880},{cx:1120},{cx:1380}];
    for(const g of groups){
      const spires=[{dx:-22,h:52,w:9,c:'rgba(160,250,255,.82)'},{dx:0,h:70,w:11,c:'rgba(130,240,255,.9)'},{dx:20,h:46,w:8,c:'rgba(180,255,250,.75)'}];
      for(const s of spires){
        const bx=g.cx+s.dx, by=210;
        ctx.fillStyle=s.c;
        ctx.beginPath(); ctx.moveTo(bx-s.w,by); ctx.lineTo(bx-s.w*0.25,by-s.h); ctx.lineTo(bx,by-s.h-8); ctx.lineTo(bx+s.w*0.25,by-s.h); ctx.lineTo(bx+s.w,by); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.75)';
        ctx.beginPath(); ctx.moveTo(bx-2,by-s.h-2); ctx.lineTo(bx,by-s.h-10); ctx.lineTo(bx+2,by-s.h-2); ctx.fill();
      }
    }
    const shimGrad=ctx.createLinearGradient(0,185,0,215); shimGrad.addColorStop(0,'rgba(130,255,255,.0)'); shimGrad.addColorStop(1,'rgba(130,255,255,.18)');
    ctx.fillStyle=shimGrad; ctx.fillRect(0,185,W,30);
  }

  // ── STORM ────────────────────────────────────────────────────────────────
  if(map.id==='storm'){
    // Sea cliffs
    ctx.fillStyle='rgba(22,32,52,.92)';
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,180); ctx.lineTo(80,148); ctx.lineTo(195,170); ctx.lineTo(310,138); ctx.lineTo(435,162); ctx.lineTo(460,H); ctx.fill();
    ctx.fillStyle='rgba(18,26,44,.85)';
    ctx.beginPath(); ctx.moveTo(1040,H); ctx.lineTo(1040,168); ctx.lineTo(1175,132); ctx.lineTo(1305,156); ctx.lineTo(1428,140); ctx.lineTo(1510,165); ctx.lineTo(1510,H); ctx.fill();
    // Storm clouds — volumetric layered
    const cloudCols=['rgba(38,48,70,.82)','rgba(48,58,80,.70)','rgba(30,40,60,.88)'];
    const clouds=[{x:120,y:48,r:62},{x:310,y:35,r:72},{x:520,y:55,r:58},{x:730,y:28,r:78},{x:960,y:45,r:65},{x:1180,y:38,r:70},{x:1390,y:52,r:60}];
    for(let c of clouds){
      ctx.fillStyle=cloudCols[clouds.indexOf(c)%3];
      ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(c.x+c.r*0.5,c.y+8,c.r*0.72,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(c.x-c.r*0.45,c.y+10,c.r*0.65,0,Math.PI*2); ctx.fill();
    }
    // Animated lightning flashes — two bolts, timed differently
    const bolts=[
      {x:480, period:3.7, offset:0},
      {x:980, period:5.1, offset:1.8},
      {x:230, period:6.4, offset:3.2},
    ];
    for(const b of bolts){
      const phase=(T+b.offset)%b.period;
      if(phase<0.12){
        const alpha=phase<0.06?phase/0.06:(0.12-phase)/0.06;
        // Whole-sky flash
        ctx.save(); ctx.globalAlpha=alpha*0.18;
        ctx.fillStyle='rgba(200,220,255,1)'; ctx.fillRect(0,0,W,H);
        ctx.restore();
        // Bolt shape
        ctx.save(); ctx.globalAlpha=alpha*0.9;
        ctx.strokeStyle='rgba(220,240,255,1)'; ctx.lineWidth=3;
        ctx.shadowColor='rgba(180,220,255,.9)'; ctx.shadowBlur=18;
        ctx.beginPath();
        ctx.moveTo(b.x,20); ctx.lineTo(b.x-14,72); ctx.lineTo(b.x+8,72); ctx.lineTo(b.x-18,148); ctx.stroke();
        ctx.lineWidth=1.5; ctx.globalAlpha=alpha*0.5;
        ctx.beginPath(); ctx.moveTo(b.x-14,72); ctx.lineTo(b.x-30,118); ctx.stroke();
        ctx.restore();
      }
    }
  }

  // ── JUNGLE ───────────────────────────────────────────────────────────────
  if(map.id==='jungle'){
    // Dense layered canopy — darker back layer, brighter front
    const jBack=['rgba(5,55,18,.95)','rgba(8,65,22,.90)','rgba(4,48,15,.92)'];
    const jFront=['rgba(12,100,35,.90)','rgba(18,120,42,.85)','rgba(9,85,28,.88)','rgba(20,110,38,.82)'];
    // Back layer — taller, darker
    const backTrees=[{x:0,w:220},{x:180,w:200},{x:370,w:215},{x:555,w:205},{x:740,w:220},{x:925,w:200},{x:1105,w:215},{x:1285,w:205},{x:1460,w:200}];

      ctx.quadraticCurveTo(t.x+t.w*0.15,cy+20,cx-t.w*0.25,cy+10);

    // Front layer — shorter, brighter, varied shapes
    const frontTrees=[{x:-20,w:170},{x:140,w:155},{x:300,w:165},{x:460,w:160},{x:625,w:168},{x:790,w:155},{x:950,w:162},{x:1110,w:158},{x:1270,w:165},{x:1430,w:160}];
    const frontH=[165,180,155,172,160,178,162,170,158,175];
    frontTrees.forEach((t,i)=>{

      ctx.beginPath(); ctx.moveTo(t.x,H); ctx.lineTo(t.x,245);
      ctx.quadraticCurveTo(cx-t.w*0.3,cy+25,cx-t.w*0.12,cy+5);
      ctx.quadraticCurveTo(cx,cy-8,cx+t.w*0.12,cy+5);
      ctx.quadraticCurveTo(cx+t.w*0.3,cy+25,t.x+t.w,245);
      ctx.lineTo(t.x+t.w,H); ctx.fill();
      // Lighter highlight fringe on top edge
      ctx.fillStyle='rgba(40,160,60,.22)';
      ctx.beginPath(); ctx.arc(cx,cy+5,t.w*0.28,Math.PI,0); ctx.fill();
    });
    // Hanging vines — curved, with leaf bulges
    ctx.strokeStyle='rgba(20,90,15,.65)'; ctx.lineWidth=2.5;
    for(let i=0;i<18;i++){
      const vx=40+i*84, swayAmt=Math.sin(T*0.4+i*1.1)*8;
      ctx.beginPath(); ctx.moveTo(vx,0); ctx.bezierCurveTo(vx+swayAmt+15,60,vx+swayAmt-10,130,vx+swayAmt+5,195); ctx.stroke();

      ctx.fillStyle='rgba(30,130,25,.55)';

    }
    // Firefly-like sparkles deep in canopy
    for(let i=0;i<12;i++){
      const fx=(i*317+80)%W, fy=30+i*14;
      const fa=0.3+Math.sin(T*1.8+i*2.3)*0.28;
      ctx.fillStyle=`rgba(200,255,100,${fa})`;
      ctx.beginPath(); ctx.arc(fx,fy,2,0,Math.PI*2); ctx.fill();
    }
    // Ground mist at waterline
    const mistG=ctx.createLinearGradient(0,170,0,215); mistG.addColorStop(0,'rgba(80,200,80,0)'); mistG.addColorStop(1,'rgba(50,160,50,.22)');
    ctx.fillStyle=mistG; ctx.fillRect(0,170,W,45);
  }

  // ── TOXIC ────────────────────────────────────────────────────────────────
  if(map.id==='toxic'){
    // Sludge banks
    ctx.fillStyle='rgba(38,75,0,.88)';
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,188); ctx.quadraticCurveTo(200,162,420,188); ctx.lineTo(420,H); ctx.fill();
    ctx.fillStyle='rgba(32,65,0,.82)';
    ctx.beginPath(); ctx.moveTo(1080,H); ctx.lineTo(1080,182); ctx.quadraticCurveTo(1295,155,1510,182); ctx.lineTo(1510,H); ctx.fill();
    // Animated rising bubbles — each has its own phase
    const bubbleDefs=[
      {x:95,period:3.2,size:7},{x:190,period:2.8,size:5},{x:300,period:3.8,size:8},
      {x:415,period:2.5,size:6},{x:520,period:3.5,size:9},{x:635,period:2.9,size:5},
      {x:740,period:4.1,size:7},{x:850,period:3.0,size:6},{x:960,period:2.7,size:8},
      {x:1065,period:3.6,size:5},{x:1170,period:2.4,size:7},{x:1280,period:3.3,size:6},
      {x:1380,period:2.6,size:8},{x:1460,period:3.9,size:5},
    ];
    for(const b of bubbleDefs){
      const phase=(T*0.5)%b.period/b.period; // 0–1 cycle
      const by=210-phase*90; // rise from waterline upward
      const alpha=phase<0.15?phase/0.15:phase>0.80?(1-phase)/0.20:1;
      const wobble=Math.sin(T*2.2+b.x)*4;
      ctx.fillStyle=`rgba(120,255,0,${alpha*0.55})`;
      ctx.beginPath(); ctx.arc(b.x+wobble,by,b.size*(0.8+phase*0.3),0,Math.PI*2); ctx.fill();
      // Inner highlight
      ctx.fillStyle=`rgba(200,255,80,${alpha*0.35})`;
      ctx.beginPath(); ctx.arc(b.x+wobble-b.size*0.3,by-b.size*0.3,b.size*0.35,0,Math.PI*2); ctx.fill();
    }
    // Green waterline glow
    const toxGrad=ctx.createLinearGradient(0,145,0,215); toxGrad.addColorStop(0,'rgba(100,255,0,0)'); toxGrad.addColorStop(1,'rgba(100,255,0,.22)');
    ctx.fillStyle=toxGrad; ctx.fillRect(0,145,W,70);
  }

  // ── DESERT ───────────────────────────────────────────────────────────────
  if(map.id==='desert'){
    // Back dunes — taller, lighter
    ctx.fillStyle='rgba(225,170,75,.75)';
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,175); ctx.bezierCurveTo(180,115,380,130,560,168); ctx.bezierCurveTo(740,205,920,125,1130,148); ctx.bezierCurveTo(1300,165,1430,132,1510,155); ctx.lineTo(1510,H); ctx.fill();
    // Front dunes — warmer, slightly darker
    ctx.fillStyle='rgba(210,148,55,.88)';
    ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(0,192); ctx.bezierCurveTo(220,148,450,135,650,175); ctx.bezierCurveTo(820,208,1020,145,1240,168); ctx.bezierCurveTo(1380,182,1460,162,1510,172); ctx.lineTo(1510,H); ctx.fill();
    // Mesa/butte — flat-top rock formation
    ctx.fillStyle='rgba(175,108,35,.85)';
    ctx.beginPath(); ctx.moveTo(680,H); ctx.lineTo(680,148); ctx.lineTo(710,128); ctx.lineTo(870,128); ctx.lineTo(900,148); ctx.lineTo(900,H); ctx.fill();
    // Mesa top cap (lighter)
    ctx.fillStyle='rgba(210,165,75,.7)';
    ctx.fillRect(710,128,160,8);

    // Cactus helper
    function drawCactus(cx,base){
      const grn='rgba(28,108,18,.90)';
      ctx.fillStyle=grn;
      // Main trunk
      ctx.beginPath(); ctx.roundRect(cx-7,base-85,14,85,4); ctx.fill();
      // Left arm
      ctx.beginPath(); ctx.roundRect(cx-28,base-68,14,38,4); ctx.fill();
      ctx.beginPath(); ctx.roundRect(cx-28,base-68,28,12,4); ctx.fill();
      // Right arm (higher)
      ctx.beginPath(); ctx.roundRect(cx+14,base-55,14,28,4); ctx.fill();
      ctx.beginPath(); ctx.roundRect(cx+7,base-55,21,12,4); ctx.fill();
      // Thorns
      ctx.fillStyle='rgba(220,200,150,.75)';
      [[cx-3,base-82],[cx+4,base-72],[cx-5,base-60],[cx+5,base-48],[cx-3,base-35]].forEach(([tx,ty])=>{
        ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx-5,ty-6); ctx.lineTo(tx+5,ty-6); ctx.fill();
      });
    }
    drawCactus(148,205);
    drawCactus(960,175);

    // Dinosaur skull on left dune
    const skx=330, sky2=162;
    ctx.fillStyle='rgba(235,215,170,.88)';
    // Cranium
    ctx.beginPath(); ctx.ellipse(skx,sky2,22,16,0,0,Math.PI*2); ctx.fill();
    // Snout
    ctx.beginPath(); ctx.moveTo(skx+10,sky2+2); ctx.lineTo(skx+36,sky2+8); ctx.lineTo(skx+34,sky2+16); ctx.lineTo(skx+10,sky2+12); ctx.fill();
    // Eye socket
    ctx.fillStyle='rgba(80,60,40,.8)';
    ctx.beginPath(); ctx.ellipse(skx+4,sky2-2,7,6,0,0,Math.PI*2); ctx.fill();
    // Nostril
    ctx.beginPath(); ctx.ellipse(skx+26,sky2+8,3,2.5,0,0,Math.PI*2); ctx.fill();
    // Teeth
    ctx.fillStyle='rgba(235,215,170,.88)';
    ctx.strokeStyle='rgba(160,130,80,.6)'; ctx.lineWidth=1;
    [skx+14,skx+19,skx+24,skx+29].forEach((tx,ti)=>{
      ctx.beginPath(); ctx.moveTo(tx,sky2+15); ctx.lineTo(tx-3,sky2+22); ctx.lineTo(tx+3,sky2+22); ctx.fill();
    });
    // Jaw bone
    ctx.strokeStyle='rgba(200,180,130,.7)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(skx+10,sky2+14); ctx.lineTo(skx+36,sky2+17); ctx.stroke();
  }

  // ── MOON ─────────────────────────────────────────────────────────────────
  if(map.id==='moon'){
    // Stars (twinkling)
    const stars=[[120,40,1.6],[380,25,1.2],[620,55,1.8],[840,30,1.4],[1050,18,1.0],[1280,45,1.5],[1450,35,1.3],[240,70,1.1],[700,20,1.7],[1150,60,1.2],[440,42,1.0],[900,15,1.6],[1350,28,1.3],[160,15,0.9],[780,50,1.4]];
    for(const s of stars){

      ctx.fillStyle=`rgba(255,255,255,${a})`;
      ctx.beginPath(); ctx.arc(s[0],s[1],s[2],0,Math.PI*2); ctx.fill();
    }
    // Large Moon in top right
    const mx=1320,my=78,mr=54;
    const moonGlow=ctx.createRadialGradient(mx,my,0,mx,my,mr+30);
    moonGlow.addColorStop(0,'rgba(220,235,255,.0)'); moonGlow.addColorStop(0.5,'rgba(180,210,255,.08)'); moonGlow.addColorStop(1,'rgba(180,210,255,0)');
    ctx.fillStyle=moonGlow; ctx.beginPath(); ctx.arc(mx,my,mr+30,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(232,240,255,.96)'; ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fill();
    // Crater details
    ctx.fillStyle='rgba(190,205,230,.6)';
    [[mx-18,my+10,9],[mx+16,my-12,7],[mx+5,my+22,5],[mx-28,my-8,5]].forEach(([cx2,cy2,cr])=>{
      ctx.beginPath(); ctx.arc(cx2,cy2,cr,0,Math.PI*2); ctx.fill();
    });
  }

  // ── VOID ─────────────────────────────────────────────────────────────────
  if(map.id==='void'){
    // Static parts cached
    const cache = getBgCache('void');
    const cc = cache.getContext('2d');
    if(_bgCacheMap === 'void' && cache._ready){
      ctx.drawImage(cache, 0, 0);
    } else {
      cc.fillStyle='rgba(28,0,58,.96)';
      const spireArr=[[80,60,160],[250,45,180],[470,75,145],[720,55,170],[980,70,155],[1230,50,175],[1450,65,165]];
      for(const s of spireArr){
        cc.beginPath(); cc.moveTo(s[0]-s[1]/2,H); cc.lineTo(s[0]-s[1]*0.15,s[2]); cc.lineTo(s[0],s[2]-20); cc.lineTo(s[0]+s[1]*0.15,s[2]); cc.lineTo(s[0]+s[1]/2,H); cc.fill();
      }

      ctx.drawImage(cache, 0, 0);

    // Live: purple rift glows (cheap, few radial gradients)
    for(let i=0;i<5;i++){

      vg.addColorStop(0,'rgba(120,0,255,.45)'); vg.addColorStop(1,'rgba(120,0,255,0)');
      ctx.fillStyle=vg; ctx.beginPath(); ctx.arc(vx,vy,30,0,Math.PI*2); ctx.fill();
    }

    // Black hole — slowly rotating accretion disk + event horizon
    const bhx=1320, bhy=78, bhR=62;
    const bhAngle=game.bhAngle;
    ctx.save();
    ctx.translate(bhx,bhy);

    // Far outer glow — wide dark halo
    const farHalo=ctx.createRadialGradient(0,0,bhR+10,0,0,bhR+80);

    // Outer purple glow (drawn BEFORE rotating geometry so it doesn't rotate)
    const outerHalo=ctx.createRadialGradient(0,0,bhR,0,0,bhR+40);
    outerHalo.addColorStop(0,'rgba(140,0,255,.45)');

    ctx.fillStyle=outerHalo; ctx.beginPath(); ctx.arc(0,0,bhR+40,0,Math.PI*2); ctx.fill();

    // Gravitational lensing rings (static, pulsing)
    for(let lr=0;lr<3;lr++){

      const lrA=0.06+Math.sin(T*0.9+lr*1.1)*0.04;

      ctx.beginPath(); ctx.arc(0,0,lrR,0,Math.PI*2); ctx.stroke();

    ctx.rotate(bhAngle);

    // Accretion disk — drawn as ellipses BEHIND the event horizon
    const diskLayers=[
      {rx:bhR+38, ry:14, col0:'rgba(255,140,20,.40)', col1:'rgba(180,60,0,0)'},
      {rx:bhR+26, ry:11, col0:'rgba(255,100,10,.60)', col1:'rgba(200,40,0,0)'},
      {rx:bhR+14, ry:8,  col0:'rgba(255,180,50,.78)', col1:'rgba(220,60,0,0)'},
      {rx:bhR+5,  ry:5,  col0:'rgba(255,220,120,.95)' ,col1:'rgba(240,100,0,0)'},
    ];
    for(const d of diskLayers){
      ctx.save();
      ctx.scale(1, d.ry/d.rx); // squash to ellipse
      const dg=ctx.createRadialGradient(0,0,bhR-8,0,0,d.rx);
      dg.addColorStop(0,d.col0); dg.addColorStop(1,d.col1);

      ctx.beginPath(); ctx.arc(0,0,d.rx,0,Math.PI*2); ctx.fill();

    // Blue-shifted lensing arc on top (near side of disk)
    ctx.save();
    ctx.scale(1,0.22);
    ctx.strokeStyle='rgba(160,220,255,.65)'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(0,0,bhR+16,Math.PI*1.08,Math.PI*1.92); ctx.stroke();
    ctx.strokeStyle='rgba(200,240,255,.35)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,bhR+22,Math.PI*1.05,Math.PI*1.95); ctx.stroke();
    ctx.restore();

    // Event horizon — pure black on top of everything
    ctx.fillStyle='#000000';
    ctx.beginPath(); ctx.arc(0,0,bhR,0,Math.PI*2); ctx.fill();

    // Thin hot inner ring right at the horizon edge

  }

  // ── HEAVEN ───────────────────────────────────────────────────────────────
  if(map.id==='heaven'){
    // Rainbow — thicker, multi-band
    const rainbowBands=[
      ['rgba(255,70,70,.38)',   0],
      ['rgba(255,160,0,.35)',   8],
      ['rgba(255,255,60,.32)',  16],

    const shimPhase=(T%10)/10; // 0–1 over 10s
    if(shimPhase<0.18){

      // Shimmer as a bright arc sweeping left-to-right
      const shimStart=Math.PI*1.08+shimT*(Math.PI*0.84)-0.08;
      const shimEnd=shimStart+0.12;
      ctx.save();
      ctx.globalAlpha=Math.sin(shimT*Math.PI)*0.55;
      ctx.strokeStyle='rgba(255,255,255,1)'; ctx.lineWidth=28;
      ctx.beginPath(); ctx.arc(W/2,460,510,shimStart,shimEnd); ctx.stroke();
      ctx.restore();
    }
    // Cloud islands
    const cloudIsles=[{x:200,y:118,w:160},{x:600,y:88,w:200},{x:1000,y:108,w:180},{x:1380,y:93,w:155}];
    for(const c of cloudIsles){
      ctx.fillStyle='rgba(255,255,255,.90)';
      ctx.beginPath(); ctx.arc(c.x,c.y,c.w*0.42,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(c.x+c.w*0.28,c.y+10,c.w*0.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(c.x-c.w*0.28,c.y+12,c.w*0.28,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(200,230,255,.6)'; ctx.fillRect(c.x-c.w*0.42,c.y+8,c.w*0.84,22);
    }
  }

  // ── GALAXY ───────────────────────────────────────────────────────────────
  if(map.id==='galaxy'){
    // Static parts (nebula, stars, spires) cached on offscreen canvas
    const cache = getBgCache('galaxy');
    const cc = cache.getContext('2d');
    if (_bgCacheMap === 'galaxy' && cache._ready) {
      ctx.drawImage(cache, 0, 0);
    } else {
      // Background nebula clouds
      const nebColors=['rgba(100,20,200,.22)','rgba(200,20,150,.18)','rgba(20,100,200,.20)'];
      for(let i=0;i<5;i++){
        const ng=cc.createRadialGradient(150+i*300,100+i%3*40,0,150+i*300,100+i%3*40,120);
        ng.addColorStop(0,nebColors[i%3]); ng.addColorStop(1,'transparent');
        cc.fillStyle=ng; cc.beginPath(); cc.arc(150+i*300,100+i%3*40,120,0,Math.PI*2); cc.fill();
      }
      // Stars (drawn once — twinkling handled separately live)
      cc.fillStyle='rgba(255,255,255,.75)';
      for(let i=0;i<48;i++){ cc.beginPath(); cc.arc((i*373)%W,(i*197+13)%210,0.7+i%3*0.55,0,Math.PI*2); cc.fill(); }
      // Rock spires
      cc.fillStyle='rgba(12,0,32,.96)';
      for(let i=0;i<6;i++){
        const sx=100+i*260;
        cc.beginPath(); cc.moveTo(sx-40,H); cc.lineTo(sx-10,192); cc.lineTo(sx,178); cc.lineTo(sx+10,192); cc.lineTo(sx+40,H); cc.fill();
      }
      cache._ready = true;
      ctx.drawImage(cache, 0, 0);
    }
    // Live: twinkling stars overlay (cheap — just alpha flicker on small dots)
    for(let i=0;i<48;i++){
      const sa=0.3+Math.sin(T*0.7+i*1.3)*0.3;
      ctx.globalAlpha=sa;
      ctx.fillStyle='rgba(255,255,255,1)';
      ctx.beginPath(); ctx.arc((i*373)%W,(i*197+13)%210,0.7+i%3*0.55,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // Rotating galaxy in top-right (replaces moon)
    const gx=1320, gy=78;
    ctx.save();
    ctx.translate(gx,gy);
    const galAngle=game.galAngle; // smooth accumulated rotation
    ctx.rotate(galAngle);

    // Wide outer glow halo
    const galFarGlow=ctx.createRadialGradient(0,0,0,0,0,110);
    galFarGlow.addColorStop(0,'rgba(120,40,255,0)');
    galFarGlow.addColorStop(0.5,'rgba(100,30,220,.08)');
    galFarGlow.addColorStop(1,'rgba(50,10,120,0)');
    ctx.fillStyle=galFarGlow; ctx.beginPath(); ctx.arc(0,0,110,0,Math.PI*2); ctx.fill();

    // Outer spiral haze rings
    for(let ring=0;ring<7;ring++){
      const rr=28+ring*17;
      const a=0.14-ring*0.015;
      const hg=ctx.createRadialGradient(0,0,rr*0.5,0,0,rr);
      hg.addColorStop(0,`rgba(160,80,255,${a*2.2})`); hg.addColorStop(0.5,`rgba(200,100,255,${a})`); hg.addColorStop(1,'rgba(100,40,200,0)');
      ctx.fillStyle=hg; ctx.beginPath(); ctx.ellipse(0,0,rr,rr*0.40,0,0,Math.PI*2); ctx.fill();
    }
    // Spiral arms — draw as rotated arcs with decreasing opacity
    const armColors=['rgba(200,140,255,.65)','rgba(140,200,255,.55)','rgba(255,160,220,.45)'];
    for(let arm=0;arm<3;arm++){
      ctx.save();

  if(map.id==='forge'){

    // Right hammer swings left-to-center (phase offset π)
    // swing: -1 = fully out, +1 = center
    const swingPeriod = 1.4; // seconds per full swing
    // Use a pendulum-like (cosine) so it accelerates into center
    const swingL = -Math.cos(T * Math.PI / swingPeriod);            // -1..+1
    const swingR =  Math.cos(T * Math.PI / swingPeriod);            // mirror

    const maxAngleL = 0.65; // radians outward (left rope swings rightward)
    const maxAngleR = 0.65;

    // Left rope: pivot at (pivotL, hammerPivotY), swings toward center (+angle = rightward)

    const hamLX = pivotL + Math.sin(angleL) * ropeLen;
    const hamLY = hammerPivotY + Math.cos(angleL) * ropeLen;

    // Right rope: pivot at (pivotR, hammerPivotY), swings toward center (-angle = leftward)

  // ── PER-MAP WAVE COLORS ───────────────────────────────────────────────────
  const wc={

function drawWater(y,color,amp,spd){
  ctx.fillStyle = color;

  ctx.beginPath();
  ctx.moveTo(0,H);
  ctx.lineTo(0,y-20);

  for(let x=0; x<=W+40; x+=40){
    ctx.lineTo(
      x,
      (y-20) + Math.sin((x + game.wave * spd) * .012) * amp
    );
  }

  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.lineWidth = 3;

  ctx.beginPath();

  for(let x=0; x<=W+40; x+=40){
    const yy =
      (y-20) + Math.sin((x + game.wave * spd) * .012) * amp;

    if(x===0) ctx.moveTo(x,yy);
    else ctx.lineTo(x,yy);
  }

  ctx.stroke();
}

    ctx.fillStyle='#ffd740';
    ctx.font='bold 20px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('👑', 0, 88);
    // Bowsprit
    ctx.strokeStyle='#4a2800'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(218,38); ctx.lineTo(262,18); ctx.stroke();
  }

  ctx.restore();
}
function getHarpoonColors(){
  const rod = game.rod;
  if(rod==='steel')     return { shaft:'#b0c4d8', tip:'#778899', head:'#e8eef4', line:'rgba(140,160,180,.9)', glow:null };
  if(rod==='gold')      return { shaft:'#d4a800', tip:'#a07800', head:'#ffe770', line:'rgba(220,180,0,.9)',   glow:'rgba(255,215,0,.4)' };
  if(rod==='mythic')    return { shaft:'#7c3ccc', tip:'#4a1888', head:'#cf9fff', line:'rgba(160,80,255,.9)', glow:'rgba(180,80,255,.5)' };
  if(rod==='elemental') return { shaft:'elemental', tip:'#1a1a2e', head:'#ffffff', line:'rgba(200,200,255,.9)', glow:'rgba(255,200,80,.5)' };
  // wood default
  return { shaft:'#a07840', tip:'#6b4f2a', head:'#d4a870', line:'rgba(120,80,40,.9)', glow:null };
}

function drawHarpoon(){
  const sy = 160;
  const hc = getHarpoonColors();
  if(!game.transition?.active){
    // ── Rope from boat to harpoon anchor ──
    ctx.save();
    ctx.strokeStyle = hc.line;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(harpoon.x, 160);
    ctx.lineTo(W/2, 160);
    ctx.stroke();
    ctx.restore();

    // ── Line from anchor to tip ──
    ctx.save();
    if(hc.glow){ ctx.shadowColor=hc.glow; ctx.shadowBlur=8; }
    ctx.strokeStyle = hc.line;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(harpoon.x, sy);
    ctx.lineTo(harpoon.tipX, harpoon.tipY);
    ctx.stroke();
    ctx.restore();

    // ── Harpoon body ──
    ctx.save();
    ctx.translate(harpoon.tipX, harpoon.tipY);

    if(hc.glow){ ctx.shadowColor=hc.glow; ctx.shadowBlur=14; }

    if(hc.shaft === 'elemental'){
      // Top half = fire gradient
      const fireGrad = ctx.createLinearGradient(-5,0,5,30);
      fireGrad.addColorStop(0,'#ff6b00');
      fireGrad.addColorStop(1,'#ff2200');
      roundRect(-5,0,10,30,3,fireGrad,'#ff4400',1);

      // Bottom half = ice gradient
      const iceGrad = ctx.createLinearGradient(-5,30,5,60);
      iceGrad.addColorStop(0,'#00aaff');
      iceGrad.addColorStop(1,'#0044cc');
      roundRect(-5,30,10,30,3,iceGrad,'#0088ff',1);

      // Lightning bolt in the middle
      const t = Date.now() * 0.006;
      ctx.shadowColor = 'rgba(255,255,150,0.9)';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#ffff80';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo( 2, 22);
      ctx.lineTo(-3, 30 + Math.sin(t)*1.5);
      ctx.lineTo( 3, 30 + Math.sin(t)*1.5);
      ctx.lineTo(-2, 38);
      ctx.stroke();
      ctx.shadowBlur = 0;
    } else {
      roundRect(-5,0,10,60,4,hc.shaft,'#111',1);
    }

    // Arrowhead
    ctx.fillStyle = hc.head;
    ctx.shadowColor = hc.glow || 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = hc.glow ? 10 : 4;
    ctx.beginPath();
    ctx.moveTo(-13,58);
    ctx.lineTo(0, 88);
    ctx.lineTo(13,58);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // ── Aim guide dotted line ──
    if(harpoon.status==='still'){
      ctx.globalAlpha=.55;
      ctx.strokeStyle='rgba(255,255,255,.75)';
      ctx.lineWidth=3;
      ctx.setLineDash([8,8]);
      ctx.beginPath();
      ctx.moveTo(harpoon.x,235);
      ctx.lineTo(harpoon.x,H-40);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha=1;
    }
  }
}


function changeMap(id, sinking=false){
  if(game.transition?.active) return;

  if(game.map === id && !sinking) return;

  game.panel = null;

  game.transition = {
    active: true,
    phase: 'sailOut',
    t: 0,
    nextMap: id,
    boatX: 0,
    bubbles: [],
    coverBubbles: [],
    loadProgress: 0,
    fishWiggle: 0,
    bgBubbleTimer: 0,
    coverAlpha: 0,
    coverPhase: 'none', // 'fill', 'hold', 'drain'
    coverT: 0,
    // Sinking support
    sinking: sinking,          // true = will sink on arrival
    sinkBoatY: 0,              // how far boat has sunk (px)
    sinkBoatAngle: 0,          // tilt angle while sinking
    sinkBubbles: [],           // special rising bubbles during sink
    sinkBlackAlpha: 0,         // fade to black
  };

  harpoon.status = 'still';
  harpoon.fish = null;
  harpoon.chest = null;
}

// Jump straight to sinking — no sail-out, no loading screen.
// Used when the player equips a boat too weak for the current map.
function startSinking(){
  if(game.transition?.active) return;
  game.panel = null;
  harpoon.status = 'still';
  harpoon.fish = null;
  harpoon.chest = null;
  game.transition = {
    active: true,
    phase: 'sinkIn',
    t: 0,
    nextMap: game.map,   // will be overwritten when black screen hits
    boatX: 0,
    bubbles: [],
    coverBubbles: [],
    loadProgress: 0,
    fishWiggle: 0,
    bgBubbleTimer: 0,
    coverAlpha: 0,
    coverPhase: 'none',
    coverT: 0,
    sinking: true,
    sinkBoatY: 0,
    sinkBoatAngle: 0,
    sinkBubbles: [],
    sinkBlackAlpha: 0,
  };
}

// ── BUBBLE SOUND: procedural underwater bubbling ──
function _playBubbles(){
  if(SFX.settings.mute || SFX.settings.muteUI) return;
  try {
    const ac = SFX.getCtx();
    if(!ac) return;
    if(ac.state === 'suspended') ac.resume();
    const t = ac.currentTime;
    // Multiple bubble pops at random pitches
    for(let i = 0; i < 3; i++){
      const delay = i * 0.065 * Math.random();
      const freq = 280 + Math.random() * 520;
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + delay);
      osc.frequency.exponentialRampToValueAtTime(freq * 1.7, t + delay + 0.038);
      g.gain.setValueAtTime(SFX.settings.masterVolume * 0.07, t + delay);
      g.gain.linearRampToValueAtTime(0, t + delay + 0.055);
      osc.connect(g); g.connect(ac.destination);
      osc.start(t + delay); osc.stop(t + delay + 0.07);
    }
  } catch(e){}
}

function _spawnBubble(tr, x, y, speed, size){
  tr.bubbles.push({ x: x ?? rand(0, W), y: y ?? H + 20, vx: rand(-18,18), vy: -(speed ?? rand(60,160)), r: size ?? rand(4,18), alpha: 0.7 + Math.random()*0.3, wobble: Math.random()*Math.PI*2, life: 1 });
}
function _spawnCoverBubble(tr){
  tr.coverBubbles.push({ x: rand(0, W), y: rand(0, H), r: rand(10, 80), alpha: 0, growing: true, speed: rand(0.6, 2.0) });
}

function updateTransition(dt){
  if(!game.transition.active) return;

  const delta = dt / 1000;
  const tr = game.transition;
  tr.t += delta;
  tr.fishWiggle = (tr.fishWiggle || 0) + delta * 8;

  // spawn background bubbles continuously during sailing phases
  tr.bgBubbleTimer = (tr.bgBubbleTimer || 0) + delta;
  if(tr.bgBubbleTimer > 0.08){
    tr.bgBubbleTimer = 0;
    _spawnBubble(tr);
    if(Math.random() < 0.3) _playBubbles();
  }

  // update floating bubbles
  for(let i = tr.bubbles.length - 1; i >= 0; i--){
    const b = tr.bubbles[i];
    b.y += b.vy * delta;
    b.x += b.vx * delta + Math.sin(tr.fishWiggle + b.wobble) * 12 * delta;
    b.life -= delta * 0.4;
    if(b.y < -30 || b.life <= 0) tr.bubbles.splice(i, 1);
  }

  if(tr.phase === 'sailOut'){
    tr.boatX += 900 * delta;
    tr.loadProgress = Math.min(0.45, tr.t / 1.2 * 0.45);
    if(tr.t > 1.2){
      tr.phase = 'loading';
      tr.t = 0;
      tr.boatX = -W - 260;
      // start cover bubble fill
      tr.coverPhase = 'fill';
      tr.coverT = 0;
    }

  } else if(tr.phase === 'loading'){
    tr.loadProgress = Math.min(0.9, 0.45 + tr.t / 2.5 * 0.45);

    // update cover bubbles
    if(tr.coverPhase === 'fill'){
      tr.coverT += delta;
      if(tr.coverT < 2.5){
        // spawn more cover bubbles as we fill
        if(Math.random() < delta * 12) _spawnCoverBubble(tr);
        tr.coverAlpha = Math.min(1, tr.coverT / 1.0);
      }
      for(let i = tr.coverBubbles.length-1; i>=0; i--){
        const cb = tr.coverBubbles[i];
        if(cb.growing){ cb.r += cb.speed * 60 * delta; cb.alpha = Math.min(0.92, cb.alpha + delta*1.5); if(cb.r > 120) cb.growing = false; }
        else { cb.alpha -= delta * 0.4; if(cb.alpha <= 0) tr.coverBubbles.splice(i,1); }
      }
    }

    if(tr.t > 0.5 && game.map !== tr.nextMap){
      game.map = tr.nextMap; _bgCacheMap = null;
      spawnFish();
      save();
    }

    if(tr.t > 2.5){
      tr.phase = 'reveal';
      tr.t = 0;
      tr.loadProgress = 1;
      tr.coverPhase = 'drain';
      tr.coverT = 0;
    }

  } else if(tr.phase === 'reveal'){
    tr.t += delta;
    tr.coverAlpha = Math.max(0, 1 - tr.t / 0.9);

    // drain: all cover bubbles fade
    for(let i = tr.coverBubbles.length-1; i>=0; i--){
      const cb = tr.coverBubbles[i];
      cb.alpha -= delta * 2.5;
      cb.r += 30 * delta;
      if(cb.alpha <= 0) tr.coverBubbles.splice(i,1);
    }

    // also drain regular bubbles
    for(const b of tr.bubbles) b.life -= delta * 2;

    tr.boatX += 900 * delta;

    if(tr.boatX >= 0){
      if(tr.sinking){
        // Switch immediately to sink phase
        tr.phase = 'sinkIn';
        tr.t = 0;
        tr.boatX = 0;
        tr.sinkBoatY = 0;
        tr.sinkBoatAngle = 0;
        tr.sinkBubbles = [];
        tr.sinkBlackAlpha = 0;
        tr.sinkWasTraveling = true;
        msg(`⚠️ Too weak for ${currentMap().name}!`, W/2, 120, '#fdcb6e');
      } else {
        game.transition = { active:false, phase:'none', t:0, nextMap:null, boatX:0, bubbles:[], coverBubbles:[], loadProgress:0, fishWiggle:0, bgBubbleTimer:0, coverAlpha:0, coverPhase:'none', coverT:0 };
        msg(`Arrived: ${currentMap().name}`, W/2, 120, '#fff16a');
      }
    }

  } else if(tr.phase === 'sinkIn'){
    // Boat sinks, bubbles rise, screen goes black
    tr.t += delta;

    // Boat sinks and tilts
    const sinkSpeed = 80 + tr.t * 90; // accelerates
    tr.sinkBoatY = Math.min(300, tr.sinkBoatY + sinkSpeed * delta);
    tr.sinkBoatAngle = Math.min(0.55, tr.sinkBoatAngle + 0.6 * delta);

    // Spawn rising sink bubbles
    if(Math.random() < delta * 22){
      tr.sinkBubbles.push({
        x: W/2 + rand(-160, 160),
        y: 105 + tr.sinkBoatY + rand(-20, 40),
        vx: rand(-28, 28),
        vy: rand(-180, -80),
        r: rand(5, 22),
        alpha: 0.8 + Math.random() * 0.2,
        wobble: Math.random() * Math.PI * 2,
        life: 1,
      });
    }
    // Update sink bubbles
    for(let i = tr.sinkBubbles.length-1; i>=0; i--){
      const b = tr.sinkBubbles[i];
      b.y += b.vy * delta;
      b.x += b.vx * delta + Math.sin(tr.t * 3 + b.wobble) * 18 * delta;
      b.life -= delta * 0.35;
      if(b.y < -30 || b.life <= 0) tr.sinkBubbles.splice(i, 1);
    }

    // Fade to black
    if(tr.t > 1.4){
      tr.sinkBlackAlpha = Math.min(1, (tr.t - 1.4) / 0.8);
    }

    if(tr.sinkBlackAlpha >= 1){
      tr.phase = 'sinkBlack';
      tr.t = 0;
      // Redirect map to best safe map
      const safeMap = bestMapForBoat();
      tr.nextMap = safeMap.id;
      game.map = safeMap.id;
      _bgCacheMap = null;
      spawnFish();
      save();
    }

  } else if(tr.phase === 'sinkBlack'){
    tr.t += delta;
    tr.sinkBlackAlpha = 1;
    if(tr.t > 1.0){
      tr.phase = 'sinkReveal';
      tr.t = 0;
      // If local sink (boat swap), no sail-in needed — boat stays centered
      if(!tr.sinkWasTraveling){
        tr.boatX = 0;
      } else {
        tr.boatX = -W - 260;
      }
    }

  } else if(tr.phase === 'sinkReveal'){
    tr.t += delta;
    tr.sinkBlackAlpha = Math.max(0, 1 - tr.t / 1.0);
    if(tr.sinkWasTraveling) tr.boatX += 900 * delta;
    const done = tr.sinkWasTraveling ? tr.boatX >= 0 : tr.sinkBlackAlpha <= 0;
    if(done){
      game.transition = { active:false, phase:'none', t:0, nextMap:null, boatX:0, bubbles:[], coverBubbles:[], loadProgress:0, fishWiggle:0, bgBubbleTimer:0, coverAlpha:0, coverPhase:'none', coverT:0, sinking:false, sinkBoatY:0, sinkBoatAngle:0, sinkBubbles:[], sinkBlackAlpha:0 };
      const safeMap = currentMap();
      msg(`🌊 Rescued! Drifted to ${safeMap.name}`, W/2, 120, '#74d7ff');
    }
  }
}

function drawTransition(){
  if(!game.transition.active) return;

  const tr = game.transition;
  const cw = canvas.width, ch = canvas.height;

  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalCompositeOperation = 'source-over';

  // ── dark ocean overlay alpha ──
  let bgAlpha = 0;
  if(tr.phase === 'sailOut') bgAlpha = Math.min(1, tr.t / 1.2);
  else if(tr.phase === 'loading') bgAlpha = 1;
  else if(tr.phase === 'reveal') bgAlpha = Math.max(0, 1 - tr.t / 0.9);

  if(bgAlpha > 0){
    // deep ocean gradient bg
    const grad = ctx.createLinearGradient(0, 0, 0, ch);
    grad.addColorStop(0, `rgba(2,12,32,${bgAlpha})`);
    grad.addColorStop(1, `rgba(0,30,60,${bgAlpha})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, cw, ch);
  }

  // ── floating bubbles ──
  if(bgAlpha > 0.1 && tr.bubbles){
    for(const b of tr.bubbles){
      const a = b.alpha * b.life * bgAlpha;
      if(a <= 0) continue;
      ctx.globalAlpha = a * 0.75;
      // bubble: ring + glint
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(140,220,255,0.9)`;
      ctx.lineWidth = Math.max(1, b.r * 0.18);
      ctx.stroke();
      // inner glint
      ctx.globalAlpha = a * 0.35;
      ctx.beginPath();
      ctx.arc(b.x - b.r*0.28, b.y - b.r*0.28, b.r * 0.22, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(220,245,255,0.9)';
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ── cover bubbles (screen fill effect) ──
  if(tr.coverBubbles && tr.coverBubbles.length){
    for(const cb of tr.coverBubbles){
      if(cb.alpha <= 0) continue;
      ctx.globalAlpha = cb.alpha;
      const bgrad = ctx.createRadialGradient(cb.x - cb.r*0.3, cb.y - cb.r*0.3, cb.r*0.05, cb.x, cb.y, cb.r);
      bgrad.addColorStop(0, 'rgba(160,230,255,0.85)');
      bgrad.addColorStop(0.5, 'rgba(20,100,180,0.7)');
      bgrad.addColorStop(1, 'rgba(0,40,100,0.5)');
      ctx.beginPath();
      ctx.arc(cb.x, cb.y, cb.r, 0, Math.PI*2);
      ctx.fillStyle = bgrad;
      ctx.fill();
      ctx.strokeStyle = 'rgba(140,220,255,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // ── LOADING SCREEN text + progress bar ──
  if(tr.phase === 'loading' || tr.phase === 'reveal'){
    const fadeIn = tr.phase === 'loading' ? Math.min(1, tr.t / 0.4) : Math.max(0, 1 - tr.t / 0.5);
    ctx.globalAlpha = fadeIn;

    // Title
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // "Sailing to new waters" — styled font
    ctx.font = `bold ${Math.round(cw * 0.038)}px Georgia, "Times New Roman", serif`;
    // text shadow glow
    ctx.shadowColor = 'rgba(0, 180, 255, 0.8)';
    ctx.shadowBlur = 28;
    ctx.fillStyle = '#c8f0ff';
    ctx.fillText('⚓  Sailing to New Waters  ⚓', cw/2, ch * 0.36);
    ctx.shadowBlur = 0;

    // sub text — destination
    const destName = (maps.find(m => m.id === tr.nextMap)?.name) || 'Unknown Waters';
    ctx.font = `italic ${Math.round(cw * 0.021)}px Georgia, serif`;
    ctx.fillStyle = 'rgba(140, 220, 255, 0.85)';
    ctx.fillText(destName, cw/2, ch * 0.44);

    // ── PROGRESS BAR ──
    const barW = cw * 0.52;
    const barH = ch * 0.052;
    const barX = cw/2 - barW/2;
    const barY = ch * 0.53;
    const barR = barH / 2;

    // bar background
    ctx.globalAlpha = fadeIn * 0.85;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, barR);
    ctx.fillStyle = 'rgba(0,20,50,0.75)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(80,180,255,0.55)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // filled portion — ocean gradient
    const progress = tr.loadProgress || 0;
    if(progress > 0.01){
      const fillW = (barW - barH) * progress; // leave room for fish head
      const fgrad = ctx.createLinearGradient(barX, 0, barX + fillW + barH, 0);
      fgrad.addColorStop(0, '#0a4a80');
      fgrad.addColorStop(0.5, '#0984e3');
      fgrad.addColorStop(1, '#74d7ff');
      ctx.beginPath();
      ctx.roundRect(barX, barY, fillW + barH, barH, barR);
      ctx.fillStyle = fgrad;
      ctx.fill();

      // animated water shimmer on fill
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(barX, barY, fillW + barH, barH, barR);
      ctx.clip();
      const shimX = ((Date.now() / 600) % 1) * (barW + 60) - 30;
      const shg = ctx.createLinearGradient(barX + shimX - 30, 0, barX + shimX + 30, 0);
      shg.addColorStop(0, 'rgba(255,255,255,0)');
      shg.addColorStop(0.5, 'rgba(255,255,255,0.22)');
      shg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = shg;
      ctx.fillRect(barX, barY, fillW + barH, barH);
      ctx.restore();
    }

    // ── FISH on the front of the bar ──
    const fishX = barX + (barW - barH) * progress + barH * 0.5;
    const fishY = barY + barH / 2;
    const fishR = barH * 0.62;
    const wiggle = Math.sin(tr.fishWiggle * 1.4) * 0.22; // body wiggle angle
    const tailWag = Math.sin(tr.fishWiggle * 2.2) * 0.4;

    ctx.save();
    ctx.globalAlpha = fadeIn;
    ctx.translate(fishX, fishY);
    ctx.rotate(wiggle);

    // fish body
    ctx.beginPath();
    ctx.ellipse(0, 0, fishR, fishR * 0.58, 0, 0, Math.PI*2);
    const fishGrad = ctx.createRadialGradient(-fishR*0.2, -fishR*0.15, fishR*0.05, 0, 0, fishR);
    fishGrad.addColorStop(0, '#ffe066');
    fishGrad.addColorStop(0.5, '#ff9f43');
    fishGrad.addColorStop(1, '#e05c00');
    ctx.fillStyle = fishGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,200,80,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // tail fin — wags
    ctx.save();
    ctx.translate(-fishR * 0.82, 0);
    ctx.rotate(tailWag);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-fishR * 0.55, -fishR * 0.45);
    ctx.lineTo(-fishR * 0.1, 0);
    ctx.lineTo(-fishR * 0.55, fishR * 0.45);
    ctx.closePath();
    ctx.fillStyle = '#ff7f00';
    ctx.fill();
    ctx.restore();

    // top fin
    ctx.beginPath();
    ctx.moveTo(fishR*0.1, -fishR*0.55);
    ctx.quadraticCurveTo(fishR*0.5, -fishR*0.95, fishR*0.7, -fishR*0.52);
    ctx.lineTo(fishR*0.55, -fishR*0.5);
    ctx.closePath();
    ctx.fillStyle = '#ffb347';
    ctx.fill();

    // eye
    ctx.beginPath();
    ctx.arc(fishR*0.45, -fishR*0.12, fishR*0.14, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(fishR*0.48, -fishR*0.12, fishR*0.08, 0, Math.PI*2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();

    // scale lines
    ctx.globalAlpha = fadeIn * 0.3;
    ctx.strokeStyle = '#ff7f00';
    ctx.lineWidth = 1.5;
    for(let s = 0; s < 3; s++){
      ctx.beginPath();
      ctx.arc(-fishR*0.1 + s*fishR*0.28, 0, fishR*0.32 - s*0.05, Math.PI*0.3, Math.PI*0.85);
      ctx.stroke();
    }

    ctx.restore();

    // ── small bubbles rising above bar ──
    ctx.globalAlpha = fadeIn * 0.65;
    const bt = Date.now() / 1000;
    for(let bk = 0; bk < 6; bk++){
      const bPhase = (bt * 0.7 + bk * 0.38) % 1;
      const bx = barX + barW * ((bk + 0.5) / 6) + Math.sin(bt*2 + bk) * 12;
      const by = barY - bPhase * barH * 3.5;
      const br = 3 + Math.sin(bk * 2.3) * 2;
      if(bPhase > 0.05 && bPhase < 0.95){
        ctx.beginPath();
        ctx.arc(bx, by, br, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(140,220,255,0.8)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    // ── percent label ──
    ctx.globalAlpha = fadeIn * 0.9;
    ctx.font = `bold ${Math.round(cw * 0.016)}px Georgia, serif`;
    ctx.fillStyle = 'rgba(200,240,255,0.85)';
    ctx.textAlign = 'center';
    ctx.fillText(`${Math.round(progress * 100)}%`, cw/2, barY + barH + barH * 0.85);
  }

  // ── SINKING ANIMATION ──
  if(tr.phase === 'sinkIn' || tr.phase === 'sinkBlack' || tr.phase === 'sinkReveal'){

    // Dark water overlay
    const sinkOverlay = tr.phase === 'sinkReveal'
      ? Math.max(0, 1 - tr.t / 1.0) * 0.6
      : Math.min(0.75, tr.t / 0.6);
    if(sinkOverlay > 0){
      const sinkGrad = ctx.createLinearGradient(0, 0, 0, ch);
      sinkGrad.addColorStop(0, `rgba(0,20,40,${sinkOverlay})`);
      sinkGrad.addColorStop(1, `rgba(0,5,20,${sinkOverlay * 1.3})`);
      ctx.globalAlpha = 1;
      ctx.fillStyle = sinkGrad;
      ctx.fillRect(0, 0, cw, ch);
    }

    if(tr.phase === 'sinkIn'){
      // Draw the sinking boat
      ctx.save();
      ctx.translate(cw/2, 105 + (tr.sinkBoatY || 0));
      ctx.rotate(tr.sinkBoatAngle || 0);
      ctx.globalAlpha = Math.max(0, 1 - (tr.sinkBoatY / 260));

      // Draw simplified boat shape (matches current boat)
      const boatId = game.boat || 'dinghy';
      ctx.shadowColor = 'rgba(0,150,255,0.5)';
      ctx.shadowBlur = 18;

      if(boatId === 'dinghy'){
        ctx.fillStyle = '#8b4513';
        ctx.beginPath(); ctx.moveTo(-130,38); ctx.lineTo(130,38); ctx.lineTo(90,100); ctx.lineTo(-90,100); ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#5c2f0e'; ctx.fillRect(-85,55,170,12);
        ctx.fillStyle = '#3d2b1f'; ctx.fillRect(-5,-30,10,70);
        ctx.fillStyle = '#ffdd59';
        ctx.beginPath(); ctx.moveTo(7,-27); ctx.lineTo(60,0); ctx.lineTo(7,26); ctx.closePath(); ctx.fill();
      } else if(boatId === 'sloop'){
        ctx.fillStyle = '#8b4513';
        ctx.beginPath(); ctx.moveTo(-170,35); ctx.lineTo(170,35); ctx.lineTo(115,105); ctx.lineTo(-115,105); ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#5c2f0e'; ctx.fillRect(-110,55,220,18);
        ctx.fillStyle = '#3d2b1f'; ctx.fillRect(-6,-85,12,70);
        ctx.fillStyle = '#ffdd59';
        ctx.beginPath(); ctx.moveTo(8,-82); ctx.lineTo(76,-48); ctx.lineTo(8,-18); ctx.closePath(); ctx.fill();
      } else if(boatId === 'galleon'){
        const hullGrad = ctx.createLinearGradient(0,32,0,112);
        hullGrad.addColorStop(0,'#546e7a'); hullGrad.addColorStop(1,'#263238');
        ctx.fillStyle = hullGrad;
        ctx.beginPath(); ctx.moveTo(-220,32); ctx.lineTo(220,32); ctx.lineTo(158,112); ctx.lineTo(-158,112); ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#263238';
        ctx.fillRect(-5,-82,10,54);
        ctx.fillStyle = '#cfd8dc';
        ctx.beginPath(); ctx.moveTo(5,-80); ctx.lineTo(68,-52); ctx.lineTo(5,-28); ctx.closePath(); ctx.fill();
      } else if(boatId === 'leviathan'){
        const hullGrad = ctx.createLinearGradient(0,32,0,112);
        hullGrad.addColorStop(0,'#d4a800'); hullGrad.addColorStop(1,'#5c3d00');
        ctx.fillStyle = hullGrad;
        ctx.beginPath(); ctx.moveTo(-220,32); ctx.lineTo(220,32); ctx.lineTo(158,112); ctx.lineTo(-158,112); ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#4a2800';
        ctx.fillRect(-5,-82,10,54);
        const mainSail = ctx.createLinearGradient(5,-80,72,-28);
        mainSail.addColorStop(0,'#fff9e6'); mainSail.addColorStop(1,'#f0d080');
        ctx.fillStyle = mainSail;
        ctx.beginPath(); ctx.moveTo(5,-80); ctx.lineTo(72,-52); ctx.lineTo(5,-28); ctx.closePath(); ctx.fill();
      }
      ctx.restore();

      // Draw sinking bubbles — rising from around the boat
      if(tr.sinkBubbles){
        for(const b of tr.sinkBubbles){
          if(b.life <= 0 || b.alpha <= 0) continue;
          const ba = b.alpha * b.life * 0.85;
          ctx.globalAlpha = ba;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
          ctx.strokeStyle = 'rgba(140,220,255,0.9)';
          ctx.lineWidth = Math.max(1, b.r * 0.18);
          ctx.stroke();
          ctx.globalAlpha = ba * 0.3;
          ctx.beginPath();
          ctx.arc(b.x - b.r*0.28, b.y - b.r*0.28, b.r * 0.22, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(220,245,255,0.95)';
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // Warning text
      const warnAlpha = Math.min(1, tr.t / 0.5);
      ctx.globalAlpha = warnAlpha;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `bold ${Math.round(cw * 0.034)}px Georgia, serif`;
      ctx.shadowColor = 'rgba(255,100,0,0.9)';
      ctx.shadowBlur = 24;
      ctx.fillStyle = '#ffcc44';
      ctx.fillText('⚠  Your boat is sinking!  ⚠', cw/2, ch * 0.72);
      ctx.shadowBlur = 0;
      ctx.font = `italic ${Math.round(cw * 0.018)}px Georgia, serif`;
      ctx.fillStyle = 'rgba(200,240,255,0.85)';
      const safeMapName = bestMapForBoat().name;
      ctx.fillText(`Drifting back to ${safeMapName}...`, cw/2, ch * 0.80);
      ctx.globalAlpha = 1;
    }

    // Fade to / from black
    if((tr.sinkBlackAlpha || 0) > 0){
      ctx.globalAlpha = tr.sinkBlackAlpha;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, cw, ch);
      ctx.globalAlpha = 1;
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPanel(){
  if(!game.panel) return;

  // Panel open animation
  if(!game.panelAnim) game.panelAnim={t:0,open:false};
  const now=Date.now();
  if(!game.panelAnim.open){ game.panelAnim.open=true; game.panelAnim.startTime=now; }
  const elapsed=now-(game.panelAnim.startTime||now);
  const raw=Math.min(1,elapsed/160);
  const ease=1-Math.pow(1-raw,3);
  const scale=0.88+0.12*ease;

  ctx.fillStyle=`rgba(0,0,0,${0.45*ease})`; ctx.fillRect(0,0,W,H);

  const px=175,py=95,pw=1160,ph=670,cx2=px+pw/2,cy2=py+ph/2;
  ctx.save();
  ctx.translate(cx2,cy2); ctx.scale(scale,scale); ctx.translate(-cx2,-cy2);
  ctx.globalAlpha=ease;

  roundRect(px,py,pw,ph,30,'#102a43','rgba(255,255,255,.55)',5);

  const isSubPanel = game.panel!=='menu' && game.panelFrom==='menu';

  // Tutorial pulse logic for back/X buttons
  const btnPulse = 0.7 + Math.sin(Date.now() * 0.01) * 0.3;

  // ← Back pulses when:
  //   - On a sub-panel and tutorial wants you to navigate to another sub-panel (need to go back to menu first)
  //   - Steps 5 (on shop→need quests), 6 (on quests→need settings), 7 (on any sub→close means back then X), 18 (on any sub→close means back then X)
  const tutNeedsBack = game.tutorial.active && isSubPanel && [5, 6, 7, 20].includes(game.tutorial.step);

  // X pulses when:
  //   - On the menu panel on steps 7 or 18 (user has backed out and now needs to fully close)
  //   - On a sub-panel on steps 7 or 18 is handled by back button above; once they back to menu, X takes over
  const tutNeedsX = game.tutorial.active && game.panel === 'menu' && [7, 20].includes(game.tutorial.step);

  if(isSubPanel){
    // ← Back button
    const backColor = tutNeedsBack ? `rgba(255,241,106,${btnPulse})` : '#636e72';
    ctx.save();
    if(tutNeedsBack){ ctx.shadowColor='rgba(255,241,106,.9)'; ctx.shadowBlur=20; }
    addButton(198,120,58,58,'←',()=>{ SFX.panelClose(); game.panel='menu'; game.panelFrom=null; game.panelAnim={t:0,open:false}; }, backColor).draw(backColor);
    ctx.restore();
  }

  // X always fully closes
  const xColor = tutNeedsX ? `rgba(255,100,80,${btnPulse})` : '#ff4757';
  ctx.save();
  if(tutNeedsX){ ctx.shadowColor='rgba(255,100,80,.9)'; ctx.shadowBlur=20; }
  addButton(1250,120,58,58,'X',()=>{ SFX.panelClose(); game.panel=null; game.panelFrom=null; game.panelAnim={t:0,open:false}; }, xColor).draw(xColor);
  ctx.restore();

  text(game.panel==='menu'?'MENU':game.panel==='rods'?'GEAR':game.panel==='collection'?'CATCHES':game.panel==='sound'?'SETTINGS':game.panel==='stats'?'STATISTICS':game.panel.toUpperCase(), W/2,145,48,'center');

  if(game.panel==='menu') drawMenuPanel();
  if(game.panel==='shop') drawShopPanel();
  if(game.panel==='maps') drawMapsPanel();
  if(game.panel==='rods') drawRodsPanel();
  if(game.panel==='bait') drawBaitPanel();
  if(game.panel==='quests') drawQuestsPanel();
  if(game.panel==='collection') drawCollectionPanel();
  if(game.panel==='sound') drawSoundPanel();
  if(game.panel==='stats') drawStatsPanel();

  ctx.restore();
  ctx.globalAlpha=1;
}

function lightenHex(hex,amt){
  if(!hex||hex[0]!=='#'||hex.length<7) return hex;
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function drawMapsPanel(){

  const cardH = 100;
  const gap = 14;

  const panelX = 200;
  const panelY = 190;
  const panelW = 1160;
  const panelH = 565;

  const startX = 240;
  const startY = 190;

  // total content height
  const contentH = maps.length * (cardH + gap) - gap;

  const maxScroll = Math.max(0, contentH - panelH + 120);

  game.mapScroll = clamp(game.mapScroll || 0, 0, maxScroll);

  ctx.save();

  // STRICT CLIP (prevents any overflow above/below panel)
  ctx.beginPath();
  ctx.rect(panelX, panelY, panelW, panelH);
  ctx.clip();

  maps.forEach((m, i)=>{

    const y = startY + i * (cardH + gap) - game.mapScroll;

    // hard cull (prevents floating “Galaxy Ocean ghost” at bottom)
    if(y + cardH < panelY || y > panelY + panelH) return;

    const unlocked = game.unlockedMaps[m.id];
    const active = game.map === m.id;

    roundRect(
      startX,
      y,
      1040,
      cardH,
      18,
      active ? 'rgba(46,213,115,.20)' : 'rgba(255,255,255,.08)',
      'rgba(255,255,255,.18)',
      2
    );

    text(m.name, startX + 20, y + 38, 26);
    text(`${m.mult}x coins • ${m.desc}`, startX + 20, y + 70, 16, 'left', '#dfe6e9');

    // Rod requirement badge
    const reqRodId = rodNeededFor(m.id);
    const reqRank = MAP_ROD_REQ[m.id] || 0;
    if(reqRank > 0){
      const reqRodName = rods.find(r=>r.id===reqRodId)?.name || reqRodId;
      const playerRank = ROD_RANK[game.rod] || 0;
      const meetsReq = playerRank >= reqRank;
      const badgeColor = meetsReq ? 'rgba(46,213,115,.22)' : 'rgba(255,71,87,.22)';
      const badgeBorder = meetsReq ? '#2ed573' : '#ff4757';
      const badgeText = meetsReq ? `✓ ${reqRodName}` : `Needs: ${reqRodName}`;
      roundRect(startX + 530, y + 24, 270, 32, 10, badgeColor, badgeBorder, 1.5);
      text(badgeText, startX + 665, y + 40, 14, 'center', meetsReq ? '#7bed9f' : '#ff7675');
    }

    // Boat requirement badge
    const reqBoatRank = MAP_BOAT_REQ[m.id] || 0;
    if(reqBoatRank > 0){
      const reqBoat = boatNeededFor(m.id);
      const meetsBoat = boatRankOk(m.id);
      const bbColor = meetsBoat ? 'rgba(46,213,115,.22)' : 'rgba(255,165,0,.22)';
      const bbBorder = meetsBoat ? '#2ed573' : '#fdcb6e';
      const bbText = meetsBoat ? `✓ ${reqBoat.name}` : `⛵ Needs: ${reqBoat.name}`;
      roundRect(startX + 530, y + 60, 270, 28, 10, bbColor, bbBorder, 1.5);
      text(bbText, startX + 665, y + 74, 13, 'center', meetsBoat ? '#7bed9f' : '#fdcb6e');
    }

    const canEnterRod = rodRankOk(m.id);
    const canEnterBoat = boatRankOk(m.id);
    const canEnter = canEnterRod && canEnterBoat;
    const willSink = canEnterRod && !canEnterBoat; // rod ok but boat too weak — can travel but will sink
    const label = active ? 'Equipped' : unlocked ? (canEnter ? 'Equip' : (willSink ? '⚠ Sail' : 'Can\'t Enter')) : `Buy ${fmt(m.cost)}`;
    const btnColor = active ? '#636e72' : willSink ? '#e67e22' : (!canEnter && unlocked) ? '#ff4757' : '#00cec9';

    addButton(
      startX + 880,
      y + 30,
      140,
      40,
      label,
      ()=>{
        // Tutorial: enforce specific map destination
        if(game.tutorial.active){
          const ts = game.tutorial.step;
          const forcedMap = ts === 9 ? 'reef' : ts === 11 ? 'deep' : ts === 13 ? 'lava' : ts === 21 ? 'ice' : null;
          if(forcedMap && m.id !== forcedMap && [9,11,13,21].includes(ts)){
            msg(`You need to go to ${maps.find(x=>x.id===forcedMap)?.name||forcedMap}!`, W/2, 200, '#ff7675');
            return;
          }
        }
        if(!canEnterRod && unlocked){
          const rn = rods.find(r=>r.id===rodNeededFor(m.id))?.name || rodNeededFor(m.id);
          msg(`Need ${rn} to fish here!`, W/2, 200, '#ff7675');
          return;
        }
        if(willSink && unlocked){
          // Allow travel, but will sink on arrival
          changeMap(m.id, true);
          save();
          return;
        }
        if(unlocked){
          changeMap(m.id);
          save();
        } else {
          if(!canEnterRod){
            const rn = rods.find(r=>r.id===rodNeededFor(m.id))?.name || rodNeededFor(m.id);
            msg(`Need ${rn} to fish here!`, W/2, 200, '#ff7675');
            return;
          }
          buy(m.cost, ()=>{
            game.unlockedMaps[m.id] = true;
            // If boat is too weak, sail but sink
            changeMap(m.id, !canEnterBoat);
            save();
          });
        }
      },
      btnColor
    ).draw(btnColor);

  });

  ctx.restore();

  // =========================
  // SCROLLBAR (visual feedback)
  // =========================

  if(maxScroll > 0){

    const barX = panelX + panelW - 14;
    const barY = panelY + 20;
    const barH = panelH - 40;

    const thumbH = Math.max(40, barH * (panelH / contentH));
    const scrollRatio = game.mapScroll / maxScroll;

    const thumbY = barY + (barH - thumbH) * scrollRatio;

    // track
    roundRect(barX, barY, 6, barH, 3, 'rgba(255,255,255,.08)');

    // thumb
    roundRect(barX, thumbY, 6, thumbH, 3, '#00cec9');
  }
}

function drawBaitPanel(){

        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(`${secsLeft}s remaining`, cx, barY2 + 20);

    // Buy button
    const btnY2 = cardY + cardH - 58;
    const btnW3 = cardW - 56;

    const btnH3 = 44;
    const btnHov = game.mouseX >= btnX3 && game.mouseX <= btnX3 + btnW3 && game.mouseY >= btnY2 && game.mouseY <= btnY2 + btnH3;
    const btnFill = active ? '#2d3748' : (btnHov ? b.color : b.dark);
    const btnBorder = active ? 'rgba(255,255,255,.12)' : `rgba(255,255,255,${btnHov ? '.7' : '.3'})`;

    ctx.save();
    if(btnHov && !active){ ctx.shadowColor = b.color; ctx.shadowBlur = 18; }
    const btnGrad = ctx.createLinearGradient(btnX3, btnY2, btnX3, btnY2 + btnH3);
    btnGrad.addColorStop(0, btnFill);
    btnGrad.addColorStop(1, active ? '#1a202c' : b.dark);
    roundRect(btnX3, btnY2, btnW3, btnH3, 12, btnGrad, btnBorder, 2);
    ctx.shadowBlur = 0;
    ctx.fillStyle = active ? 'rgba(255,255,255,.3)' : '#fff';
    ctx.font = `bold 18px ui-monospace,monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(active ? 'Already Active' : 'Buy & Use', btnX3 + btnW3/2, btnY2 + btnH3/2);
    ctx.restore();

    addButton(btnX3, btnY2, btnW3, btnH3, '', () => {
      if(active) return;
      // Tutorial step 15: only allow buying map bait (not mutation bait)
      if(game.tutorial.active && game.tutorial.step === 17 && b.key === 'mutationBaitActive'){
        msg('Buy the Volcano Coast Bait first!', W/2, 200, '#ff7675');
        SFX.error();
        return;
      }
      buy(b.cost, () => {
        game[b.key] = true;
        if(!game._baitTimers) game._baitTimers = {};
        game._baitTimers[b.key] = 30000;
        setTimeout(() => { game[b.key] = false; }, 30000);
      });
    }, 'transparent');
  });
}

// Track bait timer countdowns for the progress bar
function updateBaitTimers(dt){
  if(!game._baitTimers) return;
  for(const k of Object.keys(game._baitTimers)){
    if(game[k]){
      game._baitTimers[k] = Math.max(0, game._baitTimers[k] - dt);
    }
  }
}
