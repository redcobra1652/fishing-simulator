<script>
// =====================================================
// SOUND ENGINE (Web Audio API — no external files)
// =====================================================
const SFX = (() => {
  let ctx_a = null;
  function getCtx(){
    if(!ctx_a) ctx_a = new (window.AudioContext || window.webkitAudioContext)();
    return ctx_a;
  }

  const settings = {
    masterVolume: 0.7,
    mute: false,
    muteUI: false,
    muteFishing: false,
    muteQuests: false
  };

  // active reel (interval-based clicks)
  let reelInterval = null;
  let reelTickCount = 0;

  function play(fn, category='fishing'){
    if(settings.mute) return;
    if(category==='ui' && settings.muteUI) return;
    if(category==='fishing' && settings.muteFishing) return;
    if(category==='quest' && settings.muteQuests) return;
    try {
      const ac = getCtx();
      if(ac.state === 'suspended') ac.resume();
      fn(ac, settings.masterVolume);
    } catch(e){}
  }

  // ── REEL: line unspool — rapid mechanical clicks that accelerate ──
  function _reelTick(ac, vol, speed){
    try {
      const t = ac.currentTime;
      // Short sharp noise burst = one ratchet click
      const dur = 0.018;
      const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * dur), ac.sampleRate);
      const data = buf.getChannelData(0);
      for(let i = 0; i < data.length; i++){
        const env = Math.exp(-i / (ac.sampleRate * 0.006));
        data[i] = (Math.random() * 2 - 1) * env;
      }
      const src = ac.createBufferSource();
      src.buffer = buf;
      // High-pass to make it clicky, not bassy
      const hp = ac.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 1800;
      const g = ac.createGain();
      g.gain.setValueAtTime(vol * 0.18, t);
      src.connect(hp); hp.connect(g); g.connect(ac.destination);
      src.start(t);
    } catch(e){}
  }

  function startReel(){
    if(settings.mute || settings.muteFishing) return;
    stopReel();
    reelTickCount = 0;
    try {
      const ac = getCtx();
      if(ac.state === 'suspended') ac.resume();
      // Start slow, speed up over ~0.5s — like a spool catching speed
      let delay = 120; // ms between clicks
      const minDelay = 38;
      function scheduleTick(){
        if(reelInterval === null) return;
        _reelTick(ac, settings.masterVolume);
        reelTickCount++;
        delay = Math.max(minDelay, delay * 0.88);
        reelInterval = setTimeout(scheduleTick, delay);
      }
      reelInterval = setTimeout(scheduleTick, 0);
    } catch(e){}
  }

  function stopReel(){
    if(reelInterval !== null){ clearTimeout(reelInterval); reelInterval = null; }
  }

  // ── FISH / CHEST CAUGHT: wet splash thwack + line snap ──
  function fishCaught(rare=1){
    play((ac, vol) => {
      const t = ac.currentTime;

      // 1. Thump — low body impact (fish hits boat/deck)
      const thumpBuf = ac.createBuffer(1, Math.ceil(ac.sampleRate * 0.09), ac.sampleRate);
      const td = thumpBuf.getChannelData(0);
      for(let i = 0; i < td.length; i++){
        const env = Math.exp(-i / (ac.sampleRate * 0.028));
        td[i] = (Math.random() * 2 - 1) * env;
      }
      const thumpSrc = ac.createBufferSource();
      thumpSrc.buffer = thumpBuf;
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 280;
      const tg = ac.createGain();
      tg.gain.setValueAtTime(vol * 0.75, t);
      thumpSrc.connect(lp); lp.connect(tg); tg.connect(ac.destination);
      thumpSrc.start(t);

      // 2. Splash — broadband noise swell
      const splashLen = Math.ceil(ac.sampleRate * 0.22);
      const splashBuf = ac.createBuffer(1, splashLen, ac.sampleRate);
      const sd = splashBuf.getChannelData(0);
      for(let i = 0; i < splashLen; i++){
        const attack = Math.min(1, i / (ac.sampleRate * 0.012));
        const decay  = Math.exp(-i / (ac.sampleRate * 0.065));
        sd[i] = (Math.random() * 2 - 1) * attack * decay;
      }
      const splashSrc = ac.createBufferSource();
      splashSrc.buffer = splashBuf;
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 900; bp.Q.value = 0.6;
      const sg = ac.createGain();
      sg.gain.setValueAtTime(vol * 0.38, t + 0.01);
      splashSrc.connect(bp); bp.connect(sg); sg.connect(ac.destination);
      splashSrc.start(t + 0.01);

      // 3. Bright ping — scales with rarity
      const baseFreq = 480 + rare * 60;
      const osc = ac.createOscillator();
      const og = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(baseFreq, t + 0.05);
      osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.6, t + 0.28);
      og.gain.setValueAtTime(vol * 0.22, t + 0.05);
      og.gain.linearRampToValueAtTime(0, t + 0.38);
      osc.connect(og); og.connect(ac.destination);
      osc.start(t + 0.05); osc.stop(t + 0.40);
    }, 'fishing');
  }

  // ── QUEST COMPLETE ──
  function questDone(){
    play((ac, vol) => {
      const t = ac.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];
      notes.forEach((freq, i) => {
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, t + i * 0.09);
        g.gain.setValueAtTime(0, t + i * 0.09);
        g.gain.linearRampToValueAtTime(vol * 0.22, t + i * 0.09 + 0.04);
        g.gain.linearRampToValueAtTime(0, t + i * 0.09 + 0.32);
        osc.connect(g); g.connect(ac.destination);
        osc.start(t + i * 0.09); osc.stop(t + i * 0.09 + 0.35);
      });
    }, 'quest');
  }

  // ── SELL / COINS ──
  function coins(){
    play((ac, vol) => {
      const t = ac.currentTime;
      const freqs = [880, 1108, 1320];
      freqs.forEach((f, i) => {
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        g.gain.setValueAtTime(vol * 0.18, t + i * 0.06);
        g.gain.linearRampToValueAtTime(0, t + i * 0.06 + 0.18);
        osc.connect(g); g.connect(ac.destination);
        osc.start(t + i * 0.06); osc.stop(t + i * 0.06 + 0.2);
      });
    }, 'ui');
  }

  // ── PANEL OPEN: crisp high click ──
  function panelOpen(){
    play((ac, vol) => {
      const t = ac.currentTime;
      // Sharp attack transient
      const clickBuf = ac.createBuffer(1, Math.ceil(ac.sampleRate * 0.008), ac.sampleRate);
      const cd = clickBuf.getChannelData(0);
      for(let i = 0; i < cd.length; i++){
        cd[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.002));
      }
      const csrc = ac.createBufferSource();
      csrc.buffer = clickBuf;
      const hp2 = ac.createBiquadFilter(); hp2.type = 'highpass'; hp2.frequency.value = 3000;
      const cg = ac.createGain(); cg.gain.setValueAtTime(vol * 0.55, t);
      csrc.connect(hp2); hp2.connect(cg); cg.connect(ac.destination);
      csrc.start(t);
      // Bright chirp tail
      const osc = ac.createOscillator();
      const og = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1100, t + 0.004);
      osc.frequency.exponentialRampToValueAtTime(1600, t + 0.07);
      og.gain.setValueAtTime(vol * 0.14, t + 0.004);
      og.gain.linearRampToValueAtTime(0, t + 0.10);
      osc.connect(og); og.connect(ac.destination);
      osc.start(t + 0.004); osc.stop(t + 0.11);
    }, 'ui');
  }

  // ── PANEL CLOSE: lower dull thud ──
  function panelClose(){
    play((ac, vol) => {
      const t = ac.currentTime;
      // Dull low thump
      const thumpBuf = ac.createBuffer(1, Math.ceil(ac.sampleRate * 0.06), ac.sampleRate);
      const td = thumpBuf.getChannelData(0);
      for(let i = 0; i < td.length; i++){
        td[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.018));
      }
      const tsrc = ac.createBufferSource();
      tsrc.buffer = thumpBuf;
      const lp2 = ac.createBiquadFilter(); lp2.type = 'lowpass'; lp2.frequency.value = 320;
      const tg = ac.createGain(); tg.gain.setValueAtTime(vol * 0.50, t);
      tsrc.connect(lp2); lp2.connect(tg); tg.connect(ac.destination);
      tsrc.start(t);
      // Low descending tone
      const osc = ac.createOscillator();
      const og = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, t + 0.005);
      osc.frequency.exponentialRampToValueAtTime(280, t + 0.09);
      og.gain.setValueAtTime(vol * 0.13, t + 0.005);
      og.gain.linearRampToValueAtTime(0, t + 0.12);
      osc.connect(og); og.connect(ac.destination);
      osc.start(t + 0.005); osc.stop(t + 0.13);
    }, 'ui');
  }

  // ── BUTTON CLICK: plain neutral click (for in-panel buttons) ──
  function buttonClick(){
    play((ac, vol) => {
      const t = ac.currentTime;
      const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * 0.012), ac.sampleRate);
      const d = buf.getChannelData(0);
      for(let i = 0; i < d.length; i++){
        d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.003));
      }
      const src = ac.createBufferSource();
      src.buffer = buf;
      const hp3 = ac.createBiquadFilter(); hp3.type = 'highpass'; hp3.frequency.value = 2200;
      const g = ac.createGain(); g.gain.setValueAtTime(vol * 0.30, t);
      src.connect(hp3); hp3.connect(g); g.connect(ac.destination);
      src.start(t);
    }, 'ui');
  }

  // ── ERROR / CANT AFFORD ──
  function error(){
    play((ac, vol) => {
      const t = ac.currentTime;
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.linearRampToValueAtTime(140, t + 0.12);
      g.gain.setValueAtTime(vol * 0.14, t);
      g.gain.linearRampToValueAtTime(0, t + 0.15);
      osc.connect(g); g.connect(ac.destination);
      osc.start(t); osc.stop(t + 0.16);
    }, 'ui');
  }

  return { settings, startReel, stopReel, fishCaught, questDone, coins, panelOpen, panelClose, buttonClick, error };
})();

const MAP_ROD_REQ = {
  bay:0, reef:0,
  deep:0, lava:0, ice:1,
  mangrove:1, crystal:1, storm:1, jungle:2,
  toxic:2, desert:2, moon:3, void:3, heaven:3,
  galaxy:4
};
function rodRankOk(mapId){ return ROD_RANK[game.rod] >= (MAP_ROD_REQ[mapId]||0); }
function rodNeededFor(mapId){
  const need = MAP_ROD_REQ[mapId]||0;
  return Object.keys(ROD_RANK).find(k=>ROD_RANK[k]===need)||'wood';
}

function chooseVariant(typeId){
  let goldenChance = 1 + game.upgrades.luck * .5 + (game.potions.luck>0 ? 5 : 0) + (game.mutationBaitActive ? 18 : 0);
  let rainbowChance = .125 + game.upgrades.luck * .125 + (game.potions.luck>0 ? 2 : 0) + (game.mutationBaitActive ? 8 : 0);
  if(typeId >= 5){ goldenChance += 2; rainbowChance += 1; }
  const r = rand(0,100);
  if(r < rainbowChance) return { id:'rainbow', label:'Rainbow', mult:5, border:'#ff4dff' };
  if(r < rainbowChance + goldenChance) return { id:'golden', label:'Golden', mult:2.5, border:'#ffd700' };
  return null;
}

function roundRect(x,y,w,h,r,fill,stroke,lw=2){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();} if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
}

  draw(color='#0984e3'){ roundRect(this.x,this.y,this.w,this.h,16,color,'rgba(255,255,255,.65)',3); text(this.label,this.x+this.w/2,this.y+this.h/2,24,'center'); }
}

function fishGradient(f, w, h, variant){
  const isRainbow = f.rainbow || (variant && variant.id === 'rainbow');
  const isGolden = f.golden || (variant && variant.id === 'golden');
  if(isRainbow){
    const g = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
    g.addColorStop(0, '#ff4757');
    g.addColorStop(0.2, '#ffa502');
    g.addColorStop(0.4, '#2ed573');
    g.addColorStop(0.6, '#1e90ff');
    g.addColorStop(0.8, '#a55eea');
    g.addColorStop(1, '#ff6b81');
    return g;
  }
  if(isGolden){
    const g = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
    g.addColorStop(0, '#fff7a1');
    g.addColorStop(0.3, '#ffd32a');
    g.addColorStop(0.7, '#f9ca24');
    g.addColorStop(1, '#e1a800');
    return g;
  }
  const g = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
  g.addColorStop(0, 'white');
  g.addColorStop(0.2, f.body);
  g.addColorStop(1, f.fin);
  return g;
}

function traceFishBody(shape, w, h){
  ctx.beginPath();

  if(shape === 'long'){
    ctx.ellipse(0, 0, w*0.5, h*0.32, 0, 0, Math.PI*2);

  }else if(shape === 'tall'){
    ctx.ellipse(-w*0.03, 0, w*0.4, h*0.48, 0, 0, Math.PI*2);

  }else if(shape === 'eel'){
    ctx.moveTo(-w*0.5, -h*0.18);
    ctx.quadraticCurveTo(-w*0.15, -h*0.35, w*0.42, -h*0.14);
    ctx.quadraticCurveTo(w*0.56, 0, w*0.42, h*0.14);
    ctx.quadraticCurveTo(-w*0.15, h*0.35, -w*0.5, h*0.18);
    ctx.quadraticCurveTo(-w*0.6, 0, -w*0.5, -h*0.18);

  }else if(shape === 'shark'){
    ctx.moveTo(-w*0.48, 0);
    ctx.quadraticCurveTo(-w*0.15, -h*0.44, w*0.25, -h*0.22);
    ctx.lineTo(w*0.52, -h*0.05);
    ctx.lineTo(w*0.56, 0);
    ctx.lineTo(w*0.52, h*0.05);
    ctx.lineTo(w*0.25, h*0.22);
    ctx.quadraticCurveTo(-w*0.15, h*0.44, -w*0.48, 0);

  }else if(shape === 'ray'){
    ctx.moveTo(-w*0.4, 0);
    ctx.quadraticCurveTo(-w*0.15, -h*0.5, w*0.25, -h*0.22);
    ctx.quadraticCurveTo(w*0.4, 0, w*0.25, h*0.22);
    ctx.quadraticCurveTo(-w*0.15, h*0.5, -w*0.4, 0);

  }else if(shape === 'whale'){
    ctx.ellipse(-w*0.02, 0, w*0.5, h*0.38, 0, 0, Math.PI*2);

  }else if(shape === 'angel'){
    ctx.moveTo(-w*0.35, 0);
    ctx.quadraticCurveTo(-w*0.15, -h*0.55, w*0.18, -h*0.28);
    ctx.quadraticCurveTo(w*0.45, 0, w*0.18, h*0.28);
    ctx.quadraticCurveTo(-w*0.15, h*0.55, -w*0.35, 0);

  }else if(shape === 'spiky'){
    ctx.moveTo(-w*0.45, 0);
    ctx.lineTo(-w*0.2, -h*0.42);
    ctx.lineTo(0, -h*0.3);
    ctx.lineTo(w*0.25, -h*0.18);
    ctx.lineTo(w*0.46, 0);
    ctx.lineTo(w*0.25, h*0.18);
    ctx.lineTo(0, h*0.3);
    ctx.lineTo(-w*0.2, h*0.42);
    ctx.closePath();

  }else if(shape === 'viper'){
    ctx.moveTo(w*0.52, 0);
    ctx.quadraticCurveTo(w*0.38, -h*0.1, w*0.1, -h*0.22);
    ctx.quadraticCurveTo(-w*0.1, -h*0.38, -w*0.3, -h*0.28);
    ctx.lineTo(-w*0.5, -h*0.08);
    ctx.lineTo(-w*0.52, 0);
    ctx.lineTo(-w*0.5, h*0.08);
    ctx.lineTo(-w*0.3, h*0.28);
    ctx.quadraticCurveTo(-w*0.1, h*0.38, w*0.1, h*0.22);
    ctx.quadraticCurveTo(w*0.38, h*0.1, w*0.52, 0);
    ctx.closePath();

  }else if(shape === 'phantom'){
    ctx.moveTo(w*0.42, h*0.06);
    ctx.quadraticCurveTo(w*0.28, -h*0.06, 0, -h*0.5);
    ctx.quadraticCurveTo(-w*0.22, -h*0.38, -w*0.45, -h*0.1);
    ctx.quadraticCurveTo(-w*0.55, 0, -w*0.45, h*0.1);
    ctx.quadraticCurveTo(-w*0.22, h*0.38, 0, h*0.5);
    ctx.quadraticCurveTo(w*0.28, h*0.06, w*0.42, h*0.06);
    ctx.closePath();

  // DRAGON / SERPENT TYPES

  }else if(shape === 'dragon'){
    ctx.moveTo(-w*0.55, 0);

    ctx.lineTo(-w*0.35, -h*0.18);
    ctx.lineTo(-w*0.2, -h*0.46);
    ctx.lineTo(0, -h*0.28);

    ctx.lineTo(w*0.18, -h*0.38);
    ctx.lineTo(w*0.42, -h*0.12);
    ctx.lineTo(w*0.58, 0);

      -w*0.35, h*0.38,
      -w*0.62, h*0.04
    );

    ctx.quadraticCurveTo(
      -w*0.74, 0,
      -w*0.62, -h*0.04
    );

    ctx.closePath();

  }else if(shape === 'wyrm'){
    // Armored dragon eel
    ctx.moveTo(-w*0.58, 0);

    ctx.lineTo(-w*0.42, -h*0.08);
    ctx.lineTo(-w*0.26, -h*0.32);
    ctx.lineTo(-w*0.05, -h*0.18);

    ctx.lineTo(w*0.12, -h*0.42);
    ctx.lineTo(w*0.32, -h*0.2);

    ctx.lineTo(w*0.52, -h*0.06);
    ctx.lineTo(w*0.66, 0);

    ctx.lineTo(w*0.52, h*0.06);

    ctx.lineTo(w*0.32, h*0.2);
    ctx.lineTo(w*0.12, h*0.42);

    ctx.lineTo(-w*0.05, h*0.18);
    ctx.lineTo(-w*0.26, h*0.32);
    ctx.lineTo(-w*0.42, h*0.08);

    ctx.closePath();

  }else if(shape === 'leviathan'){
    // Massive ancient titan
    ctx.moveTo(-w*0.72, -h*0.12);

    ctx.bezierCurveTo(
      -w*0.45, -h*0.58,
      w*0.08, -h*0.64,
      w*0.46, -h*0.22
    );

    ctx.lineTo(w*0.72, -h*0.04);
    ctx.lineTo(w*0.84, 0);
    ctx.lineTo(w*0.72, h*0.04);

    ctx.lineTo(w*0.46, h*0.22);

    ctx.bezierCurveTo(
      w*0.08, h*0.64,
      -w*0.45, h*0.58,
      -w*0.72, h*0.12
    );

    ctx.quadraticCurveTo(
      -w*0.86, 0,
      -w*0.72, -h*0.12
    );

    ctx.closePath();

  }else if(shape === 'hydra'){
    // Multi-necked beast silhouette
    ctx.moveTo(-w*0.54, -h*0.08);

    ctx.lineTo(-w*0.28, -h*0.36);

    // upper neck bump
    ctx.quadraticCurveTo(
      -w*0.08, -h*0.62,
      w*0.08, -h*0.32
    );

    // center neck bump
    ctx.quadraticCurveTo(
      w*0.22, -h*0.58,
      w*0.36, -h*0.18
    );

    // lower neck bump

      w*0.52, -h*0.26,
      w*0.68, 0
    );

    ctx.quadraticCurveTo(
      w*0.52, h*0.26,
      w*0.36, h*0.18
    );

    ctx.quadraticCurveTo(
      w*0.22, h*0.58,
      w*0.08, h*0.32
    );

    ctx.quadraticCurveTo(
      -w*0.08, h*0.62,
      -w*0.28, h*0.36
    );

    ctx.lineTo(-w*0.54, h*0.08);

    ctx.quadraticCurveTo(
      -w*0.68, 0,
      -w*0.54, -h*0.08
    );

    ctx.closePath();

  }else if(shape === 'kraken'){
    // Bulbous squid horror body
    ctx.moveTo(-w*0.42, -h*0.22);

    ctx.quadraticCurveTo(
      -w*0.18, -h*0.58,
      w*0.18, -h*0.52
    );

    ctx.quadraticCurveTo(
      w*0.52, -h*0.32,
      w*0.62, 0
    );

    ctx.quadraticCurveTo(
      w*0.52, h*0.32,
      w*0.18, h*0.52
    );

    ctx.quadraticCurveTo(
      -w*0.18, h*0.58,
      -w*0.42, h*0.22
    );

    ctx.quadraticCurveTo(
      -w*0.56, 0,
      -w*0.42, -h*0.22
    );
    } else{
      ctx.ellipse(0, 0, w*0.45, h*0.42, 0, 0, Math.PI*2);

}


function drawTailShape(tail, w, h, color){
  ctx.fillStyle = color;
  ctx.beginPath();

  if(tail === 'fork'){
    ctx.moveTo(-w*0.48, 0);
    ctx.lineTo(-w*0.78, -h*0.32);
    ctx.lineTo(-w*0.62, -h*0.02);
    ctx.lineTo(-w*0.78, h*0.32);
    ctx.closePath();

  }else if(tail === 'fan'){
    ctx.moveTo(-w*0.45, 0);
    ctx.lineTo(-w*0.72, -h*0.38);
    ctx.lineTo(-w*0.75, h*0.38);
    ctx.closePath();

  }else if(tail === 'round'){
    ctx.arc(-w*0.58, 0, h*0.22, 0, Math.PI*2);

  }else if(tail === 'spike'){
    ctx.moveTo(-w*0.46, 0);
    ctx.lineTo(-w*0.82, -h*0.18);
    ctx.lineTo(-w*0.82, h*0.18);
    ctx.closePath();

  }else if(tail === 'whip'){
    ctx.moveTo(-w*0.38, 0);
    ctx.quadraticCurveTo(-w*0.7, h*0.06, -w*0.95, h*0.26);
    ctx.lineWidth = 6;
    ctx.strokeStyle = color;
    ctx.stroke();
    return;

  }else if(tail === 'whale'){
    ctx.moveTo(-w*0.5, 0);
    ctx.lineTo(-w*0.72, -h*0.25);
    ctx.lineTo(-w*0.8, -h*0.02);
    ctx.lineTo(-w*0.85, -h*0.24);
    ctx.lineTo(-w*0.95, 0);
    ctx.lineTo(-w*0.85, h*0.24);
    ctx.lineTo(-w*0.8, h*0.02);
    ctx.lineTo(-w*0.72, h*0.25);
    ctx.closePath();

  // =========================
  // NEW MONSTER TAILS
  // =========================

  }else if(tail === 'serpent'){
    ctx.moveTo(-w*0.45, 0);

    ctx.quadraticCurveTo(
      -w*0.72, -h*0.06,
      -w*1.02, -h*0.28
    );

    ctx.quadraticCurveTo(
      -w*0.82, 0,
      -w*1.02, h*0.28
    );

    ctx.quadraticCurveTo(
      -w*0.72, h*0.06,
      -w*0.45, 0
    );

    ctx.closePath();

  }else if(tail === 'dragon'){
    ctx.moveTo(-w*0.48, 0);

    ctx.lineTo(-w*0.72, -h*0.14);
    ctx.lineTo(-w*0.86, -h*0.34);
    ctx.lineTo(-w*1.02, 0);

    ctx.lineTo(-w*0.86, h*0.34);
    ctx.lineTo(-w*0.72, h*0.14);

    ctx.closePath();

  }else if(tail === 'tentacle'){
    // Kraken tentacles
    for(let i = -2; i <= 2; i++){
      const oy = i * h*0.08;

      ctx.moveTo(-w*0.42, oy);

      ctx.quadraticCurveTo(
        -w*0.7,
        oy + h*0.06,
        -w*(0.9 + Math.random()*0.12),
        oy + h*(0.12*i)
      );
    }

    ctx.lineWidth = 5;
    ctx.strokeStyle = color;
    ctx.stroke();
    return;

  }else if(tail === 'hydra'){
    // Multiple tails/necks
    ctx.moveTo(-w*0.45, 0);

    ctx.quadraticCurveTo(
      -w*0.72, -h*0.32,
      -w*0.96, -h*0.42
    );

    ctx.moveTo(-w*0.45, 0);

    ctx.quadraticCurveTo(
      -w*0.84, 0,
      -w*1.02, 0
    );

    ctx.moveTo(-w*0.45, 0);

    ctx.quadraticCurveTo(
      -w*0.72, h*0.32,
      -w*0.96, h*0.42
    );

    ctx.lineWidth = 7;
    ctx.strokeStyle = color;
    ctx.stroke();
    return;

  }else if(tail === 'leviathan'){
    ctx.moveTo(-w*0.48, 0);

    ctx.lineTo(-w*0.82, -h*0.28);
    ctx.lineTo(-w*1.05, -h*0.08);

    ctx.lineTo(-w*0.92, 0);

    ctx.lineTo(-w*1.05, h*0.08);
    ctx.lineTo(-w*0.82, h*0.28);

    ctx.closePath();

  }else if(tail === 'wyrm'){
    ctx.moveTo(-w*0.45, 0);

    ctx.lineTo(-w*0.68, -h*0.1);
    ctx.lineTo(-w*0.88, -h*0.24);
    ctx.lineTo(-w*1.02, 0);

    ctx.lineTo(-w*0.88, h*0.24);
    ctx.lineTo(-w*0.68, h*0.1);

    ctx.closePath();

  }else{
    ctx.moveTo(-w*0.47, 0);
    ctx.lineTo(-w*0.72, -h*0.32);
    ctx.lineTo(-w*0.72, h*0.32);
    ctx.closePath();
  }

  ctx.fill();
}

function drawFishPattern(pattern, w, h){
  if(pattern === 'none') return;

  if(pattern === 'stripe'){
    ctx.fillStyle = 'rgba(255,255,255,.20)';
    for(let i=-2;i<=2;i++) ctx.fillRect(-w*0.1 + i*18, -h*0.32, 8, h*0.64);
  }
  else if(pattern === 'spot' || pattern === 'dot'){
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    for(let i=0;i<6;i++){
      ctx.beginPath();
      ctx.arc(-w*0.12 + (i%3)*22, -h*0.12 + Math.floor(i/3)*24, 5, 0, Math.PI*2);
      ctx.fill();
    }
  }
  else if(pattern === 'finstripe'){
    ctx.strokeStyle = 'rgba(255,255,255,.28)';
    ctx.lineWidth = 3;
    for(let i=-1;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.12 + i*18, -h*0.26);
      ctx.lineTo(-w*0.02 + i*18, h*0.26);
      ctx.stroke();
    }
  }
  else if(pattern === 'line'){
    ctx.strokeStyle = 'rgba(255,255,255,.25)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-w*0.25, 0);
    ctx.lineTo(w*0.28, 0);
    ctx.stroke();
  }
  else if(pattern === 'shadow'){
    ctx.fillStyle = 'rgba(0,0,0,.18)';
    ctx.fillRect(-w*0.1, -h*0.28, w*0.35, h*0.56);
  }
  else if(pattern === 'lava' || pattern === 'crack'){
    ctx.strokeStyle = 'rgba(255,220,120,.45)';
    ctx.lineWidth = 3;
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.15 + i*22, -h*0.22);
      ctx.lineTo(-w*0.05 + i*22, -h*0.02);
      ctx.lineTo(-w*0.12 + i*22, h*0.2);
      ctx.stroke();
    }
  }
  else if(pattern === 'ice'){
    ctx.strokeStyle = 'rgba(255,255,255,.42)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-w*0.2, -h*0.12); ctx.lineTo(w*0.1, h*0.08);
    ctx.moveTo(-w*0.08, -h*0.24); ctx.lineTo(w*0.18, 0);
    ctx.moveTo(-w*0.12, h*0.2); ctx.lineTo(w*0.12, -h*0.02);
    ctx.stroke();
  }
  else if(pattern === 'leaf'){
    ctx.strokeStyle = 'rgba(255,255,255,.24)';
    ctx.lineWidth = 3;
    for(let i=-1;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.18 + i*18, 0);
      ctx.lineTo(-w*0.06 + i*18, -h*0.18);
      ctx.stroke();
    }
  }
  else if(pattern === 'mud'){
    ctx.fillStyle = 'rgba(90,60,30,.22)';
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.arc(-w*0.12 + i*16, (i%2===0?-1:1)*10, 7, 0, Math.PI*2);
      ctx.fill();
    }
  }
  else if(pattern === 'crystal'){
    ctx.strokeStyle = 'rgba(255,255,255,.45)';
    ctx.lineWidth = 2;
    for(let i=0;i<4;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.12 + i*18, -h*0.18);
      ctx.lineTo(-w*0.04 + i*18, 0);
      ctx.lineTo(-w*0.12 + i*18, h*0.18);
      ctx.stroke();
    }
  }
  else if(pattern === 'bolt'){
    ctx.strokeStyle = 'rgba(255,255,180,.55)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-w*0.14, -h*0.18);
    ctx.lineTo(-w*0.02, -h*0.02);
    ctx.lineTo(-w*0.1, h*0.02);
    ctx.lineTo(w*0.06, h*0.2);
    ctx.stroke();
  }
  else if(pattern === 'tiger'){
    ctx.strokeStyle = 'rgba(90,40,10,.45)';
    ctx.lineWidth = 4;
    for(let i=-1;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.16 + i*18, -h*0.24);
      ctx.lineTo(-w*0.02 + i*18, h*0.18);
      ctx.stroke();
    }
  }
  else if(pattern === 'toxic'){
    ctx.fillStyle = 'rgba(255,255,140,.35)';
    for(let i=0;i<6;i++){
      ctx.beginPath();
      ctx.arc(-w*0.12 + (i%3)*20, -h*0.1 + Math.floor(i/3)*24, 6, 0, Math.PI*2);
      ctx.fill();
    }
  }
  else if(pattern === 'sand'){
    ctx.fillStyle = 'rgba(255,255,255,.18)';
    for(let i=0;i<12;i++){
      ctx.fillRect(-w*0.2 + i*10, -h*0.12 + (i%2)*10, 4, 4);
    }
  }
  else if(pattern === 'wave'){
    ctx.strokeStyle = 'rgba(255,255,255,.30)';
    ctx.lineWidth = 2;
    for(let i=0;i<2;i++){
      ctx.beginPath();
      for(let x=-w*0.18;x<=w*0.18;x+=10){
        const y = Math.sin((x + i*20) * 0.15) * 5 + (i===0?-8:8);
        if(x===-w*0.18) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
  }
  else if(pattern === 'moon'){
    ctx.fillStyle = 'rgba(255,255,255,.22)';
    ctx.beginPath();
    ctx.arc(0, 0, h*0.12, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,.18)';
    ctx.beginPath();
    ctx.arc(h*0.05, -h*0.02, h*0.1, 0, Math.PI*2);
    ctx.fill();
  }
  else if(pattern === 'star'){
    ctx.fillStyle = 'rgba(255,255,255,.7)';
    for(let i=0;i<5;i++){
      const sx = -w*0.12 + i*18;
      const sy = i%2===0 ? -h*0.08 : h*0.08;
      ctx.fillRect(sx-1, sy-5, 2, 10);
      ctx.fillRect(sx-5, sy-1, 10, 2);
    }
  }
  else if(pattern === 'void'){
    ctx.fillStyle = 'rgba(140,100,255,.22)';
    ctx.beginPath();
    ctx.arc(0, 0, h*0.18, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,.28)';
    ctx.beginPath();
    ctx.arc(0, 0, h*0.08, 0, Math.PI*2);
    ctx.fill();
  }
  else if(pattern === 'cloud'){
    ctx.fillStyle = 'rgba(255,255,255,.30)';
    ctx.beginPath();
    ctx.arc(-10, 2, 9, 0, Math.PI*2);
    ctx.arc(0, -4, 10, 0, Math.PI*2);
    ctx.arc(12, 2, 8, 0, Math.PI*2);
    ctx.fill();
  }
  else if(pattern === 'galaxy'){
    ctx.fillStyle = 'rgba(255,255,255,.65)';
    for(let i=0;i<8;i++){
      ctx.beginPath();
      ctx.arc(-w*0.16 + i*12, Math.sin(i)*10, 2.5, 0, Math.PI*2);
      ctx.fill();
    }
  }
  else if(pattern === 'glowdot'){
    ctx.fillStyle = 'rgba(255,255,180,.65)';
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.arc(-w*0.12 + i*16, 0, 4, 0, Math.PI*2);
      ctx.fill();
    }
  }
  else if(pattern === 'gold'){
    ctx.strokeStyle = 'rgba(255,255,255,.35)';
    ctx.lineWidth = 3;
    for(let i=-1;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(-w*0.14 + i*18, -h*0.2);
      ctx.lineTo(-w*0.04 + i*18, h*0.2);
      ctx.stroke();
    }
  }
  else if(pattern === 'rainbow'){
    // Shimmer bands across the body
    const colors = ['rgba(255,71,87,.3)','rgba(255,165,2,.3)','rgba(46,213,115,.3)','rgba(30,144,255,.3)','rgba(165,94,234,.3)'];
    for(let i=0;i<colors.length;i++){
      ctx.fillStyle = colors[i];
      ctx.fillRect(-w*0.18 + i*w*0.09, -h*0.32, w*0.07, h*0.64);
    }
    ctx.strokeStyle = 'rgba(255,255,255,.25)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-w*0.18, 0); ctx.lineTo(w*0.28, 0);
    ctx.stroke();
  }
}
class Fish{
  constructor() {
    const map = currentMap();
    const rareBoost = map.rare + game.upgrades.luck * .25 + (game.potions.luck > 0 ? 24 : 0) + (game.mapBaitActive ? 35 : 0);
    const fishPool = fishTypesByMap[map.id] || fishTypesByMap.bay;

    // 1. Calculate pool total with a dampened, subtle boost
    let totalChance = 0;
    for (const f of fishPool) {
      let ch = f.chance;
      if (f.id >= 4) {
        // Asymptotically dampens the rareBoost so it can NEVER exceed a modest cap.
        // Formula: base_chance * (1 + (max_extra_multiplier * boost / (boost + scaling_factor)))
        // This ensures even a rareBoost of 500 only gives a controlled, gentle lift.
        const maxExtraMult = f.id === 4 ? 0.25 : 0.40; // Max +25% for Golden, +40% for Rainbow
        const dampeningFactor = 50; // Higher = slower, subtler scaling
        const subtleMultiplier = 1 + (maxExtraMult * rareBoost / (rareBoost + dampeningFactor));
        
        ch = ch * subtleMultiplier;
      }
      totalChance += ch;
    }

    // 2. Roll a random number between 0 and the dynamic total chance
    let roll = rand(0, totalChance);
    let acc = 0;
    let chosen = fishPool[0];

    // 3. Run the selection match accurately
    for (const f of fishPool) {
      let ch = f.chance;
      if (f.id >= 4) {
        const maxExtraMult = f.id === 4 ? 0.25 : 0.40;
        const dampeningFactor = 50;
        const subtleMultiplier = 1 + (maxExtraMult * rareBoost / (rareBoost + dampeningFactor));
        
        ch = ch * subtleMultiplier;
      }
      acc += ch;
      if (roll <= acc) { 
        chosen = f; 
        break; 
      }
    }

    // 4. Clean fallback allocation 
    this.type = { ...chosen};
    this.variant = chooseVariant(chosen.id);
    this.dir = Math.random() < .5 ? -1 : 1;
    this.w = 140 * chosen.size; 
    this.h = 70 * chosen.size;
    this.x = this.dir === 1 ? -this.w - rand(0, 500) : W + rand(0, 500);
    this.y = rand(245, 735);
    this.baseSpeed = rand(2.2, 4.8) + (chosen.id * .18) + (map.fishBonus * .05);
    this.speed = this.baseSpeed;
    this.bob = rand(0, Math.PI * 2);
    // Tail wag — side-to-side oscillation (horizontal plane)
    this.wagPhase = rand(0, Math.PI * 2);
    this.wagSpeed = rand(3.5, 6.5) + chosen.id * 0.4; // faster for rare fish
    this.wagAmp   = rand(0.075, 0.15);                  // wag sweep angle in radians
    // Dash behaviour
    this.dashCooldown = rand(2000, 6000); // ms until first dash
    this.dashing = false;
    this.dashDuration = 0;
    this.dashMult = rand(2.4, 3.8) + chosen.id * 0.3; // rarer = more violent dash
    this.caught = false;
  }
  move(dt){
    if(this.caught) return;
    this.bob += dt * .005;
    this.wagPhase += dt * .001 * this.wagSpeed;

    // Dash logic
    if(!this.dashing){
      this.dashCooldown -= dt;
      if(this.dashCooldown <= 0){
        this.dashing = true;
        this.dashDuration = rand(300, 600);  // ms
        this.speed = this.baseSpeed * this.dashMult;
        // Sharpen wag during dash
        this._savedWagAmp = this.wagAmp;
        this.wagAmp = Math.min(0.45, this.wagAmp * 2.5);
        this.wagSpeed *= 1.8;
      }
    } else {
      this.dashDuration -= dt;
      if(this.dashDuration <= 0){
        this.dashing = false;
        this.speed = this.baseSpeed;
        this.wagAmp = this._savedWagAmp;
        this.wagSpeed /= 1.8;
        this.dashCooldown = rand(3000, 8000);
      }
    }

    this.x += this.dir * this.speed * dt * .06;
    if(this.x > W + this.w + 60 || this.x < -this.w - 60) Object.assign(this, new Fish());
  }
draw(){
  const f = this.type, bob = Math.sin(this.bob) * 4;
  const v = this.variant;
  const isGolden = f.golden || (v && v.id === 'golden');
  const isRainbow = f.rainbow || (v && v.id === 'rainbow');

  // Lateral tail wag: oscillates left-right (around the fish's vertical axis at the tail root)
  const wagAngle = Math.sin(this.wagPhase) * (this.wagAmp || 0.2);

  ctx.save();
  ctx.translate(this.x + this.w/2, this.y + this.h/2 + bob);
  ctx.scale(this.dir, 1);

  // Dash visual: ghost trail behind fish
  if(this.dashing){
    for(let g = 1; g <= 3; g++){
      ctx.save();
      ctx.globalAlpha = 0.12 * (4 - g);
      ctx.translate(-g * 14, 0);
      ctx.fillStyle = f.body || '#fff';
      traceFishBody(f.shape || 'round', this.w * 0.9, this.h * 0.9);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  if(f.glow || isRainbow){
    ctx.shadowColor = isRainbow ? 'rgba(255,255,255,.85)' : f.fin;
    ctx.shadowBlur = this.dashing ? 28 : 18;
    ctx.shadowOffsetY = 0;
  }else if(isGolden){
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = this.dashing ? 24 : 16;
    ctx.shadowOffsetY = 0;
  }else{
    ctx.shadowColor = f.id >= 4 ? 'rgba(255,255,255,.35)' : 'rgba(0,0,0,.25)';
    ctx.shadowBlur = f.id >= 4 ? 12 : 7;
    ctx.shadowOffsetY = 4;
  }

  // Draw tail with lateral wag applied — pivot around rear of body
  ctx.save();
  // Tail root is roughly at (-w*0.44, 0) in local space
  const tailRootX = -this.w * 0.44;
  ctx.translate(tailRootX, 0);
  ctx.rotate(wagAngle);
  ctx.translate(-tailRootX, 0);
  drawTailShape(f.tail || 'triangle', this.w, this.h, isGolden ? '#e1a800' : (isRainbow ? '#ff6b81' : f.fin));
  ctx.restore();

  ctx.fillStyle = fishGradient(f, this.w, this.h, v);
  traceFishBody(f.shape || 'round', this.w, this.h);
  ctx.fill();

  ctx.save();
  traceFishBody(f.shape || 'round', this.w, this.h);
  ctx.clip();
  if(isGolden) drawFishPattern('gold', this.w, this.h);
  else if(isRainbow) drawFishPattern('rainbow', this.w, this.h);
  else drawFishPattern(f.pattern || 'none', this.w, this.h);
  ctx.restore();

  ctx.shadowBlur = 0;

  ctx.fillStyle = isGolden ? '#e1a800' : (isRainbow ? '#ff6b81' : f.fin);
  ctx.beginPath();
  ctx.moveTo(-this.w*0.02, -this.h*0.02);
  ctx.lineTo(-this.w*0.18, -this.h*0.46);
  ctx.lineTo(this.w*0.14, -this.h*0.12);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(-this.w*0.02, this.h*0.1);
  ctx.lineTo(-this.w*0.16, this.h*0.42);
  ctx.lineTo(this.w*0.12, this.h*0.16);
  ctx.closePath();
  ctx.fill();

  if(f.shape === 'shark' || f.shape === 'spiky' || f.shape === 'viper'){
    ctx.beginPath();
    ctx.moveTo(-this.w*0.08, -this.h*0.12);
    ctx.lineTo(0, -this.h*0.54);
    ctx.lineTo(this.w*0.08, -this.h*0.14);
    ctx.closePath();
    ctx.fill();
  }

  if(isGolden || isRainbow){
    ctx.strokeStyle = isGolden ? '#ffd32a' : '#ffffff';
    ctx.lineWidth = 5;
    traceFishBody(f.shape || 'round', this.w, this.h);
    ctx.stroke();
  }

  if(isRainbow){
    ctx.strokeStyle = 'rgba(255,255,255,.45)';
    ctx.lineWidth = 3;
    drawTailShape(f.tail || 'triangle', this.w, this.h, 'rgba(0,0,0,0)');
  }

  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(this.w*0.28, -this.h*0.1, Math.max(5, this.h*0.055), 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = 'black';
  ctx.beginPath();
  ctx.arc(this.w*0.3, -this.h*0.1, Math.max(2.5, this.h*0.027), 0, Math.PI*2);
  ctx.fill();

  // --- Draw Name Tag ---
  if(f.id >= 4){
    ctx.save();
    ctx.scale(this.dir, 1); 
    const displayName = v ? v.label + ' ' + f.name : f.name;
    const nameColor = isRainbow ? '#ff9ff3' : (isGolden ? '#ffd32a' : '#fff');
    text(displayName, 0, -this.h * 0.75, 16, 'center', nameColor);
    ctx.restore();
  }

  ctx.restore();
}

class TreasureChest{

const harpoon = { x:750, y:142, status:'still', tipX:750, tipY:160, fish:null, chest:null };
function harpoonSpeed(){ return (10 + game.upgrades.speed)*currentRod().power*(game.potions.speed>0?1.65:1); }
function ropeRange(){ return 400 + game.upgrades.rope*100/3; }
function launch(){
  if(game.panel || game.transition.active) return;
  if(harpoon.status!=='still') return;
  // Block firing during tutorial except steps 1-2 (where firing is the lesson)
  if(game.tutorial.active && game.tutorial.step === 0) return;
  if(game.tutorial.active && game.tutorial.step > 2) return;
  harpoon.status='out';
  harpoon.tipX=harpoon.x;
  harpoon.tipY = 170;
  SFX.startReel();
}
function updateHarpoon(dt){
  if (!harpoon) return;

  const sy=160;
  if(harpoon.status==='still'){
    // Mouse-controlled horizontal aiming. It still drops straight down when fired.
    harpoon.x = clamp(game.mouseX,210,W-210);
    harpoon.tipX = harpoon.x; harpoon.tipY = sy;
    return;
  }
  const step=harpoonSpeed()*dt* 0.06;
  if(harpoon.status==='out') harpoon.tipY += step;
  else harpoon.tipY -= step*1.15;

  if(harpoon.status==='out' && !harpoon.fish){
    if(harpoon.tipY-sy > ropeRange() || harpoon.tipY > H-35) harpoon.status='back';
    for(const chest of game.chests){
      const r=chest.rect();
      const hit = harpoon.tipX>r.x+4 && harpoon.tipX<r.x+r.w-4 && harpoon.tipY>r.y+4 && harpoon.tipY<r.y+r.h-4;
      if(hit){
        harpoon.chest=chest; chest.caught=true; harpoon.status='back'; game.shake=8;
        burst(harpoon.tipX,harpoon.tipY,'#ffd700',24); break;
      }
    }
    if(!harpoon.chest) for(const fish of game.fish){
      const r=fish.rect();
      const centerY=r.y+r.h/2;
      const cleanHit = harpoon.tipX>r.x+8 && harpoon.tipX<r.x+r.w-8 && harpoon.tipY>r.y+6 && harpoon.tipY<r.y+r.h-6;
      if(cleanHit){
        // Check if current rod is strong enough for this map's fish
        if(!rodRankOk(game.map)){
          // Bounce the harpoon back — scales too strong
          harpoon.status='back';
          game.shake=5;
          burst(harpoon.tipX,harpoon.tipY,'#aaaaaa',14);
          const needed = rodNeededFor(game.map);
          const rodName = rods.find(r=>r.id===needed)?.name || needed;
          msg(`Scales too strong! Need: ${rodName}`,W/2,200,'#ff7675');
          break;
        }
        harpoon.fish=fish; fish.caught=true; harpoon.status='back'; game.shake=8;
        harpoon.tipY=centerY; burst(harpoon.tipX,harpoon.tipY,fish.type.body,18);
        SFX.stopReel(); SFX.fishCaught(fish.type.id);
        break;
      }
    }
  }
  if(harpoon.fish){ harpoon.fish.x=harpoon.tipX-harpoon.fish.w/2; harpoon.fish.y=harpoon.tipY-harpoon.fish.h/2; }
  if(harpoon.chest){ harpoon.chest.x=harpoon.tipX-harpoon.chest.w/2; harpoon.chest.y=harpoon.tipY-harpoon.chest.h/2; }
  if(harpoon.status==='back' && harpoon.tipY<=sy){
    if(harpoon.fish) catchFish(harpoon.fish);
    if(harpoon.chest) catchChest(harpoon.chest);
    SFX.stopReel();
    harpoon.status='still'; harpoon.fish=null; harpoon.chest=null; harpoon.chest=null; harpoon.tipY=sy;
  }
}
function catchFish(fish){
  const map=currentMap(); const variantMult=fish.variant?fish.variant.mult:1; const potionMult=game.potions.coin>0?2:1; const base=fish.type.value*map.mult*variantMult*potionMult * (1 + (game.upgrades.magnet * 0.14)); game.combo = Math.min(2, game.combo+.125); game.comboTimer=2600;
  const earned=Math.round(base*game.combo); game.coins += earned; game.score += earned; game.caught++; game.bestCatch=`${fish.variant?fish.variant.label+' ':''}${fish.type.name}`;
  // Record collection entry with variant tracking (normalize old boolean saves)
  if(!game.collection[fish.type.name] || game.collection[fish.type.name] === true) game.collection[fish.type.name] = { caught: true };
  else game.collection[fish.type.name].caught = true;
  if(fish.variant){ const entry = game.collection[fish.type.name]; if(!entry.variants) entry.variants = {}; entry.variants[fish.variant.id] = true; }
  if(fish.type.id>=4) game.gems += (fish.type.id-3)/2;
  msg(`+${fmt(earned)} coins`, fish.x+fish.w/2, fish.y, '#fff16a');
  if(fish.type.id>=5) msg(`+${fish.type.id-4} gem`, fish.x+fish.w/2, fish.y-30, '#9effff');
  SFX.coins();
  game.fish.splice(game.fish.indexOf(fish),1); game.fish.push(new Fish());
  checkQuests(fish); save();
}

function catchChest(chest){
  const rewards=[
    {name:'Lucky Potion', key:'luck', time:30000, color:'#a29bfe', text:'+Luck for 30s'},
    {name:'Speed Potion', key:'speed', time:25000, color:'#54a0ff', text:'+Harpoon speed for 25s'},
    {name:'Coin Potion', key:'coin', time:35000, color:'#ffdd59', text:'2x coins for 35s'}
  ];
  const r=rewards[irand(0,rewards.length-1)];
  game.potions[r.key]=r.time;
  msg(`${r.name}! ${r.text}`, chest.x+chest.w/2, chest.y-10, r.color);
  burst(chest.x+chest.w/2,chest.y+chest.h/2,r.color,34);
  game.chests.splice(game.chests.indexOf(chest),1);
  setTimeout(()=>{ if(game.chests.length<2) game.chests.push(new TreasureChest()); }, irand(5000,11000));
}

function checkQuests(fish){
  for(const q of game.quests){
    if(q.done) continue;
    let ok=false;
    if(q.type==='caught'&&game.caught>=q.goal) ok=true;
    if(q.type==='catches'&&game.caught>=q.goal) ok=true;
    if(q.type==='lotofcatches'&&game.caught>=q.goal) ok=true;
    if(q.type==='combo'&&game.combo>=q.goal) ok=true;
    if(q.type==='legend'&&fish.type.id>=5) ok=true;
    if(q.type==='elemental_unlock'){
      if(fish.type.name==='Frost Wyrm') q.caughtWyrm=true;
      if(fish.type.name==='Infernal Hydra') q.caughtHydra=true;
      if(fish.type.name==='Thunder Phantom') q.caughtPhantom=true;
      if(q.caughtWyrm && q.caughtHydra) ok=true;
    }
    if(ok){
      q.done=true;
      if(q.type==='elemental_unlock'){
        game.elementalUnlocked=true;
        msg('QUEST DONE! Elemental Rod is now available!', W/2, 120, '#ff9ff3');
      } else {
        game.coins+=q.reward;
        msg(`QUEST DONE +${fmt(q.reward)}`, W/2, 120, '#7bed9f');
      }
      SFX.questDone();
    }
  }
  save();
}

function burst(x,y,color,n=10){ for(let i=0;i<n;i++) game.particles.push({x,y,vx:rand(-4,4),vy:rand(-4,4),life:rand(25,55),color}); }
function msg(txt,x,y,color){ game.messages.push({text:txt,x,y,color,life:80}); }
function updateEffects(dt){
  if(game.comboTimer>0){ game.comboTimer-=dt; if(game.comboTimer<=0) game.combo=1; }
  for(const k of Object.keys(game.potions)){ if(game.potions[k]>0) game.potions[k]=Math.max(0, game.potions[k]-dt); }
  game.shake*=.9;
  for(const p of game.particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=.08; p.life--; }
  game.particles=game.particles.filter(p=>p.life>0);
  for(const m of game.messages){ m.y-=.7; m.life--; }
  game.messages=game.messages.filter(m=>m.life>0);
}

function drawWater(y,color,amp,spd){
  ctx.fillStyle = color;

  ctx.beginPath();
  ctx.moveTo(0,H);
  ctx.lineTo(0,y-20);

  for(let x=0; x<=W+40; x+=40){
    ctx.lineTo(
      x,
      (y-20) + Math.sin((x + game.wave * spd) * .012) * amp
    );
  }

  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.lineWidth = 3;

  ctx.beginPath();

  for(let x=0; x<=W+40; x+=40){
    const yy =
      (y-20) + Math.sin((x + game.wave * spd) * .012) * amp;

    if(x===0) ctx.moveTo(x,yy);
    else ctx.lineTo(x,yy);
  }

  ctx.stroke();
}
function drawBoat(){ ctx.save(); const tx = game.transition.active ? W/2 + game.transition.boatX : W/2; ctx.translate(tx,105); ctx.shadowColor='rgba(0,0,0,.28)'; ctx.shadowBlur=12; ctx.shadowOffsetY=8; ctx.fillStyle='#8b4513'; ctx.beginPath(); ctx.moveTo(-170,35); ctx.lineTo(170,35); ctx.lineTo(115,105); ctx.lineTo(-115,105); ctx.closePath(); ctx.fill(); ctx.fillStyle='#5c2f0e'; ctx.fillRect(-110,55,220,18); roundRect(-62,-25,124,65,12,'#f7f1e3','#8b4513',5); roundRect(-42,-10,35,28,6,'#54a0ff','#2e86de',3); roundRect(10,-10,35,28,6,'#54a0ff','#2e86de',3); ctx.fillStyle='#3d2b1f'; ctx.fillRect(-6,-85,12,70); ctx.fillStyle='#ffdd59'; ctx.beginPath(); ctx.moveTo(8,-82); ctx.lineTo(76,-48); ctx.lineTo(8,-18); ctx.closePath(); ctx.fill(); ctx.restore(); }
function getHarpoonColors(){
  const rod = game.rod;
  if(rod==='steel')     return { shaft:'#b0c4d8', tip:'#778899', head:'#e8eef4', line:'rgba(140,160,180,.9)', glow:null };
  if(rod==='gold')      return { shaft:'#d4a800', tip:'#a07800', head:'#ffe770', line:'rgba(220,180,0,.9)',   glow:'rgba(255,215,0,.4)' };
  if(rod==='mythic')    return { shaft:'#7c3ccc', tip:'#4a1888', head:'#cf9fff', line:'rgba(160,80,255,.9)', glow:'rgba(180,80,255,.5)' };
  if(rod==='elemental') return { shaft:'elemental', tip:'#1a1a2e', head:'#ffffff', line:'rgba(200,200,255,.9)', glow:'rgba(255,200,80,.5)' };
  // wood default
  return { shaft:'#a07840', tip:'#6b4f2a', head:'#d4a870', line:'rgba(120,80,40,.9)', glow:null };
}

function drawHarpoon(){
  const sy = 160;
  const hc = getHarpoonColors();
  if(!game.transition?.active){
    // ── Rope from boat to harpoon anchor ──
    ctx.save();
    ctx.strokeStyle = hc.line;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(harpoon.x, 160);
    ctx.lineTo(W/2, 160);
    ctx.stroke();
    ctx.restore();

    // ── Line from anchor to tip ──
    ctx.save();
    if(hc.glow){ ctx.shadowColor=hc.glow; ctx.shadowBlur=8; }
    ctx.strokeStyle = hc.line;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(harpoon.x, sy);
    ctx.lineTo(harpoon.tipX, harpoon.tipY);
    ctx.stroke();
    ctx.restore();

    // ── Harpoon body ──
    ctx.save();
    ctx.translate(harpoon.tipX, harpoon.tipY);

    if(hc.glow){ ctx.shadowColor=hc.glow; ctx.shadowBlur=14; }

    if(hc.shaft === 'elemental'){
      // Top half = fire gradient
      const fireGrad = ctx.createLinearGradient(-5,0,5,30);
      fireGrad.addColorStop(0,'#ff6b00');
      fireGrad.addColorStop(1,'#ff2200');
      roundRect(-5,0,10,30,3,fireGrad,'#ff4400',1);

      // Bottom half = ice gradient
      const iceGrad = ctx.createLinearGradient(-5,30,5,60);
      iceGrad.addColorStop(0,'#00aaff');
      iceGrad.addColorStop(1,'#0044cc');
      roundRect(-5,30,10,30,3,iceGrad,'#0088ff',1);

      // Lightning bolt in the middle
      const t = Date.now() * 0.006;
      ctx.shadowColor = 'rgba(255,255,150,0.9)';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#ffff80';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo( 2, 22);
      ctx.lineTo(-3, 30 + Math.sin(t)*1.5);
      ctx.lineTo( 3, 30 + Math.sin(t)*1.5);
      ctx.lineTo(-2, 38);
      ctx.stroke();
      ctx.shadowBlur = 0;
    } else {
      roundRect(-5,0,10,60,4,hc.shaft,'#111',1);
    }

    // Arrowhead
    ctx.fillStyle = hc.head;
    ctx.shadowColor = hc.glow || 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = hc.glow ? 10 : 4;
    ctx.beginPath();
    ctx.moveTo(-13,58);
    ctx.lineTo(0, 88);
    ctx.lineTo(13,58);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // ── Aim guide dotted line ──
    if(harpoon.status==='still'){
      ctx.globalAlpha=.55;
      ctx.strokeStyle='rgba(255,255,255,.75)';
      ctx.lineWidth=3;
      ctx.setLineDash([8,8]);
      ctx.beginPath();
      ctx.moveTo(harpoon.x,235);
      ctx.lineTo(harpoon.x,H-40);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha=1;
    }
  }
}


function changeMap(id){
  if(game.transition?.active) return;

  if(game.map === id) return;

  game.panel = null;

  game.transition = {
    active: true,
    phase: 'sailOut',
    t: 0,
    nextMap: id,
    boatX: 0
  };

  harpoon.status = 'still';
  harpoon.fish = null;
  harpoon.chest = null;
}

function updateTransition(dt){
  if(!game.transition.active) return;

  // convert ms to seconds
  const delta = dt / 1000;

  const tr = game.transition;
  tr.t += delta;

  if(tr.phase === 'sailOut'){

    tr.boatX += 900 * delta;

    if(tr.t > 1.2){
      tr.phase = 'black';
      tr.t = 0;
      tr.boatX = -W - 260;
    }

  } else if(tr.phase === 'black'){

    if(tr.t > 0.7){
      game.map = tr.nextMap;
      spawnFish();
      save();

      tr.phase = 'sailIn';
      tr.t = 0;
    }

  } else if(tr.phase === 'sailIn'){

    tr.boatX += 900 * delta;

    if(tr.boatX >= 0){

      game.transition = {
        active:false,
        phase:'none',
        t:0,
        nextMap:null,
        boatX:0
      };

      msg(`Arrived: ${currentMap().name}`, W/2, 120, '#fff16a');
    }
  }
}

function drawTransition(){
  if(!game.transition.active) return;

  const tr = game.transition;

  let alpha = 0;

  if(tr.phase === 'sailOut'){
    alpha = Math.min(1, tr.t / 1.2);
  }
  else if(tr.phase === 'black'){
    alpha = 1;
  }
  else if(tr.phase === 'sailIn'){
    alpha = Math.max(0, 1 - tr.t / 1.2);
  }

  ctx.save();

  // 🔥 FULL RESET (THIS IS KEY)
  ctx.setTransform(1,0,0,1,0,0);
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = alpha;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.globalAlpha = 1;

  if(tr.phase === 'black'){
    ctx.fillStyle = '#fff';
    ctx.font = '42px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Sailing to new waters...', canvas.width/2, canvas.height/2);
  }

  ctx.restore();
}

function drawPanel(){

  const elapsed=now-(game.panelAnim.startTime||now);

  const ease=1-Math.pow(1-raw,3);
  const scale=0.88+0.12*ease;

  ctx.fillStyle=`rgba(0,0,0,${0.45*ease})`; ctx.fillRect(0,0,W,H);

  const px=175,py=95,pw=1160,ph=670,cx2=px+pw/2,cy2=py+ph/2;

  ctx.globalAlpha=ease;

  roundRect(px,py,pw,ph,30,'#102a43','rgba(255,255,255,.55)',5);

  const isSubPanel = game.panel!=='menu' && game.panelFrom==='menu';

function lightenHex(hex,amt){
  if(!hex||hex[0]!=='#'||hex.length<7) return hex;
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

      }, btnCol).draw(btnCol);
    }
  });
}
function drawBaitPanel(){
  const map = currentMap();
  const mapIndex = maps.findIndex(m => m.id === game.map);

  // Map bait = 30% of map unlock cost (min 150 for bay)
  const mapBaitCost = Math.max(150, Math.round(map.cost * 0.30));
  // Mutation bait scales with progression
  const mutationCost = Math.round(500 * Math.pow(1.55, mapIndex));

  const baits = [
    {
      key: 'mapBaitActive',
      label: `${map.name} Bait`,
      icon: '🌊',
      cost: mapBaitCost,
      color: '#00cec9',
      dark: '#007a78',
      effects: ['↑↑ Epic & Legendary fish rate', '↑ Rare fish chance', 'Tailored to current map'],
    },
    {
      key: 'mutationBaitActive',
      label: 'Mutation Bait',
      icon: '🧬',
      cost: mutationCost,
      color: '#fd79a8',
      dark: '#a0264e',
      effects: ['↑↑↑ Golden fish chance', '↑↑ Rainbow fish chance', 'Applies to any map'],
    },
  ];

  // ── Header ──
  text('Active for 30 seconds after purchase', W/2, 193, 18, 'center', 'rgba(255,255,255,.45)');

  const cardW = 480, cardH = 430, gapX = 60;
  const totalW = baits.length * cardW + (baits.length - 1) * gapX;
  const startX = Math.round(W/2 - totalW/2);
  const cardY = 215;

  baits.forEach((b, i) => {
    const bx = startX + i * (cardW + gapX);
    const active = game[b.key];
    const cx = bx + cardW/2;

    // Card background
    const bgFill = active ? b.color + '28' : 'rgba(255,255,255,.06)';
    const border  = active ? b.color       : 'rgba(255,255,255,.18)';
    roundRect(bx, cardY, cardW, cardH, 22, bgFill, border, active ? 2.5 : 1.5);

    // Active glow
    if(active){
      ctx.save();
      ctx.shadowColor = b.color; ctx.shadowBlur = 32;
      roundRect(bx, cardY, cardW, cardH, 22, 'transparent', b.color, 2);
      ctx.restore();
    }

    // Top accent stripe
    const stripeGrad = ctx.createLinearGradient(bx, cardY, bx + cardW, cardY);
    stripeGrad.addColorStop(0, 'transparent');
    stripeGrad.addColorStop(0.5, b.color + (active ? 'cc' : '55'));
    stripeGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = stripeGrad;
    ctx.beginPath(); ctx.rect(bx + 1, cardY + 1, cardW - 2, 5); ctx.fill();

    // Icon
    ctx.font = '58px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(b.icon, cx, cardY + 76);

    // Label
    ctx.fillStyle = active ? '#ffffff' : '#dfe6e9';
    ctx.font = 'bold 26px ui-monospace,monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(b.label, cx, cardY + 144);

    // Divider
    ctx.strokeStyle = active ? b.color + '66' : 'rgba(255,255,255,.12)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(bx + 32, cardY + 163); ctx.lineTo(bx + cardW - 32, cardY + 163); ctx.stroke();

    // Effect bullets
    b.effects.forEach((eff, ei) => {
      const ey = cardY + 192 + ei * 34;
      // pill background
      roundRect(bx + 28, ey - 12, cardW - 56, 26, 8, 'rgba(255,255,255,.07)', 'rgba(255,255,255,.10)', 1);
      ctx.fillStyle = active ? b.color : 'rgba(255,255,255,.75)';
      ctx.font = '14px ui-monospace,monospace';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(eff, bx + 44, ey + 1);
    });

    // Cost / active badge
    const badgeY = cardY + 315;
    if(active){
      roundRect(bx + 60, badgeY, cardW - 120, 38, 10, b.color + '33', b.color, 1.5);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 16px ui-monospace,monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('✓  ACTIVE', cx, badgeY + 19);
    } else {
      roundRect(bx + 60, badgeY, cardW - 120, 38, 10, 'rgba(255,221,89,.12)', 'rgba(255,221,89,.35)', 1.5);
      ctx.fillStyle = '#ffdd59';
      ctx.font = 'bold 17px ui-monospace,monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(`${fmt(b.cost)} coins`, cx, badgeY + 19);
    }

    // Timer bar (when active)
    const barY2 = cardY + 366;
    const barW2 = cardW - 56;
    const barX2 = bx + 28;
    roundRect(barX2, barY2, barW2, 8, 4, 'rgba(255,255,255,.10)', 'rgba(255,255,255,.15)', 1);
    if(active){
      const pct = Math.max(0, (game._baitTimers?.[b.key] || 0) / 30000);
      if(pct > 0){
        const timerGrad = ctx.createLinearGradient(barX2, barY2, barX2 + barW2 * pct, barY2);
        timerGrad.addColorStop(0, b.color);
        timerGrad.addColorStop(1, b.color + 'aa');
        roundRect(barX2, barY2, barW2 * pct, 8, 4, timerGrad, null, 0);
        const secsLeft = Math.ceil((game._baitTimers?.[b.key] || 0) / 1000);
        ctx.fillStyle = 'rgba(255,255,255,.5)';
        ctx.font = '12px ui-monospace,monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(`${secsLeft}s remaining`, cx, barY2 + 20);
      }
    }

    // Buy button
    const btnY2 = cardY + cardH - 58;
    const btnW3 = cardW - 56;
    const btnX3 = bx + 28;
    const btnH3 = 44;
    const btnHov = game.mouseX >= btnX3 && game.mouseX <= btnX3 + btnW3 && game.mouseY >= btnY2 && game.mouseY <= btnY2 + btnH3;
    const btnFill = active ? '#2d3748' : (btnHov ? b.color : b.dark);
    const btnBorder = active ? 'rgba(255,255,255,.12)' : `rgba(255,255,255,${btnHov ? '.7' : '.3'})`;

    ctx.save();
    if(btnHov && !active){ ctx.shadowColor = b.color; ctx.shadowBlur = 18; }
    const btnGrad = ctx.createLinearGradient(btnX3, btnY2, btnX3, btnY2 + btnH3);
    btnGrad.addColorStop(0, btnFill);
    btnGrad.addColorStop(1, active ? '#1a202c' : b.dark);
    roundRect(btnX3, btnY2, btnW3, btnH3, 12, btnGrad, btnBorder, 2);
    ctx.shadowBlur = 0;
    ctx.fillStyle = active ? 'rgba(255,255,255,.3)' : '#fff';
    ctx.font = `bold 18px ui-monospace,monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(active ? 'Already Active' : 'Buy & Use', btnX3 + btnW3/2, btnY2 + btnH3/2);
    ctx.restore();

    addButton(btnX3, btnY2, btnW3, btnH3, '', () => {
      if(active) return;
      buy(b.cost, () => {
        game[b.key] = true;
        if(!game._baitTimers) game._baitTimers = {};
        game._baitTimers[b.key] = 30000;
        setTimeout(() => { game[b.key] = false; }, 30000);
      });
    }, 'transparent');
  });
}

// Track bait timer countdowns for the progress bar
function updateBaitTimers(dt){
  if(!game._baitTimers) return;
  for(const k of Object.keys(game._baitTimers)){
    if(game[k]){
      game._baitTimers[k] = Math.max(0, game._baitTimers[k] - dt);
    }
  }
}
function drawQuestsPanel(){
  const boxH = 82;
  const gap = 14;
  const startY = 175;

  game.quests.forEach((q,i)=>{
    const y = startY + i * (boxH + gap);
    const isElem = q.type === 'elemental_unlock';

    const cardFill = q.done
      ? (isElem ? 'rgba(255,150,40,.20)' : 'rgba(46,213,115,.25)')
      : (isElem ? 'rgba(120,60,200,.18)' : 'rgba(255,255,255,.10)');
    const cardBorder = isElem ? (q.done ? 'rgba(255,180,80,.6)' : 'rgba(180,80,255,.4)') : 'rgba(255,255,255,.22)';

    roundRect(300, y, 900, boxH, 18, cardFill, cardBorder, 2);

    text(q.text, 330, y + 28, isElem ? 22 : 28, 'left', isElem ? '#ffcc88' : 'white');

    let subText;
    if(isElem && !q.done){
      const wc = q.caughtWyrm  ? '✓' : '✗';
      const hc = q.caughtHydra ? '✓' : '✗';
      const tc = q.caughtPhantom ? '✓' : '✗';
      subText = `Frost Wyrm[${wc}] • Infernal Hydra[${hc}] • Thunder Phantom[${tc}]`;
    } else if(isElem && q.done){
      subText = 'Completed! Elemental Rod is now available in Gear.';
    } else if(q.done){
      subText = 'Completed • Reward claimed';
    } else {
      subText = `Reward: ${q.reward.toLocaleString()} coins`;
    }

    text(subText, 330, y + 58, 16, 'left', '#dfe6e9');

    const statusText  = q.done ? 'DONE' : 'ACTIVE';
    const statusColor = q.done ? (isElem ? '#ffcc44' : '#7bed9f') : '#fff16a';
    text(statusText, 1110, y + 42, 24, 'center', statusColor);
  });
}

function drawCollectionPanel(){

  const RARITY = ['Common','Uncommon','Rare','Epic','Legendary'];
  const RARITY_COLOR = ['#b2bec3','#55efc4','#74b9ff','#a29bfe','#ffd700'];

  // helper: check if entry is caught (handles old boolean saves + new object saves)
  function isCaught(entry){ return entry === true || (entry && entry.caught); }
  function getVariants(entry){ return (entry && entry.variants) ? entry.variants : {}; }

  const cardW = 320;
  const cardH = 195;
  const gap = 18;

  const panelX = 175;
  const panelY = 180;
  const panelW = 1160;
  const panelH = 575;

  const startX = 240;
  const startY = 200;

  // BUILD GROUPED FISH BY MAP
  const grouped = {};
  for(const mapId in fishTypesByMap){ grouped[mapId] = fishTypesByMap[mapId]; }
  const mapIds = Object.keys(grouped);

  let contentH = 0;
  for(const id of mapIds){
    contentH += 60;
    contentH += Math.ceil(grouped[id].length / 3) * (cardH + gap);
  }

  const maxScroll = Math.max(0, contentH - panelH + 750);
  game.collectionScroll = clamp(game.collectionScroll || 0, 0, maxScroll);

  ctx.save();
  ctx.beginPath();
  ctx.rect(panelX, panelY, panelW, panelH);
  ctx.clip();

  let yOffset = startY - game.collectionScroll;

  for(const mapId of mapIds){
    const mapFish = grouped[mapId];
    yOffset += 40;
    text(maps.find(m=>m.id===mapId)?.name || mapId.toUpperCase(), startX, yOffset, 28, 'left', '#81ecec');
    yOffset += 30;

    const cols = 3;
    mapFish.forEach((f, i)=>{
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = startX + col * 360;
      const y = yOffset + row * (cardH + gap);

      const entry = game.collection[f.name];
      const caught = isCaught(entry);
      const variants = getVariants(entry);

      if(y + cardH < panelY || y > panelY + panelH) return;

      const rarityIdx = f.id - 1; // 0-4
      const rarityColor = RARITY_COLOR[rarityIdx] || '#b2bec3';

      roundRect(x, y, cardW, cardH, 18,
        caught ? 'rgba(46,213,115,.18)' : 'rgba(255,255,255,.08)',
        caught ? rarityColor : 'rgba(255,255,255,.18)',
        caught ? 2.5 : 2
      );

      // FISH DRAW AREA
      ctx.save();
      const fx = x + cardW / 2;
      const fy = y + 72;
      ctx.translate(fx, fy);

      if(caught){
        const scale = 0.65;
        ctx.scale(scale, scale);
        ctx.fillStyle = f.body || '#fff';
        traceFishBody(f.shape || 'round', 220, 120);
        ctx.fill();
        drawTailShape(f.tail || 'fork', 220, 120, f.fin || '#fff');
        drawFishPattern(f.pattern || 'none', 220, 120);
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(60, -20, 6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'black';
        ctx.beginPath(); ctx.arc(62, -20, 3, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = 'rgba(255,255,255,.25)';
        ctx.font = '44px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('???', 0, 0);
      }
      ctx.restore();

      // RARITY BADGE
      const rarLabel = caught ? RARITY[rarityIdx] || 'Common' : '?????';
      roundRect(x + 8, y + 8, 90, 22, 6, caught ? rarityColor + '33' : 'rgba(255,255,255,.05)', rarityColor, 1.5);
      text(rarLabel, x + 53, y + 20, 12, 'center', caught ? rarityColor : '#555');

      // FISH NAME
      text(caught ? f.name : 'Unknown Fish', x + 14, y + 148, 19, 'left', caught ? '#fff' : '#777');

      // VARIANTS ROW
      if(caught){
        const hasGolden = variants['golden'];
        const hasRainbow = variants['rainbow'];
        // small variant dots
        const dotY = y + 170;
        let dotX = x + 14;
        // Base variant (always show as caught)
        roundRect(dotX, dotY, 58, 18, 5, 'rgba(180,180,180,.25)', 'rgba(255,255,255,.3)', 1);
        text('Base ✓', dotX + 29, dotY + 10, 10, 'center', '#dfe6e9');
        dotX += 64;
        // Golden
        roundRect(dotX, dotY, 60, 18, 5, hasGolden ? 'rgba(255,215,0,.2)' : 'rgba(255,255,255,.05)', hasGolden ? '#ffd700' : 'rgba(255,255,255,.2)', 1);
        text(hasGolden ? 'Gold ✓' : 'Gold', dotX + 30, dotY + 10, 10, 'center', hasGolden ? '#ffd700' : '#555');
        dotX += 66;
        // Rainbow
        roundRect(dotX, dotY, 72, 18, 5, hasRainbow ? 'rgba(255,100,255,.15)' : 'rgba(255,255,255,.05)', hasRainbow ? '#ff9ff3' : 'rgba(255,255,255,.2)', 1);
        text(hasRainbow ? 'Rbw ✓' : 'Rbw', dotX + 36, dotY + 10, 10, 'center', hasRainbow ? '#ff9ff3' : '#555');
      } else {
        text('Location: ' + (maps.find(m => m.id === mapId)?.name || 'Unknown'), x + 14, y + 170, 13, 'left', '#999');
      }
    });

    const rows = Math.ceil(mapFish.length / 3);
    yOffset += rows * (cardH + gap) + 40;
  }

  ctx.restore();

  // SCROLLBAR
  if(maxScroll > 0){
    const barX = panelX + panelW + 40;
    const barY = panelY + 20;
    const barH = panelH - 100;
    const thumbH = Math.max(40, barH * (panelH / contentH));
    const scrollRatio = game.collectionScroll / maxScroll;
    const thumbY = barY + (barH - thumbH) * scrollRatio;
    roundRect(barX, barY, 6, barH, 3, 'rgba(255,255,255,.08)');
    roundRect(barX, thumbY, 6, thumbH, 3, '#e17055');
  }
}

function drawSoundPanel(){
  const s = SFX.settings;
  const cx = W/2;

  // ── subtitle ──
  text('Volume & sound category settings', cx, 188, 20, 'center', '#9effff');

  // ── MASTER VOLUME SECTION ──
  const cardX = 270, cardW = 960;
  roundRect(cardX, 210, cardW, 86, 16, 'rgba(255,255,255,.07)', 'rgba(255,255,255,.16)', 1.5);

  text('Master Volume', cardX + 24, 237, 21, 'left', '#dfe6e9');
  const volPct = Math.round(s.masterVolume * 100);
  text(`${volPct}%`, cardX + cardW - 20, 237, 20, 'right', '#fff16a');

  // slider track
  const sliderX = cardX + 24;
  const sliderY = 264;
  const sliderW = cardW - 48;
  const sliderH = 10;
  roundRect(sliderX, sliderY, sliderW, sliderH, 5, 'rgba(255,255,255,.12)', 'rgba(255,255,255,.22)', 1);
  // filled portion
  if(s.masterVolume > 0){
    roundRect(sliderX, sliderY, sliderW * s.masterVolume, sliderH, 5, '#6c5ce7');
  }
  // thumb
  const thumbX = sliderX + sliderW * s.masterVolume;
  ctx.beginPath();
  ctx.arc(thumbX, sliderY + sliderH/2, 11, 0, Math.PI*2);
  ctx.fillStyle = '#a29bfe'; ctx.fill();
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke();

  // slider hit region stored for drag logic
  game._soundSlider = { x: sliderX, y: sliderY - 14, w: sliderW, h: sliderH + 28, sliderX, sliderW };
  addButton(sliderX, sliderY - 14, sliderW, sliderH + 28, '',
    (evt) => {
      if(evt && evt._sliderX !== undefined){
        const ratio = clamp((evt._sliderX - sliderX) / sliderW, 0, 1);
        SFX.settings.masterVolume = ratio;
        save();
      }
    }, 'transparent'
  );

  // ── MUTE TOGGLES ──
  const toggles = [
    { key:'mute',         label:'Mute All',       color:'#ff4757' },
    { key:'muteUI',       label:'Mute UI Sounds', color:'#fd79a8' },
    { key:'muteFishing',  label:'Mute Fishing',   color:'#0984e3' },
    { key:'muteQuests',   label:'Mute Quests',    color:'#00b894' },
  ];

  const tCols = 2;
  const tGap  = 16;
  const tW    = (cardW - tGap * (tCols + 1)) / tCols;
  const tH    = 56;
  const tStartX = cardX + tGap;
  const tStartY = 318;

  toggles.forEach((t, i) => {
    const col = i % tCols;
    const row = Math.floor(i / tCols);
    const bx  = tStartX + col * (tW + tGap);
    const by  = tStartY + row * (tH + tGap);
    const on  = s[t.key];
    const fill   = on ? t.color : 'rgba(255,255,255,.07)';
    const border = on ? t.color : 'rgba(255,255,255,.20)';
    roundRect(bx, by, tW, tH, 12, fill, border, 2);
    const icon = on ? '✓ ' : '○ ';
    text(icon + t.label, bx + tW/2, by + tH/2, 20, 'center', on ? '#fff' : '#aaa');
    addButton(bx, by, tW, tH, '',
      () => { SFX.settings[t.key] = !SFX.settings[t.key]; SFX.buttonClick(); save(); },
      'transparent'
    );
  });

  text('Drag the slider to adjust master volume', cx, 474, 15, 'center', '#555');
}

function drawEffects(){ for(const p of game.particles){ ctx.globalAlpha=clamp(p.life/40,0,1); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; } for(const m of game.messages){ ctx.globalAlpha=clamp(m.life/45,0,1); text(m.text,m.x,m.y,24,'center',m.color); ctx.globalAlpha=1; } }
function update(dt){ for(const f of game.fish) f.move(dt); for(const c of game.chests) c.move(dt); updateHarpoon(dt); updateEffects(dt); updateTransition(dt); updateTutorial(); updateBaitTimers(dt); }
function draw(ts){

  const ox = rand(-game.shake, game.shake);
  const oy = rand(-game.shake, game.shake);

  // WORLD ONLY
  ctx.save();
  ctx.translate(ox, oy);

  drawBackground(16);
  drawBoat();
  for(const c of game.chests) c.draw();
  for(const f of game.fish) f.draw();
  drawHarpoon();
  drawEffects();

  ctx.restore();

  // UI (NO SHAKE)
  drawHUD();
  drawPanel();

  // TRANSITION MUST ALSO BE NO SHAKE (you already do this)
  drawTransition();

  drawTutorial();
}
function loop(t){ const dt=Math.min(33,t-game.last||16); game.last=t; update(dt); draw(t);
  // Show/hide the help bar based on tutorial state
  const helpEl = document.getElementById('help');
  if(helpEl) helpEl.style.opacity = game.tutorial.active ? '0' : '1';
  requestAnimationFrame(loop); }

function mousePos(e){ const r=canvas.getBoundingClientRect(); return {x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height}; }

// ── SLIDER DRAG STATE ──
let _sliderDragging = false;

canvas.addEventListener('mousedown', e => {
  const p = mousePos(e);
  // check if clicking the sound slider
  if(game.panel === 'sound' && game._soundSlider){
    const sl = game._soundSlider;
    if(p.x >= sl.x && p.x <= sl.x + sl.w && p.y >= sl.y && p.y <= sl.y + sl.h){
      _sliderDragging = true;
      const ratio = clamp((p.x - sl.sliderX) / sl.sliderW, 0, 1);
      SFX.settings.masterVolume = ratio;
      save();
      e.stopPropagation();
      return;
    }
  }
});

canvas.addEventListener('mousemove', e => {
  const p = mousePos(e);
  game.mouseX = p.x; game.mouseY = p.y;
  if(harpoon.status === 'still') harpoon.x = clamp(game.mouseX, 210, W-210);
  // drag slider
  if(_sliderDragging && game.panel === 'sound' && game._soundSlider){
    const sl = game._soundSlider;
    const ratio = clamp((p.x - sl.sliderX) / sl.sliderW, 0, 1);
    SFX.settings.masterVolume = ratio;
    save();
  }
});

window.addEventListener('mouseup', () => { _sliderDragging = false; });

canvas.addEventListener('click', e => {
  if(_sliderDragging) return;
  const p = mousePos(e);
  // skip slider area to avoid double-fire
  if(game.panel === 'sound' && game._soundSlider){
    const sl = game._soundSlider;
    if(p.x >= sl.x && p.x <= sl.x + sl.w && p.y >= sl.y && p.y <= sl.y + sl.h) return;
  }
  for(let i=buttons.length-1;i>=0;i--){
    if(buttons[i].hit(p.x,p.y)){
      SFX.buttonClick();
      buttons[i].fn({_sliderX: p.x, _sliderY: p.y});
      return;
    }
  }
  launch();
});
canvas.addEventListener('wheel', e=>{
  if(game.panel !== 'maps' && game.panel !== 'collection') return;

  if(game.panel === 'maps'){
    game.mapScroll = (game.mapScroll || 0) + e.deltaY * 0.6;
  }

  if(game.panel === 'collection'){
    game.collectionScroll = (game.collectionScroll || 0) + e.deltaY * 0.6;
  }
});
window.addEventListener('keydown',e=>{ if(e.code==='Space'){ e.preventDefault(); launch(); } if(e.code==='Escape'){ if(game.panel){ SFX.panelClose(); if(game.panel!=='menu'&&game.panelFrom==='menu'){ game.panel='menu'; game.panelFrom=null; game.panelAnim={t:0,open:false}; } else { game.panel=null; game.panelFrom=null; game.panelAnim={t:0,open:false}; } } } if(e.key.toLowerCase()==='r') reset(); });

load(); // Enable tutorial ONLY for brand new players
if(game.caught === 0){
  game.tutorial.active = true;
  game.tutorial.step = 0;
}
spawnFish(); requestAnimationFrame(loop);
</script>
